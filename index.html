<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仙俠宗門 V0.7.1 FINAL</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
    <header>
        <div style="display: flex; justify-content: space-between;">
            <span class="realm-tag"><span id="val-realm">凡人</span><span id="val-class"></span></span>
            <div style="color:var(--gold);">💎 <span id="val-money">0</span></div>
        </div>
        <div class="bar-container hp-bar-wrap">
            <div id="bar-p-hp" class="bar-fill" style="background:var(--success);"></div>
            <div class="bar-text" id="val-hp-txt">0 / 0</div>
        </div>
        <div class="bar-container"><div id="bar-xp" class="bar-fill" style="background:var(--info);"></div></div>
        <div style="display:flex; justify-content:space-between; font-size:11px;">
            <span>LV: <b id="val-lv">1</b> | 戰力: <b id="val-power">0</b></span>
            <span>修為: <span id="val-xp">0</span> / <span id="val-next-xp">100</span></span>
        </div>
    </header>

    <div id="p-battle" class="stage">
        <div class="battle-view" style="width:100%">
            <div style="display:flex; justify-content:space-between; width:100%; margin-bottom:10px;">
                <span id="val-map-name">📍 載入中...</span>
                <button onclick="game.showMapModal()">切換地圖</button>
            </div>
            <div class="monster-card" onclick="game.manualAtk(event)">👹</div>
            <div style="display:flex; gap:10px; margin-bottom:10px;">
                <button id="btn-auto" onclick="game.toggleAuto()">自動歷練: OFF</button>
                <button onclick="game.useSkill()">御劍術<div id="skill-cd" class="skill-cd"></div></button>
            </div>
            <div style="width:100%">
                <span id="m-name">小妖</span> <span id="m-hp-txt"></span>
                <div class="bar-container"><div id="bar-m-hp" class="bar-fill" style="background:var(--danger);"></div></div>
            </div>
            <div id="log"></div>
        </div>
    </div>

    <div id="p-stats" class="stage" style="display:none;">
        <h4>修為面板 (點數: <span id="val-pts">0</span>)</h4>
        <button id="btn-class" onclick="game.showClassModal()" style="display:none; width:100%; background:var(--purple)!important;">🌟 選擇流派</button>
        <div id="stat-list"></div>
        <div class="equip-box-v2" style="display:flex; gap:10px; margin-top:10px;">
            <div style="flex:1; background:#222; padding:10px; border-radius:5px; text-align:center;">
                ⚔️ <span id="eq-weapon">無</span>
                <button id="btn-unequip-weapon" class="btn-unequip" onclick="game.unequip('weapon')">卸下</button>
            </div>
            <div style="flex:1; background:#222; padding:10px; border-radius:5px; text-align:center;">
                🛡️ <span id="eq-body">無</span>
                <button id="btn-unequip-body" class="btn-unequip" onclick="game.unequip('body')">卸下</button>
            </div>
        </div>
        <button class="btn-reset" onclick="game.respec()">洗點丹</button>
    </div>

    <div id="p-bag" class="stage" style="display:none;">
        <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
            <h4>儲物袋 (<span id="bag-count">0</span>/<span id="val-bag-max">20</span>)</h4>
            <div>
                <select id="melt-filter"><option value="0">凡品</option><option value="1">良品</option><option value="2">精品</option></select>
                <button onclick="game.quickMelt()">熔煉</button>
            </div>
        </div>
        <div id="bag-list" class="bag-grid"></div>
    </div>

    <div id="p-shop" class="stage" style="display:none;">
        <h4>黑市</h4>
        <button onclick="game.buyBag()">擴充背包 (💰 <span id="val-bag-price">1000</span>)</button>
    </div>

    <nav>
        <div class="tab active" onclick="game.switchTab('battle', this)">歷練</div>
        <div class="tab" onclick="game.switchTab('stats', this)">修為</div>
        <div class="tab" onclick="game.switchTab('bag', this)">儲物袋</div>
        <div class="tab" onclick="game.switchTab('shop', this)">黑市</div>
    </nav>

    <div id="map-modal" class="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:100; justify-content:center; align-items:center;">
        <div style="background:#161b22; padding:20px; border:1px solid var(--info); width:80%;">
            <h3>歷練禁地</h3><div id="map-list"></div>
            <button onclick="document.getElementById('map-modal').style.display='none'">關閉</button>
        </div>
    </div>

    <div id="class-modal" class="modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:100; justify-content:center; align-items:center;">
        <div style="background:#161b22; padding:20px; border:1px solid var(--purple); width:80%;">
            <h3>選擇流派</h3>
            <button onclick="game.chooseClass('sword')" style="width:100%; background:var(--danger)!important; margin-bottom:5px;">劍修 (攻擊)</button>
            <button onclick="game.chooseClass('body')" style="width:100%; background:var(--success)!important; margin-bottom:5px;">體修 (血量)</button>
            <button onclick="game.chooseClass('soul')" style="width:100%; background:var(--info)!important;">靈修 (爆擊)</button>
        </div>
    </div>
</div>

<script src="data.js"></script>
<script src="game.js"></script>
</body>
</html>
