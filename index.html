<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仙俠宗門 V0.3.1 - 模組化改版</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
    <header>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span class="realm-tag" id="val-realm">凡人</span>
            <span style="font-size: 14px;">等級 <b id="val-lv">1</b></span>
        </div>
        <div class="bar-container"><div id="bar-xp" class="bar-fill" style="width: 0%; background: var(--info);"></div></div>
        <div style="display: flex; justify-content: space-between; font-size: 12px;">
            <span>戰力: <b id="val-power" style="color: var(--gold);">0</b></span>
            <span>修為: <span id="val-xp">0</span> / <span id="val-next-xp">100</span></span>
        </div>
    </header>

    <div id="p-battle" class="stage" style="display: flex;">
        <div class="battle-view">
            <div id="m-card" class="monster-card" onclick="game.manualAtk(event)">👹</div>
            <div class="action-bar">
                <div id="btn-auto" onclick="game.toggleAuto()" style="padding: 10px 15px; background: #30363d; border-radius: 8px; cursor: pointer; font-size: 14px;">自動歷練: OFF</div>
                <button id="btn-skill" class="btn-skill" onclick="game.useSkill()">
                    御劍術
                    <div id="skill-cd" class="skill-cd"></div>
                </button>
            </div>
            <div style="width: 100%; max-width: 280px; margin-top: 20px;">
                <div style="display: flex; justify-content: space-between; font-size: 14px; margin-bottom: 5px;">
                    <b id="m-name">妖怪</b>
                    <b id="m-hp-txt">0/0</b>
                </div>
                <div class="bar-container"><div id="bar-m-hp" class="bar-fill" style="width: 100%; background: var(--danger);"></div></div>
            </div>
            <div id="log" style="width: 100%;"></div>
        </div>
    </div>

    <div id="p-stats" class="stage" style="display: none; padding: 20px;">
        <h3>修為面板 (潛能: <span id="val-pts" style="color:var(--gold)">0</span>)</h3>
        <div id="stat-list" style="margin: 15px 0;"></div>
        <div class="equip-box">
            <div class="slot">⚔️ 武器<b id="eq-weapon">無</b></div>
            <div class="slot">🛡️ 防具<b id="eq-body">無</b></div>
        </div>
        <div style="background: var(--card-bg); padding: 15px; border-radius: 12px; border: 1px solid var(--border);">
            <p>攻擊力: <b id="val-atk">0</b> <small id="val-atk-plus" style="color:var(--success)"></small></p>
            <p>生命值: <b id="val-hp">0</b> <small id="val-hp-plus" style="color:var(--success)"></small></p>
            <p>攻速: <b id="val-spd">0</b> 次/秒</p>
            <p>暴擊率: <b id="val-crit">0</b>%</p>
        </div>
    </div>

    <div id="p-bag" class="stage" style="display: none; padding: 20px;">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3>儲物袋 (<span id="bag-count">0</span>/20)</h3>
            <button onclick="game.quickMelt()" style="padding: 5px 10px; background: var(--danger); border: 0; color: #fff; border-radius: 4px; font-size: 12px; cursor: pointer;">一鍵熔煉(凡/良)</button>
        </div>
        <hr style="margin: 15px 0; border: 0; border-top: 1px solid var(--border);">
        <div id="bag-list"></div>
    </div>

    <nav>
        <div class="tab active" onclick="game.switchTab('battle', this)">戰鬥</div>
        <div class="tab" onclick="game.switchTab('stats', this)">修為</div>
        <div class="tab" onclick="game.switchTab('bag', this)">儲物袋</div>
    </nav>
</div>

<script src="game.js"></script>
</body>
</html>
