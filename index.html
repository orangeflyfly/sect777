<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仙俠宗門 V1.6.6 - 全圖修復版</title>
    <style>
        :root {
            --color-primary: #a29bfe; --color-primary-dark: #6c5ce7;
            --color-bg-deep: #0b0e14; --color-card-bg: rgba(30, 35, 45, 0.9);
            --color-text-main: #adbac7; --color-gold: #ffcf40;
            --color-danger: #f85149; --color-success: #3fb950;
            --color-border: rgba(162, 155, 254, 0.3);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; }
        body { background: #000; color: var(--color-text-main); height: 100vh; display: flex; justify-content: center; overflow: hidden; }
        #app {
            width: 100%; max-width: 500px; height: 100%; background: radial-gradient(circle at top, #1a1c2c 0%, #0b0e14 100%);
            display: flex; flex-direction: column; position: relative; border: 1px solid var(--color-border); overflow: hidden;
        }
        header { padding: 25px 20px; background: rgba(20, 25, 35, 0.95); border-bottom: 2px solid var(--color-primary); z-index: 100; }
        .res-row { display: flex; gap: 12px; margin-bottom: 12px; }
        .res-item { background: rgba(0,0,0,0.8); padding: 6px 14px; border-radius: 20px; font-size: 13px; border: 1px solid var(--color-border); color: #fff; }
        .realm-tag { color: var(--color-gold); font-size: 24px; font-weight: 900; }
        .exp-bar { height: 8px; background: #111; border-radius: 4px; margin-top: 15px; overflow: hidden; border: 1px solid #333; }
        .exp-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--color-primary-dark), var(--color-primary)); transition: width 0.4s; }
        .stage { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 120px; }
        .page { display: none; }
        .page.active { display: block; }
        .card { background: var(--color-card-bg); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--color-border); }
        .card-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; color: #fff; display: flex; align-items: center; gap: 10px; }
        .card-title::before { content: ''; width: 4px; height: 16px; background: var(--color-primary); }
        .dispatch-row { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.5); padding: 12px; border-radius: 12px; margin-bottom: 8px; }
        .ctrl-btn { width: 32px; height: 32px; border-radius: 50%; border: 1px solid var(--color-primary); background: none; color: #fff; cursor: pointer; }
        .btn-main { width: 100%; padding: 14px; border-radius: 12px; border: none; background: linear-gradient(135deg, var(--color-primary-dark), var(--color-primary)); color: #fff; font-weight: bold; cursor: pointer; }
        .hp-wrap { height: 18px; background: rgba(0,0,0,0.8); border-radius: 9px; overflow: hidden; margin: 10px 0; border: 1px solid #444; position: relative; }
        .hp-fill { height: 100%; transition: width 0.3s; }
        .hp-text { position: absolute; width: 100%; text-align: center; font-size: 11px; line-height: 18px; color: #fff; font-weight: bold; }
        .map-tabs { display: flex; gap: 10px; margin-bottom: 15px; overflow-x: auto; }
        .map-btn { padding: 8px 15px; border-radius: 10px; border: 1px solid var(--color-border); background: #1c2128; color: #888; white-space: nowrap; cursor: pointer; }
        .map-btn.active { border-color: var(--color-primary); color: var(--color-primary); }
        #log-box { height: 200px; overflow-y: auto; background: rgba(0,0,0,0.6); border-radius: 15px; padding: 15px; font-size: 12px; border: 1px solid var(--color-border); line-height: 1.8; }
        nav { position: absolute; bottom: 20px; left: 15px; right: 15px; height: 75px; background: rgba(25, 30, 40, 0.95); border-radius: 38px; display: flex; border: 1px solid var(--color-border); }
        .nav-btn { color: #555; cursor: pointer; text-align: center; flex: 1; padding: 15px 0; }
        .nav-btn.active { color: var(--color-primary); }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .item-card { background: rgba(0,0,0,0.4); border: 1px solid var(--color-border); border-radius: 10px; padding: 8px; text-align: center; font-size: 11px; cursor: pointer; }
    </style>
</head>
<body>

<div id="app">
    <header>
        <div class="res-row">
            <div class="res-item">🪵 <span id="val-wood">0</span></div>
            <div class="res-item">💠 <span id="val-stone">0</span></div>
            <div class="res-item">👥 <span id="val-d-idle">0</span>/<span id="val-d-total">0</span></div>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:flex-end;">
            <div><span class="realm-tag" id="val-realm">練氣期</span><span id="val-lv" style="margin-left:8px;">第 1 層</span></div>
            <div style="text-align:right"><small>宗門實力</small><br><b id="val-power" style="color:var(--color-primary); font-size:18px;">0</b></div>
        </div>
        <div class="exp-bar"><div id="val-exp-fill" class="exp-fill"></div></div>
    </header>

    <main class="stage">
        <div id="p1" class="page active">
            <div class="card">
                <div class="card-title">👥 執事堂 (遣走者可召還)</div>
                <div class="dispatch-row">
                    <span>🌲 靈木崗 (<span id="d-wood">0</span>人)</span>
                    <div><button class="ctrl-btn" onclick="assign('wood', -1)">召</button><button class="ctrl-btn" onclick="assign('wood', 1)">差</button></div>
                </div>
                <div class="dispatch-row">
                    <span>💠 靈石崗 (<span id="d-stone">0</span>人)</span>
                    <div><button class="ctrl-btn" onclick="assign('stone', -1)">召</button><button class="ctrl-btn" onclick="assign('stone', 1)">差</button></div>
                </div>
                <button class="btn-main" onclick="recruit()">招募外門弟子 (需 <span id="d-cost">10</span> 靈石)</button>
            </div>
            <div class="card" onclick="startWork('stone')">
                <div class="card-title">💠 掌門採礦 (靈石礦脈)</div>
                <div class="hp-wrap"><div id="bar-stone" class="hp-fill" style="width:0%; background:var(--color-primary)"></div></div>
            </div>
            <div class="card" onclick="startWork('wood')">
                <div class="card-title">🪵 掌門伐木 (親力親為)</div>
                <div class="hp-wrap"><div id="bar-wood" class="hp-fill" style="width:0%; background:var(--color-success)"></div></div>
            </div>
        </div>

        <div id="p2" class="page">
            <div id="map-tabs" class="map-tabs"></div>
            <div class="card">
                <div class="card-title">⚔️ <span id="m-name">搜尋中...</span></div>
                <div class="hp-wrap">
                    <div id="m-hp-bar" class="hp-fill" style="background:var(--color-danger); width:100%"></div>
                    <div class="hp-text" id="m-hp-txt">0/0</div>
                </div>
                <div class="card-title" style="margin-top:20px;">🧘 掌門真元</div>
                <div class="hp-wrap">
                    <div id="p-hp-bar" class="hp-fill" style="background:var(--color-success); width:100%"></div>
                    <div class="hp-text" id="p-hp-txt">0/0</div>
                </div>
                <button class="btn-main" style="margin-top:15px;" onclick="doAttack()">發動靈力攻擊</button>
            </div>
            <div id="log-box"></div>
        </div>

        <div id="p3" class="page">
            <div class="card">
                <div class="card-title">🧘 修為洞察</div>
                <p>⚔️ 總攻擊力：<b id="st-atk-total">0</b></p>
                <small id="st-atk-detail" style="color:#888"></small>
                <button class="btn-main" style="margin-top:15px;" onclick="upgrade()">提升戰鬥感悟 (潛能:<span id="val-pts">0</span>)</button>
            </div>
        </div>

        <div id="p4" class="page">
            <div class="card"><div class="card-title">🎒 儲物袋</div><div id="bag-grid" class="grid-3"></div></div>
            <div class="card">
                <div class="card-title">🔥 乾坤爐 (消耗素材x5)</div>
                <button class="btn-main" onclick="craft()">煉製法寶</button>
            </div>
        </div>
    </main>

    <nav>
        <div class="nav-btn active" onclick="switchTab(1,this)"><span>⛩️</span><small>宗門</small></div>
        <div class="nav-btn" onclick="switchTab(2,this)"><span>⚔️</span><small>歷練</small></div>
        <div class="nav-btn" onclick="switchTab(3,this)"><span>🧘</span><small>星盤</small></div>
        <div class="nav-btn" onclick="switchTab(4,this)"><span>🎒</span><small>儲物</small></div>
    </nav>
</div>

<script>
let wood = 0, stone = 0, totalD = 0, dWood = 0, dStone = 0;
let realm = "練氣期", lv = 1, exp = 0, pts = 0;
let bAtk = 10, bHp = 100, curHp = 100;
let inventory = {}, gear = { weapon: null };
let curWork = null, workProgress = 0, activeMob = null, curMapIdx = 0;

const WORLD_MAPS = [
    { n: "🌿 山腳", mob: "野豬", hp: 60, atk: 8, exp: 40, loots: ["野豬皮", "碎骨"] },
    { n: "🐍 密林", mob: "幻影蟒", hp: 450, atk: 48, exp: 200, loots: ["蟒皮", "靈木心"] }
];

function assign(t, v) {
    let idle = totalD - dWood - dStone;
    if (v > 0 && idle <= 0) return;
    if (t === 'wood' && dWood + v >= 0) dWood += v;
    if (t === 'stone' && dStone + v >= 0) dStone += v;
    updateUI();
}

function startWork(t) { if (!curWork) { curWork = t; workProgress = 0; } }

function recruit() {
    let cost = 10 + totalD * 5;
    if (stone >= cost) { stone -= cost; totalD++; log("🎉 招募成功"); }
    updateUI();
}

function spawnMonster() {
    const data = WORLD_MAPS[curMapIdx];
    activeMob = { n: data.mob, hp: data.hp, mH: data.hp, atk: data.atk, exp: data.exp, loots: data.loots };
    updateUI();
}

function doAttack() {
    if (!activeMob) return;
    let tAtk = bAtk + (gear.weapon ? gear.weapon.v : 0);
    activeMob.hp -= tAtk;
    if (activeMob.hp <= 0) {
        log(`✨ 擊敗 ${activeMob.n}`, "gold");
        exp += activeMob.exp;
        activeMob.loots.forEach(l => { if(Math.random()<0.6) inventory[l]=(inventory[l]||0)+1; });
        checkLv(); spawnMonster();
    } else {
        curHp -= activeMob.atk;
        if (curHp <= 0) { curHp = bHp; switchTab(1, document.querySelectorAll('.nav-btn')[0]); }
    }
    updateUI();
}

function updateUI() {
    document.getElementById('val-wood').innerText = Math.floor(wood);
    document.getElementById('val-stone').innerText = Math.floor(stone);
    document.getElementById('val-d-idle').innerText = totalD - dWood - dStone;
    document.getElementById('val-d-total').innerText = totalD;
    document.getElementById('d-wood').innerText = dWood;
    document.getElementById('d-stone').innerText = dStone;
    document.getElementById('d-cost').innerText = 10 + totalD * 5;
    document.getElementById('val-realm').innerText = realm;
    document.getElementById('val-lv').innerText = `第 ${lv} 層`;
    document.getElementById('val-pts').innerText = pts;

    if (activeMob) {
        document.getElementById('m-name').innerText = activeMob.n;
        document.getElementById('m-hp-bar').style.width = (activeMob.hp / activeMob.mH * 100) + "%";
        document.getElementById('m-hp-txt').innerText = `${Math.ceil(activeMob.hp)} / ${activeMob.mH}`;
    }
    document.getElementById('p-hp-bar').style.width = (curHp / bHp * 100) + "%";
    document.getElementById('p-hp-txt').innerText = `${Math.ceil(curHp)} / ${bHp}`;
    
    document.getElementById('st-atk-total').innerText = bAtk + (gear.weapon ? gear.weapon.v : 0);
    
    let h = "";
    for (let k in inventory) {
        if (inventory[k] <= 0) continue;
        h += `<div class="item-card" onclick="useItem('${k}')">${typeof inventory[k]==='object'?inventory[k].n:k+' x'+inventory[k]}</div>`;
    }
    document.getElementById('bag-grid').innerHTML = h;
    
    document.getElementById('val-exp-fill').style.width = (exp / (lv * 150) * 100) + "%";
}

function useItem(k) {
    if(typeof inventory[k] === 'object') { gear.weapon = inventory[k]; delete inventory[k]; log("🛡️ 已裝備"); }
    updateUI();
}

function craft() {
    let mat = Object.keys(inventory).find(k => typeof inventory[k] === 'number' && inventory[k] >= 5);
    if (stone >= 15 && mat) {
        stone -= 15; inventory[mat] -= 5;
        let id = Date.now();
        inventory[id] = { n: "靈光劍", v: lv * 5 + 10 };
        log("🔥 煉製成功");
    }
    updateUI();
}

function switchTab(idx, el) {
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('p' + idx).classList.add('active');
    if(el) el.classList.add('active');
    updateUI();
}

function log(m, c) {
    const box = document.getElementById('log-box');
    const d = document.createElement('div'); d.innerText = "◈ " + m;
    if(c) d.style.color = "var(--color-gold)";
    box.prepend(d);
}

function checkLv() { if (exp >= lv * 150) { exp -= lv * 150; lv++; pts += 3; log("🌟 突破提升！", "gold"); } }
function upgrade() { if(pts>0) { bAtk+=5; pts--; log("🧘 感悟提升"); updateUI(); } }

setInterval(() => {
    wood += dWood * 0.5; stone += dStone * 0.3;
    if (curWork) {
        workProgress += 25;
        document.getElementById('bar-' + curWork).style.width = workProgress + "%";
        if (workProgress >= 100) {
            if (curWork === 'wood') wood += 5; else stone += 2;
            document.getElementById('bar-' + curWork).style.width = "0%";
            curWork = null;
        }
    }
    updateUI();
}, 1000);

window.onload = () => {
    const container = document.getElementById('map-tabs');
    WORLD_MAPS.forEach((m, i) => {
        let btn = document.createElement('button');
        btn.className = "map-btn"; btn.innerText = m.n;
        btn.onclick = () => { curMapIdx = i; spawnMonster(); };
        container.appendChild(btn);
    });
    spawnMonster();
    updateUI();
};
</script>
</body>
</html>
