<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仙俠宗門 V0.7.1 - 核心對接版</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div id="app">
    <header>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span class="realm-tag">
                <span id="val-realm">凡人</span>
                <span id="val-class" style="font-size:14px; color:var(--purple); margin-left:5px;"></span>
            </span>
            <div style="color: var(--gold); font-weight: bold; font-size: 14px;">💎 <span id="val-money">0</span></div>
        </div>
        <div class="bar-container hp-bar-wrap">
            <div id="bar-p-hp" class="bar-fill" style="width: 100%; background: var(--success);"></div>
            <div class="bar-text" id="val-hp-txt">0 / 0</div>
        </div>
        <div class="bar-container">
            <div id="bar-xp" class="bar-fill" style="width: 0%; background: var(--info);"></div>
        </div>
        <div style="display: flex; justify-content: space-between; font-size: 11px; color: #eee;">
            <span>LV: <b id="val-lv">1</b> | 戰力: <b id="val-power" style="color: var(--gold);">0</b></span>
            <span>修為: <span id="val-xp">0</span> / <span id="val-next-xp">100</span></span>
        </div>
    </header>

    <div id="p-battle" class="stage" style="display: flex;">
        <div class="battle-view" style="width:100%">
            <div style="display: flex; justify-content: space-between; width: 100%; margin-bottom: 10px; background: rgba(255,255,255,0.05); padding: 5px 10px; border-radius: 6px;">
                <span id="val-map-name" style="color: var(--info); font-weight: bold;">📍 載入中...</span>
                <button onclick="_X_CORE.showMapModal()" style="padding: 2px 8px; font-size: 10px; background: var(--info);">切換地圖</button>
            </div>
            
            <div class="monster-card" onclick="_X_CORE.manualAtk(event)">👹</div>
            
            <div style="display:flex; gap:10px; margin-bottom: 15px;">
                <button id="btn-auto" onclick="_X_CORE.toggleAuto()">自動歷練: OFF</button>
                <button id="btn-skill" onclick="_X_CORE.useSkill()">御劍術<div id="skill-cd" class="skill-cd"></div></button>
            </div>

            <div style="width: 100%;">
                <div style="display: flex; justify-content: space-between; font-size: 11px; color: #fff; margin-bottom: 2px;">
                    <span id="m-name">怪物</span>
                    <span id="m-hp-txt">0 / 0</span>
                </div>
                <div class="bar-container hp-bar-wrap">
                    <div id="bar-m-hp" class="bar-fill" style="width: 100%; background: var(--danger);"></div>
                </div>
            </div>
            <div id="log"></div>
        </div>
    </div>

    <div id="p-stats" class="stage" style="display: none;">
        <h4>修為面板 (點數: <span id="val-pts">0</span>)</h4>
        <button id="btn-class" onclick="_X_CORE.showClassModal()" style="display:none; width:100%; background:var(--purple) !important; margin-bottom:15px;">🌟 選擇流派</button>
        <div id="stat-list"></div>
        
        <div class="equip-box-v2" style="display:flex; gap:10px; margin-top:10px;">
            <div style="flex:1; background:#222; padding:10px; border-radius:8px; text-align:center;">
                ⚔️ <b id="eq-weapon" style="display:block; color:var(--gold);">無</b>
                <button id="btn-unequip-weapon" class="btn-unequip" style="display:none; margin-top:5px;" onclick="_X_CORE.unequip('weapon')">卸下</button>
            </div>
            <div style="flex:1; background:#222; padding:10px; border-radius:8px; text-align:center;">
                🛡️ <b id="eq-body" style="display:block; color:var(--gold);">無</b>
                <button id="btn-unequip-body" class="btn-unequip" style="display:none; margin-top:5px;" onclick="_X_CORE.unequip('body')">卸下</button>
            </div>
        </div>
        <button class="btn-reset" onclick="_X_CORE.respec()">使用「洗點丹」</button>
    </div>

    <div id="p-bag" class="stage" style="display: none;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
            <h4>儲物袋 (<span id="bag-count">0</span>/<span id="val-bag-max">20</span>)</h4>
            <div>
                <select id="melt-filter" style="background:#333; color:#fff;">
                    <option value="0">凡品</option><option value="1">良品</option><option value="2">精品</option>
                </select>
                <button onclick="_X_CORE.quickMelt()" style="background:var(--danger) !important;">熔煉</button>
            </div>
        </div>
        <div id="bag-list" class="bag-grid"></div>
    </div>

    <div id="p-shop" class="stage" style="display: none;">
        <h4>宗門黑市</h4>
        <button onclick="_X_CORE.buyBag()" style="width:100%; height:50px;">擴充背包 (💰 <span id="val-bag-price">1000</span>)</button>
    </div>

    <nav>
        <div class="tab active" onclick="_X_CORE.switchTab('battle', this)">歷練</div>
        <div class="tab" onclick="_X_CORE.switchTab('stats', this)">修為</div>
        <div class="tab" onclick="_X_CORE.switchTab('bag', this)">儲物袋</div>
        <div class="tab" onclick="_X_CORE.switchTab('shop', this)">黑市</div>
    </nav>

    <div id="map-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:100; justify-content:center; align-items:center;">
        <div style="background:#161b22; padding:20px; border-radius:12px; border:1px solid var(--info); width:80%;">
            <h3 style="color:var(--info); text-align:center;">選擇歷練禁地</h3>
            <div id="map-list" style="margin:15px 0;"></div>
            <button onclick="document.getElementById('map-modal').style.display='none'" style="width:100%;">關閉</button>
        </div>
    </div>

    <div id="class-modal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:101; justify-content:center; align-items:center;">
        <div style="background:#161b22; padding:20px; border-radius:15px; border:2px solid var(--purple); width:80%;">
            <h3 style="color:var(--purple); text-align:center;">選擇修仙流派</h3>
            <button onclick="_X_CORE.chooseClass('sword')" style="width:100%; margin:10px 0; background:var(--danger)!important;">劍修 (攻擊)</button>
            <button onclick="_X_CORE.chooseClass('body')" style="width:100%; margin:10px 0; background:var(--success)!important;">體修 (血量)</button>
            <button onclick="_X_CORE.chooseClass('soul')" style="width:100%; margin:10px 0; background:var(--info)!important;">靈修 (爆擊)</button>
        </div>
    </div>
</div>

<script src="data.js"></script>
<script src="game.js"></script>
</body>
</html>
