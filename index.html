<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>練功修練 - 飛升 2.0 (ESM 模組化版)</title>
    
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/page_battle.css">
    <link rel="stylesheet" href="css/page_economy.css">
    <link rel="stylesheet" href="css/page_stats.css">
    <link rel="stylesheet" href="css/fx.css">
    <link rel="stylesheet" href="css/page_world.css">
    <link rel="stylesheet" href="css/page_sect.css"> 
</head>
<body>
    <header class="header-info">
        <div class="player-main-stats">
            <div id="player-realm" class="realm-title">感應天地中...</div>
            <div class="bars-stack">
                <div class="bar-container hp">
                    <div id="player-hp-fill" class="fill fill-hp" style="width: 100%;"></div>
                    <div class="bar-text">
                        <span id="player-hp-val">0</span> / <span id="player-hp-max">0</span>
                    </div>
                </div>
                <div class="bar-container exp">
                    <div id="exp-fill" class="fill fill-exp" style="width: 0%;"></div>
                    <div class="bar-text">EXP</div>
                </div>
            </div>
        </div>
        <div class="currency-display">靈石: <span id="player-coin">0</span></div>
    </header>

    <main id="game-container">
        <section id="page-battle" class="game-page active">
            <div class="map-nav-header">
                <span id="current-map-name">探尋天機中...</span>
                <button onclick="UI_Battle.showMapSelect()" class="btn-travel">🗺️ 尋找歷練地</button>
            </div>
            
            <div id="combat-area" style="display: flex; align-items: center; justify-content: space-between; gap: 15px; margin-bottom: 20px;">
                <div id="player-display" class="monster-card" style="flex:1; border-color: #3b82f6; box-shadow: 0 0 15px rgba(59, 130, 246, 0.2);">
                    <div id="player-icon" class="monster-avatar">🧘‍♂️</div>
                    <h3 style="color: #60a5fa;">修士 (你)</h3>
                    <div id="player-buffs" style="min-height: 25px; display: flex; justify-content: center; flex-wrap: wrap; gap: 5px; margin-top: 5px;"></div>
                </div>

                <div style="font-size: 20px; font-weight: bold; color: #ef4444; text-shadow: 0 0 5px rgba(239, 68, 68, 0.5);">VS</div>

                <div id="monster-display" class="monster-card" style="flex:1;">
                    <div id="monster-icon" class="monster-avatar">❓</div>
                    <h3 id="monster-name">搜尋妖氣中...</h3>
                    <div class="bar-container monster-hp">
                        <div id="monster-hp-fill" class="fill fill-hp" style="width: 100%;"></div>
                        <div class="bar-text" id="monster-hp-val">0 / 0</div>
                    </div>
                </div>
            </div>

            <div id="battle-actions" class="actions-container"></div>

            <div class="log-panel">
                <div class="log-header">
                    <span>📜 戰鬥日誌</span>
                    <div id="log-tabs"></div>
                </div>
                <div id="battle-log" class="log-content"></div>
            </div>
        </section>

        <section id="page-sect" class="game-page" style="display:none;">
            <div class="sect-header">
                <h2 class="sect-title">青雲宗門總部</h2>
                <div class="sect-subtitle">人界 · 某不知名小世界</div>
            </div>
            
            <div class="sect-hub-grid">
                <div class="dept-card" onclick="UI_Sect.openDept('herb')">
                    <div class="dept-icon">🌿</div>
                    <div class="dept-name">草藥部</div>
                </div>
                <div class="dept-card" onclick="UI_Sect.openDept('iron')">
                    <div class="dept-icon">⛏️</div>
                    <div class="dept-name">鐵礦部</div>
                </div>
                <div class="dept-card" onclick="UI_Sect.openDept('recruit')">
                    <div class="dept-icon">👥</div>
                    <div class="dept-name">招募堂</div>
                </div>
                <div class="dept-card" onclick="UI_Sect.openDept('bounty')">
                    <div class="dept-icon">📜</div>
                    <div class="dept-name">懸賞堂</div>
                </div>
                <div class="dept-card" onclick="UI_Sect.openDept('vault')">
                    <div class="dept-icon">📦</div>
                    <div class="dept-name">宗門庫房</div>
                </div>
                <div class="dept-card" onclick="Core.switchPage('world')">
                    <div class="dept-icon">☯️</div>
                    <div class="dept-name">聚靈大陣</div>
                </div>
            </div>
        </section>

        <section id="page-world" class="game-page" style="display:none; flex-direction:column;">
            <div class="page-title">隨身洞府</div>
            <div id="world-content" style="flex:1; overflow-y:auto; padding-bottom:20px;">
                </div>
        </section>

        <section id="page-stats" class="game-page" style="display:none;">
            <div class="page-title">修為與境界</div>

            <div style="display: flex; justify-content: center; gap: 15px; margin-bottom: 20px;">
                <button onclick="if(window.Player){ window.Player.save(); alert('💾 宗門紀載已更新，修為存檔成功！'); }" class="btn-eco-action" style="background: var(--exp-color); padding: 8px 15px; border-radius: 8px; border: none; color: white; cursor: pointer; font-weight: bold; flex: 1; max-width: 150px;">
                    💾 手動存檔
                </button>
                <button onclick="window.DEBUG_RESET()" class="btn-eco-action" style="background: #ef4444; padding: 8px 15px; border-radius: 8px; border: none; color: white; cursor: pointer; font-weight: bold; flex: 1; max-width: 150px;">
                    💀 重新開始
                </button>
            </div>

            <div class="equipped-section">
                <div class="section-label">🧥 當前披掛</div>
                <div id="equipped-list" class="equip-grid">
                    <div class="equip-slot empty">載入中...</div>
                </div>
            </div>
            <div id="breakthrough-area" style="display:none; text-align:center; padding: 15px;">
                <button id="btn-breakthrough" class="btn-special" onclick="if(window.TribulationSystem) window.TribulationSystem.init()">⚡ 應劫突破</button>
            </div>
            <h2 id="stat-realm-title" style="text-align:center; color:var(--accent); margin-bottom:20px;"></h2>
            <div id="stats-content" class="stats-grid"></div>
        </section>

        <section id="page-bag" class="game-page" style="display:none;">
            <div class="page-title">儲物袋</div>
            <div id="bag-filters" class="bag-filters"></div>
            <div id="bag-content" class="bag-grid"></div>
        </section>

        <section id="page-shop" class="game-page" style="display:none;">
            <div class="page-title">坊市交易</div>
            <div id="shop-content" class="shop-grid"></div>
        </section>
    </main>

    <nav class="bottom-nav">
        <button class="nav-btn active" onclick="Core.switchPage('battle')">⚔️ 歷練</button>
        <button class="nav-btn" onclick="Core.switchPage('stats')">🧘‍♂️ 修為</button>
        <button class="nav-btn" onclick="Core.switchPage('bag')">🎒 儲物</button>
        <button class="nav-btn" onclick="Core.switchPage('shop')">🏪 坊市</button>
    </nav>

    <div id="float-nav-wrap">
        <button id="btn-jump-sect" class="fab-btn" onclick="Core.switchPage('sect')">
            <span class="fab-icon">⛩️</span>
            <span class="fab-text">回宗門</span>
        </button>
        <button id="btn-jump-battle" class="fab-btn" style="display:none;" onclick="Core.switchPage('battle')">
            <span class="fab-icon">⚔️</span>
            <span class="fab-text">去歷練</span>
        </button>
    </div>

    <div id="modal-map" class="modal-overlay" style="display:none;">
        <div class="modal-box">
            <div class="modal-header">
                <h3>州郡地圖</h3>
                <button class="btn-modal-close" onclick="document.getElementById('modal-map').style.display='none'">✕</button>
            </div>
            <div class="modal-body">
                <div id="region-list" class="region-tabs"></div>
                <div id="map-list" class="map-grid"></div>
            </div>
        </div>
    </div>

    <div id="tribulation-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:10000; flex-direction:column; justify-content:center; align-items:center; color:white;">
        <div id="trib-fx-layer" style="position:absolute; width:100%; height:100%; pointer-events:none; overflow:hidden;"></div>
        
        <h2 id="trib-title" style="color:#fcd34d; text-shadow:0 0 20px #f59e0b; font-size:28px; margin-bottom:10px; z-index:1;">雷劫降臨</h2>
        <div id="trib-subtitle" style="color:#94a3b8; font-size:16px; margin-bottom:40px; z-index:1;">準備突破至新境界</div>

        <div style="width:80%; max-width:300px; margin-bottom:30px; z-index:1;">
            <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                <span style="color:#ef4444; font-weight:bold;">天雷降下倒數</span>
                <span id="trib-timer-text" style="color:#ef4444; font-weight:bold;">5.0s</span>
            </div>
            <div style="width:100%; height:10px; background:#333; border-radius:5px; overflow:hidden;">
                <div id="trib-timer-bar" style="width:100%; height:100%; background:linear-gradient(90deg, #f87171, #ef4444); transition:width 0.1s linear;"></div>
            </div>
        </div>

        <div style="width:80%; max-width:300px; margin-bottom:50px; z-index:1;">
            <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
                <span style="color:#60a5fa; font-weight:bold;">護體罡氣</span>
                <span id="trib-shield-text" style="color:#60a5fa; font-weight:bold;">0%</span>
            </div>
            <div style="width:100%; height:20px; background:#333; border-radius:10px; overflow:hidden; border:2px solid #1e3a8a;">
                <div id="trib-shield-bar" style="width:0%; height:100%; background:linear-gradient(90deg, #3b82f6, #60a5fa); transition:width 0.1s ease-out; box-shadow:0 0 10px #60a5fa;"></div>
            </div>
        </div>

        <button id="btn-trib-action" onclick="if(window.TribulationSystem) window.TribulationSystem.clickShield()" style="z-index:1; background:linear-gradient(135deg, #3b82f6, #1d4ed8); border:3px solid #60a5fa; color:white; font-size:24px; font-weight:bold; padding:20px 40px; border-radius:50px; cursor:pointer; box-shadow:0 0 30px rgba(59,130,246,0.5); display:none;">
            凝聚罡氣！
        </button>
        
        <button id="btn-trib-start" onclick="if(window.TribulationSystem) window.TribulationSystem.start()" style="z-index:1; background:linear-gradient(135deg, #f59e0b, #d97706); border:3px solid #fcd34d; color:white; font-size:20px; font-weight:bold; padding:15px 30px; border-radius:30px; cursor:pointer; box-shadow:0 0 20px rgba(245,158,11,0.5);">
            引動天雷 (開始渡劫)
        </button>

        <div id="trib-result" style="display:none; z-index:1; text-align:center; background:rgba(0,0,0,0.8); padding:30px; border-radius:15px; border:1px solid #333;">
            <h3 id="trib-result-title" style="font-size:24px; margin-bottom:15px;">結果</h3>
            <p id="trib-result-desc" style="color:#cbd5e1; margin-bottom:20px;">描述</p>
            <button onclick="if(window.TribulationSystem) window.TribulationSystem.close()" style="background:#4b5563; color:white; border:none; padding:10px 20px; border-radius:5px; cursor:pointer;">返回修為</button>
        </div>
    </div>

    <script type="module">
        // A. 導入所有神識模組
        import { Core } from './core.js';
        import { DB } from './data/database.js';
        import { UI_Battle } from './ui/ui_battle.js';
        import { UI_Bag } from './ui/ui_bag.js';
        import { UI_Shop } from './ui/ui_shop.js';
        import { UI_Stats } from './ui/ui_stats.js';
        import { UI_World } from './ui/ui_world.js';
        import { UI_Sect } from './ui/ui_sect.js';
        import { TribulationSystem } from './systems/TribulationSystem.js'; 

        // B. 建立全域橋樑 (為了 HTML 裡的 onclick 屬性能夠運作)
        window.Core = Core;
        window.DB = DB;            
        window.DATA = DB;          
        window.UI_Battle = UI_Battle;
        window.UI_Bag = UI_Bag;
        window.UI_Shop = UI_Shop;
        window.UI_Stats = UI_Stats;
        window.UI_World = UI_World; 
        window.UI_Sect = UI_Sect; 
        window.TribulationSystem = TribulationSystem; 

        // C. 點燃點火裝置
        window.onload = () => {
            console.log("%c【系統】V2.0 飛升大陣點火啟動...", "color: #fbbf24; font-weight: bold;");
            Core.init();
        };
    </script>
</body>
</html>
