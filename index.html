<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>仙俠宗門 V1.5.2 - 定音版</title>
    <style>
        :root { --p: #a29bfe; --bg: #0b0e14; --card: #161b22; --text: #c9d1d9; --gold: #ffcf40; --danger: #ff4d4d; --border: #30363d; }
        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        body { background: var(--bg); color: var(--text); font-family: sans-serif; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        #game { width: 100%; max-width: 480px; height: 100%; display: flex; flex-direction: column; border: 1px solid var(--border); position: relative; }
        .header { padding: 15px; background: var(--card); border-bottom: 2px solid var(--p); display: flex; justify-content: space-between; font-weight: bold; font-size: 14px; }
        .main { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 120px; }
        .page { display: none; } .page.active { display: block; animation: fadeIn 0.2s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid var(--border); }
        .card-title { font-size: 15px; color: var(--p); margin-bottom: 12px; border-left: 4px solid var(--p); padding-left: 10px; font-weight: bold; display: flex; justify-content: space-between; }
        /* 進度條與狀態條 */
        .bar-wrap { height: 16px; background: #000; border-radius: 8px; overflow: hidden; border: 1px solid #444; margin: 8px 0; position: relative; }
        .bar-fill { height: 100%; width: 0%; transition: width 0.1s linear; }
        .bg-hp { background: linear-gradient(90deg, #2ecc71, #23d160); }
        .bg-exp { background: linear-gradient(90deg, #9b59b6, #7d5fff); }
        .bg-m { background: linear-gradient(90deg, #e74c3c, #ff4d4d); }
        .btn { background: #21262d; color: #fff; border: 1px solid #444; padding: 6px 10px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .btn-p { background: linear-gradient(135deg, #a29bfe, #6c5ce7); border: none; padding: 15px; color: #fff; border-radius: 10px; width: 100%; font-weight: bold; font-size: 16px; margin-top: 10px; cursor: pointer; }
        .nav { position: absolute; bottom: 20px; left: 10px; right: 10px; display: grid; grid-template-columns: repeat(4, 1fr); background: rgba(22,27,34,0.95); padding: 12px; border-radius: 15px; border: 1px solid var(--border); backdrop-filter: blur(5px); }
        .nav-i { text-align: center; font-size: 12px; color: #8b949e; cursor: pointer; }
        .nav-i.active { color: var(--p); font-weight: bold; }
        #log { height: 140px; overflow-y: auto; background: #000; padding: 10px; border-radius: 8px; font-size: 12px; line-height: 1.6; color: #abb2bf; margin-top: 10px; }
        .maps { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 10px; }
        .map { min-width: 90px; padding: 10px; background: #21262d; border-radius: 8px; text-align: center; font-size: 12px; border: 1px solid var(--border); cursor: pointer; }
        .map.active { border-color: var(--p); background: rgba(162,155,254,0.1); }
    </style>
</head>
<body>
<div id="game">
    <div class="header">
        <div>🌲 <span id="u-w">0</span> | 💠 <span id="u-s">0</span></div>
        <div style="color:var(--gold)">練氣 <span id="u-lv">1</span></div>
    </div>
    <div class="main">
        <div id="p-1" class="page active">
            <div class="card" onclick="startWork('wood')"><div class="card-title">採集靈木</div><div class="bar-wrap"><div id="b-wood" class="bar-fill bg-exp"></div></div></div>
            <div class="card" onclick="startWork('stone')"><div class="card-title">採掘靈石</div><div class="bar-wrap"><div id="b-stone" class="bar-fill bg-exp"></div></div></div>
            <div class="card">
                <div class="card-title">外門管理 <button class="btn" onclick="buyD()">招募弟子 (10石)</button></div>
                <div style="font-size:13px; line-height:2.5;">待命: <b id="u-i">0</b> | 🪓: <b id="u-ww">0</b>/5 <button class="btn" onclick="job('ww')">+</button> | ⛏️: <b id="u-ws">0</b>/5 <button class="btn" onclick="job('ws')">+</button></div>
            </div>
        </div>
        <div id="p-2" class="page">
            <div class="maps" id="map-list"></div>
            <div class="card">
                <div style="display:flex; justify-content:space-between; font-size:11px"><span>👤 宗主</span> <span id="p-hp-t">100/100</span></div>
                <div class="bar-wrap"><div id="p-hp-b" class="bar-fill bg-hp"></div></div>
                <div style="display:flex; justify-content:space-between; font-size:11px; margin-top:10px;"><span id="m-n" style="color:var(--danger)">妖獸</span> <span id="m-hp-t">0/0</span></div>
                <div class="bar-wrap"><div id="m-hp-b" class="bar-fill bg-m"></div></div>
                <button class="btn-p" onclick="atk()">⚔️ 施展太乙劍訣</button>
            </div>
            <div id="log"></div>
        </div>
        <div id="p-3" class="page">
            <div class="card">
                <div class="card-title">聖體潛能 (點數: <span id="u-pts">0</span>)</div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; font-size:13px; margin-bottom:12px;">
                    <span>攻: <b id="v-atk">0</b></span> <span>爆: <b id="v-crit">0</b>%</span><span>閃: <b id="v-dex">0</b>%</span> <span>血: <b id="v-mhp">0</b></span>
                </div>
                <button class="btn" onclick="up('str')">加攻</button> <button class="btn" onclick="up('vit')">加血</button>
            </div>
            <div class="card"><div class="card-title">當前裝備</div><div id="u-eq" style="font-size:13px; line-height:1.8;"></div></div>
        </div>
        <div id="p-4" class="page">
            <div class="card"><div class="card-title">儲物袋</div><div id="u-inv" style="font-size:13px; line-height:2;"></div></div>
            <button class="btn-p" onclick="forge()">🔮 煉製隨機法寶 (5材料+10石)</button>
        </div>
    </div>
    <div class="nav">
        <div class="nav-i active" onclick="tab(1,this)">🏠 宗門</div><div class="nav-i" onclick="tab(2,this)">⚔️ 歷練</div>
        <div class="nav-i" onclick="tab(3,this)">🧘 洞察</div><div class="nav-i" onclick="tab(4,this)">🎒 儲物</div>
    </div>
</div>
<script>
let D = { wood:0, stone:0, idle:1, lv:1, exp:0, pts:0, ww:0, ws:0, str:10, crit:5, dex:5, vit:0, hp:100, mhp:100, map:0, inv:{}, eq:{ w:{n:"木劍",a:5}, a:{n:"布衣",h:0} } };
const M = [
    {n:"青草地", r:1, m:"野兔", hp:80, atk:10, exp:35, d:"兔肉"},
    {n:"黑森林", r:3, m:"灰狼", hp:350, atk:40, exp:75, d:"狼皮"},
    {n:"埋骨地", r:7, m:"骷髏", hp:1200, atk:95, exp:180, d:"碎骨"}
];
let curM = null, last = Date.now(), wT = null, wP = 0;

function loop() {
    let now = Date.now(), dt = (now-last)/1000; last = now;
    D.wood += D.ww * 0.4 * dt; D.stone += D.ws * 0.25 * dt;
    if (wT) {
        wP += dt * 85;
        let b = document.getElementById('b-'+wT);
        if(b) b.style.width = Math.min(100, wP) + "%";
        if (wP >= 100) {
            if(wT==='wood'){ D.wood+=5; msg("🌲 採得靈木"); } else { D.stone+=2; msg("💠 採得靈石"); }
            let old = wT; wT = null; wP = 0;
            setTimeout(() => { if(!wT) document.getElementById('b-'+old).style.width = "0%"; }, 100);
        }
    }
    draw(); requestAnimationFrame(loop);
}

function draw() {
    document.getElementById('u-w').innerText = Math.floor(D.wood);
    document.getElementById('u-s').innerText = Math.floor(D.stone);
    document.getElementById('u-lv').innerText = D.lv;
    document.getElementById('u-i').innerText = D.idle;
    document.getElementById('u-ww').innerText = D.ww;
    document.getElementById('u-ws').innerText = D.ws;
    document.getElementById('u-pts').innerText = D.pts;
    let a = D.str + D.eq.w.a, h = D.mhp + D.eq.a.h;
    document.getElementById('v-atk').innerText = a;
    document.getElementById('v-mhp').innerText = h;
    document.getElementById('p-hp-b').style.width = Math.max(0, (D.hp/h)*100) + "%";
    document.getElementById('p-hp-t').innerText = `${Math.ceil(D.hp)}/${h}`;
    if(curM) {
        document.getElementById('m-hp-b').style.width = Math.max(0, (curM.hp/curM.max)*100) + "%";
        document.getElementById('m-hp-t').innerText = `${Math.ceil(curM.hp)}/${curM.max}`;
        document.getElementById('m-n').innerText = curM.n;
    }
    document.getElementById('u-eq').innerHTML = `🗡️ ${D.eq.w.n} (攻+${D.eq.w.a})<br>🛡️ ${D.eq.a.n} (血+${D.eq.a.h})`;
    let invH = ""; for(let k in D.inv) if(D.inv[k]>0) invH += `【${k}】x${D.inv[k]} `;
    document.getElementById('u-inv').innerText = invH || "乾坤袋空空如也";
    renderMaps();
}

function atk() {
    if(!curM) spawn();
    let a = D.str + D.eq.w.a, h = D.mhp + D.eq.a.h;
    let d = Math.floor(a * (0.9 + Math.random()*0.3));
    curM.hp -= d; msg(`⚔️ 造成 ${d} 傷害`);
    if(curM.hp > 0) {
        if(Math.random()*100 > D.dex) {
            let md = Math.ceil(curM.atk * (0.8 + Math.random()*0.4));
            D.hp -= md; msg(`🩸 受到 ${md} 傷害`);
        } else msg("💨 閃避成功！");
    }
    if(D.hp <= 0) { D.hp = h; msg("😫 重傷撤退"); tab(1, document.querySelectorAll('.nav-i')[0]); }
    else if(curM.hp <= 0) {
        msg(`✅ 擊敗 ${curM.n}`); D.inv[M[D.map].d] = (D.inv[M[D.map].d]||0)+1;
        D.exp += M[D.map].exp; if(D.exp>=100){ D.exp=0; D.lv++; D.pts+=3; msg("🌟 境界提升！"); }
        spawn();
    }
}

function forge() {
    let total = 0; for(let k in D.inv) total += D.inv[k];
    if(total >= 5 && D.stone >= 10) {
        D.stone -= 10; let rem = 5;
        for(let k in D.inv) { let q = Math.min(D.inv[k], rem); D.inv[k]-=q; rem-=q; }
        const n1=["破滅","寒霜","流光","焚天"], n2=["劍","鎧","環","盾"];
        let name = n1[Math.floor(Math.random()*4)]+n2[Math.floor(Math.random()*4)];
        if(Math.random()>0.5) { D.eq.w = { n: name, a: 15+D.lv*6 }; msg(`🔮 煉得神兵：${name}`); }
        else { D.eq.a = { n: name, h: 120+D.lv*55 }; msg(`🔮 煉得靈鎧：${name}`); }
    } else msg("❌ 材料不足 (需5材料+10石)");
}

function startWork(t) { if(!wT) { wT = t; wP = 0; } }
function buyD() { if(D.stone>=10){ D.stone-=10; D.idle++; msg("🤝 招募成功"); } }
function job(t) { if(D.idle>0 && D[t]<5){ D[t]++; D.idle--; } }
function up(k) { 
    if(D.pts>0){ 
        if(k==='str') D.str+=4; 
        else { D.mhp+=60; D.hp = D.mhp + D.eq.a.h; } 
        D.pts--; msg("🧘 修煉成功"); 
    } 
}
function renderMaps() {
    let h = ""; M.forEach((m,i)=>{
        let lock = D.lv<m.r;
        h += `<div class="map ${D.map===i?'active':''}" onclick="${lock?'':'D.map='+i+';spawn();msg(\'🚩 前往\'+M['+i+'].n)'}">${m.n}<br><small>${lock?m.r+'層開啟':''}</small></div>`;
    });
    document.getElementById('map-list').innerHTML = h;
}
function spawn() { let m = M[D.map]; curM = { n:m.m, hp:m.hp, max:m.hp, atk:m.atk }; }
function tab(p,el) {
    document.querySelectorAll('.page').forEach(pg=>pg.classList.remove('active'));
    document.getElementById('p-'+p).classList.add('active');
    document.querySelectorAll('.nav-i').forEach(n=>n.classList.remove('active')); el.classList.add('active');
}
function msg(m) {
    const l = document.getElementById('log'); l.innerHTML = `<div>> ${m}</div>` + l.innerHTML;
    if(l.children.length > 25) l.lastChild.remove();
}
spawn(); loop();
</script>
</body>
</html>
