<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>宗門修仙錄 V1.7.0 - 碎裂虛空</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div class="header-info">
            <div class="realm-box">
                <span id="player-realm">載入中...</span>
                <div class="exp-bar-container">
                    <div id="exp-fill" class="exp-fill"></div>
                </div>
            </div>
            <div class="currency-box">
                <span class="coin-icon">💰</span>
                <span id="player-coin">0</span>
            </div>
        </div>

        <main id="main-display">
            <section id="page-battle" class="game-page active">
                <div class="region-header">
                    <h2 id="current-map-name">---</h2>
                    <button onclick="UI_Map.show()" class="change-map-btn">切換歷練地</button>
                </div>
                
                <div id="combat-area">
                    <div id="damage-container"></div>
                    
                    <div id="monster-display" class="monster-card">
                        <div id="monster-icon" class="monster-icon">❓</div>
                        <h3 id="monster-name">尋覓中...</h3>
                        <div class="hp-bar-container">
                            <div id="monster-hp-fill" class="hp-fill"></div>
                            <span id="monster-hp-text">0/0</span>
                        </div>
                    </div>
                    <div id="searching-display" class="searching-box" style="display: none;">
                        <span class="search-text">正在搜尋妖獸蹤跡...</span>
                    </div>
                </div>

                <div id="log-system" class="log-system expanded">
                    <div class="log-header">
                        <span>戰鬥日誌</span>
                        <button id="log-toggle" onclick="UI_Log.toggle()">收合 🔼</button>
                    </div>
                    <div id="log-list" class="log-list"></div>
                </div>
            </section>

            <section id="page-stats" class="game-page">
                <div class="stats-container">
                    <h3 id="stat-realm-title">---</h3>
                    <div class="stats-grid">
                        <div class="stat-item">力量：<span id="stat-str">0</span> <button onclick="UI_Stats.add('str')">+</button></div>
                        <div class="stat-item">體質：<span id="stat-con">0</span> <button onclick="UI_Stats.add('con')">+</button></div>
                        <div class="stat-item">敏捷：<span id="stat-dex">0</span> <button onclick="UI_Stats.add('dex')">+</button></div>
                        <div class="stat-item">悟性：<span id="stat-int">0</span> <button onclick="UI_Stats.add('int')">+</button></div>
                    </div>
                    <div class="stat-points">可用屬性點：<span id="stat-points">0</span></div>
                    <hr>
                    <div class="stat-preview">
                        <p>生命值：<span id="stat-hp-preview">0</span></p>
                        <p>攻擊力：<span id="stat-atk-preview">0</span></p>
                    </div>
                </div>
            </section>

            <section id="page-bag" class="game-page">
                <div class="bag-header">
                    <h3>儲物袋 (<span id="bag-count">0</span>/50)</h3>
                    <div class="bag-tabs">
                        <button onclick="UI_Bag.filter('all')">全部</button>
                        <button onclick="UI_Bag.filter('equip')">裝備</button>
                        <button onclick="UI_Bag.filter('fragment')">殘卷</button>
                    </div>
                </div>
                <div id="bag-grid" class="bag-grid"></div>
            </section>

            <section id="page-shop" class="game-page">
                <div class="shop-container">
                    <h3>坊市交易</h3>
                    <div id="shop-list" class="shop-list"></div>
                </div>
            </section>
        </main>

        <nav class="nav-bar">
            <button onclick="Navigation.switch('battle')">歷練</button>
            <button onclick="Navigation.switch('stats')">修為</button>
            <button onclick="Navigation.switch('bag')">儲物袋</button>
            <button onclick="Navigation.switch('shop')">坊市</button>
        </nav>

        <div id="modal-map" class="modal" style="display:none;">
            <div class="modal-content">
                <div id="region-list"></div>
                <div id="map-list"></div>
                <button onclick="UI_Map.close()">關閉</button>
            </div>
        </div>

        <div id="modal-detail" class="modal" style="display:none;">
            <div class="modal-content" id="item-detail-content"></div>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="player.js"></script>
    <script src="combat.js"></script>
    <script src="ui_battle.js"></script>
    <script src="ui_log.js"></script>
    <script src="ui_map.js"></script>
    <script src="ui_bag.js"></script>
    <script src="ui_stats.js"></script>
    <script src="ui_shop.js"></script>
    <script src="main.js"></script>
</body>
</html>
