<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>仙俠宗門 - 不反悔 V1.4 實裝版</title>
    <style>
        /* =========================================
           基礎定色與視覺系統
           ========================================= */
        :root { 
            --p: #a29bfe; --bg: #0b0e14; --card: #161b22; --text: #c9d1d9; 
            --gold: #ffcf40; --danger: #ff4d4d; --border: #30363d; --hp-p: #23d160; --exp-c: #7d5fff;
        }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { background: var(--bg); color: var(--text); margin: 0; font-family: "PingFang TC", sans-serif; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        #game { width: 100%; max-width: 480px; display: flex; flex-direction: column; border: 1px solid var(--border); position: relative; }
        .header { padding: 15px; background: #161b22; border-bottom: 2px solid var(--p); display: flex; justify-content: space-between; align-items: center; }
        .main { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 120px; }
        .page { display: none; } .page.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .card { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; border: 1px solid var(--border); position: relative; }
        .card-title { font-size: 15px; font-weight: bold; margin-bottom: 12px; color: var(--p); border-left: 3px solid var(--p); padding-left: 8px; }
        .btn { background: #21262d; color: #fff; border: 1px solid #444; padding: 6px 12px; border-radius: 6px; cursor: pointer; font-size: 12px; }
        .btn:active { transform: scale(0.95); }
        .btn-p { background: linear-gradient(135deg, #a29bfe, #6c5ce7); border: none; font-weight: bold; width: 100%; padding: 14px; color: white; border-radius: 10px; font-size: 18px; margin-top: 10px; cursor: pointer; }
        .bar-container { margin: 10px 0; }
        .bar-label { font-size: 11px; display: flex; justify-content: space-between; margin-bottom: 4px; }
        .bar-outer { height: 14px; background: #000; border-radius: 7px; overflow: hidden; border: 1px solid #444; position: relative; }
        .bar-inner { height: 100%; width: 0%; transition: width 0.3s; }
        .hp-player-bg { background: #23d160; } .hp-mob-bg { background: #ff4d4d; } .exp-bg { background: #7d5fff; }
        .nav { position: absolute; bottom: 15px; left: 10px; right: 10px; display: grid; grid-template-columns: repeat(4, 1fr); background: #161b22; padding: 12px; border-radius: 18px; border: 1px solid var(--border); }
        .nav-item { text-align: center; font-size: 12px; cursor: pointer; color: #8b949e; }
        .nav-item.active { color: var(--p); font-weight: bold; }
        #log { height: 110px; overflow-y: auto; background: rgba(0,0,0,0.3); padding: 10px; font-size: 11px; border-radius: 8px; border: 1px solid var(--border); margin-top: 10px; }
        .map-scroll { display: flex; gap: 10px; overflow-x: auto; padding-bottom: 8px; }
        .map-item { min-width: 100px; padding: 10px; background: #21262d; border: 1px solid var(--border); border-radius: 8px; font-size: 11px; text-align: center; cursor: pointer; }
        .map-item.active { border-color: var(--p); color: var(--p); }
        .eq-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 10px; }
        .eq-slot { background: #0d1117; border: 1px dashed #444; padding: 10px; border-radius: 8px; text-align: center; font-size: 11px; }
        .eq-slot b { color: var(--gold); display: block; margin-bottom: 4px; }
    </style>
</head>
<body>

<div id="game">
    <div class="header">
        <div class="res-item">📜 靈木: <span id="u-wood">0</span> | 💠 靈石: <span id="u-stone">0</span></div>
        <div style="color:var(--gold); font-weight:bold;">練氣 <span id="u-lv">1</span> 層</div>
    </div>

    <div class="main">
        <div id="p-sect" class="page active">
            <div class="card" onclick="startManualWork('wood')">
                <div class="card-title">擷取·靈木精華</div>
                <div style="font-size:12px; color:#8b949e; margin-bottom:8px;">手動採集：點擊開始，進度滿即獲得。</div>
                <div class="bar-outer" style="height:8px;">
                    <div id="w-wood-bar" class="bar-inner exp-bg" style="width:0%; transition: none;"></div>
                </div>
            </div>
            
            <div class="card" onclick="startManualWork('stone')">
                <div class="card-title">探尋·靈礦地脈</div>
                <div style="font-size:12px; color:#8b949e; margin-bottom:8px;">手動挖掘：獲取靈石的基礎途徑。</div>
                <div class="bar-outer" style="height:8px;">
                    <div id="w-stone-bar" class="bar-inner exp-bg" style="width:0%; transition: none;"></div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">外門堂口 <button class="btn" style="float:right" onclick="recruitDisciple()">招募弟子 (10石)</button></div>
                <div style="font-size:13px; line-height:2.4;">
                    🧘 待命弟子：<b id="u-idle">0</b> 人<br>
                    🪓 伐木堂：<b id="u-wW">0</b> / 5 人 <button class="btn" onclick="assignJob('wW')">調派上工</button><br>
                    ⛏️ 採礦堂：<b id="u-wS">0</b> / 5 人 <button class="btn" onclick="assignJob('wS')">調派上工</button>
                </div>
            </div>
        </div>

        <div id="p-rpg" class="page">
            <div class="map-scroll" id="map-list"></div>
            <div class="card">
                <div class="bar-container">
                    <div class="bar-label"><span>👤 宗主聖體</span><span id="p-hp-txt">100 / 100</span></div>
                    <div class="bar-outer"><div id="p-hp-bar" class="bar-inner hp-player-bg"></div></div>
                </div>
                <div class="bar-container">
                    <div class="bar-label"><span id="m-name" style="color:var(--danger)">當前妖獸</span><span id="m-hp-txt">0 / 0</span></div>
                    <div class="bar-outer"><div id="m-hp-bar" class="bar-inner hp-mob-bg"></div></div>
                </div>
                <button class="btn-p" onclick="playerAttack()">⚔️ 施展·太乙劍訣</button>
            </div>
            <div id="log"></div>
        </div>

        <div id="p-stat" class="page">
            <div class="card">
                <div class="card-title">全身裝備</div>
                <div class="eq-grid">
                    <div class="eq-slot"><b>[神兵]</b><span id="eq-w">九儀天誅劍</span></div>
                    <div class="eq-slot"><b>[靈袍]</b><span id="eq-a">凡人布衣</span></div>
                    <div class="eq-slot"><b>[飾品]</b><span id="eq-r">無</span></div>
                </div>
            </div>
            <div class="card">
                <div class="card-title">聖體潛能 (星點: <span id="u-pts">0</span>)</div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px; font-size:12px; margin-bottom:15px;">
                    <span>神威: <b id="v-atk">0</b></span> <span>天運: <b id="v-crit">0</b>%</span>
                    <span>靈動: <b id="v-dex">0</b>%</span> <span>氣血: <b id="v-mhp">0</b></span>
                </div>
                <div style="display:grid; grid-template-columns:repeat(4, 1fr); gap:5px;">
                    <button class="btn" onclick="spendPoint('str')">加攻</button>
                    <button class="btn" onclick="spendPoint('crit')">加爆</button>
                    <button class="btn" onclick="spendPoint('dex')">加閃</button>
                    <button class="btn" onclick="spendPoint('vit')">加血</button>
                </div>
            </div>
        </div>

        <div id="p-eq" class="page">
            <div class="card">
                <div class="card-title">乾坤儲物袋</div>
                <div id="inv-list" style="font-size:12px; line-height:2.2;"></div>
            </div>
            <div class="card">
                <div class="card-title">九天煉器爐</div>
                <button class="btn" style="width:48%" onclick="forgeEquip('armor')">煉製靈袍</button>
                <button class="btn" style="width:48%" onclick="forgeEquip('ring')">煉製飾品</button>
            </div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="changePage('sect', this)">🏠 宗門</div>
        <div class="nav-item" onclick="changePage('rpg', this)">⚔️ 歷練</div>
        <div class="nav-item" onclick="changePage('stat', this)">🧘 洞察</div>
        <div class="nav-item" onclick="changePage('eq', this)">🎒 儲物</div>
    </div>
</div>

<script>
/* =========================================
   核心數據與修復後的邏輯
   ========================================= */
let userData = {
    wood: 0, stone: 0, idle: 1, lv: 1, exp: 0, pts: 0,
    wW: 0, wS: 0, // 堂口人數
    str: 10, crit: 5, dex: 5, vit: 0, hp: 100, mHp: 100,
    curMap: 0,
    inventory: { soul: 0, meat: 0, iron: 0, claw: 0, bone: 0, orb: 0 },
    equips: {
        weapon: { n: "九儀天誅劍", atk: 5, crit: 2 },
        armor: { n: "凡人布衣", hp: 0, dex: 0 },
        ring: { n: "無", str: 0, vamp: 0 }
    }
};

const mapDatabase = [
    { n: "青翠山徑", req: 1, mon: "野豬", hp: 50, atk: 6, exp: 8, drop: 'meat' },
    { n: "幽暗靈礦", req: 5, mon: "石巨人", hp: 200, atk: 20, exp: 25, drop: 'iron' }
];

let currentMob = null, lastUpdate = Date.now(), manualWorkTask = null, manualWorkProgress = 0;

function gameLoop() {
    const now = Date.now(), dt = (now - lastUpdate) / 1000; lastUpdate = now;

    // --- 修復點 1：自動產出邏輯 ---
    // 每一秒，每位弟子貢獻 0.5 單位資源
    userData.wood += userData.wW * 0.5 * dt;
    userData.stone += userData.wS * 0.3 * dt;

    // --- 修復點 2：手動採集進度條邏輯 ---
    if (manualWorkTask) {
        manualWorkProgress += dt * 100; // 約1秒完成
        const bar = document.getElementById(`w-${manualWorkTask}-bar`);
        if (bar) bar.style.width = Math.min(100, manualWorkProgress) + "%";
        
        if (manualWorkProgress >= 100) {
            if (manualWorkTask === 'wood') userData.wood += 5;
            if (manualWorkTask === 'stone') userData.stone += 2;
            pushLog(`✨ 完成一次手動${manualWorkTask==='wood'?'伐木':'採礦'}`);
            
            // 重置
            if (bar) bar.style.width = "0%";
            manualWorkTask = null;
            manualWorkProgress = 0;
        }
    }

    updateUI();
    requestAnimationFrame(gameLoop);
}

function updateUI() {
    document.getElementById('u-wood').innerText = Math.floor(userData.wood);
    document.getElementById('u-stone').innerText = Math.floor(userData.stone);
    document.getElementById('u-lv').innerText = userData.lv;
    document.getElementById('u-idle').innerText = userData.idle;
    document.getElementById('u-wW').innerText = userData.wW;
    document.getElementById('u-wS').innerText = userData.wS;
    document.getElementById('u-pts').innerText = userData.pts;
    
    let finalAtk = userData.str + (userData.equips.weapon.atk || 0) + (userData.equips.ring.str || 0);
    let finalMhp = userData.mHp + (userData.equips.armor.hp || 0);
    let finalDex = userData.dex + (userData.equips.armor.dex || 0);
    let finalCrit = userData.crit + (userData.equips.weapon.crit || 0);

    document.getElementById('v-atk').innerText = finalAtk;
    document.getElementById('v-mhp').innerText = finalMhp;
    document.getElementById('v-dex').innerText = finalDex;
    document.getElementById('v-crit').innerText = finalCrit;

    document.getElementById('p-hp-bar').style.width = (userData.hp / finalMhp) * 100 + "%";
    document.getElementById('p-hp-txt').innerText = `${Math.ceil(userData.hp)} / ${finalMhp}`;
    
    document.getElementById('eq-w').innerText = userData.equips.weapon.n;
    document.getElementById('eq-a').innerText = userData.equips.armor.n;
    document.getElementById('eq-r').innerText = userData.equips.ring.n;

    if (currentMob) {
        document.getElementById('m-hp-bar').style.width = (currentMob.hp / currentMob.max) * 100 + "%";
        document.getElementById('m-hp-txt').innerText = `${Math.ceil(currentMob.hp)} / ${currentMob.max}`;
        document.getElementById('m-name').innerText = currentMob.n;
    }
    renderMaps(); renderInventory();
}

function startManualWork(t) { 
    if (!manualWorkTask) {
        manualWorkTask = t; 
        manualWorkProgress = 0;
    }
}

function assignJob(t) { 
    if (userData.idle > 0) { 
        userData[t]++; 
        userData.idle--; 
        pushLog(`👷 調派了一名弟子前往堂口`);
    } else {
        pushLog(`❌ 沒有待命的弟子了`);
    }
}

function recruitDisciple() { 
    if (userData.stone >= 10) { 
        userData.stone -= 10; 
        userData.idle++; 
        pushLog("🤝 招募到一名新弟子"); 
    } 
}

function playerAttack() {
    if (!currentMob) spawnMob();
    let finalAtk = userData.str + (userData.equips.weapon.atk || 0) + (userData.equips.ring.str || 0);
    let finalMhp = userData.mHp + (userData.equips.armor.hp || 0);
    let finalDex = userData.dex + (userData.equips.armor.dex || 0);
    let finalCrit = userData.crit + (userData.equips.weapon.crit || 0);

    let dmg = Math.floor(finalAtk * (0.9 + Math.random() * 0.2));
    if (Math.random()*100 < finalCrit) dmg *= 2;
    currentMob.hp -= dmg; pushLog(`⚔️ 施展太乙劍訣，造成 ${dmg} 傷害`);

    if (currentMob.hp > 0) {
        if (Math.random() * 100 > finalDex) {
            let mDmg = Math.ceil(currentMob.atk * (0.8 + Math.random() * 0.4));
            userData.hp -= mDmg; pushLog(`🩸 受損 ${mDmg}`);
        } else pushLog("💨 閃避！");
    }

    if (userData.hp <= 0) { 
        userData.hp = finalMhp; 
        pushLog("😫 體力不支，聖體在大陣中重塑滿血！"); 
        changePage('sect', document.querySelectorAll('.nav-item')[0]); 
    } else if (currentMob.hp <= 0) {
        pushLog(`✅ 擊殺 ${currentMob.n}`);
        userData.inventory[mapDatabase[userData.curMap].drop]++;
        userData.exp += mapDatabase[userData.curMap].exp;
        if (userData.exp >= 50) { userData.exp -= 50; userData.lv++; userData.pts++; }
        spawnMob();
    }
}

function forgeEquip(type) {
    let materialCount = 0;
    for(let key in userData.inventory) { if(key !== 'soul') materialCount += userData.inventory[key]; }
    if (materialCount >= 5 && userData.stone >= 10) {
        userData.stone -= 10;
        let needed = 5;
        for(let key in userData.inventory) { if(key !== 'soul' && needed > 0) { let take = Math.min(userData.inventory[key], needed); userData.inventory[key]-=take; needed-=take; } }
        if (type === 'armor') { userData.equips.armor = { n: "靈光法袍", hp: 100, dex: 5 }; }
        else { userData.equips.ring = { n: "聚靈戒指", str: 10 }; }
        pushLog("🔮 煉製成功！");
    }
}

function renderInventory() {
    let h = ""; const dict = { meat:'妖豬肉', iron:'百煉玄鐵' };
    for (let id in dict) { if (userData.inventory[id] > 0) h += `<span>📦 ${dict[id]}: ${userData.inventory[id]}</span><br>`; }
    document.getElementById('inv-list').innerHTML = h || "空空如也";
}

function renderMaps() {
    let h = ""; mapDatabase.forEach((m, i) => { h += `<div class="map-item ${userData.curMap===i?'active':''}" onclick="selectMap(${i})">${m.n}</div>`; });
    document.getElementById('map-list').innerHTML = h;
}

function selectMap(i) { userData.curMap = i; spawnMob(); }
function spawnMob() { const m = mapDatabase[userData.curMap]; currentMob = { n: m.mon, hp: m.hp, max: m.hp, atk: m.atk }; }
function spendPoint(k) { if (userData.pts > 0) { userData[k]++; userData.pts--; if(k==='vit') userData.mHp+=20; } }
function changePage(p, el) {
    document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
    document.getElementById('p-' + p).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); el.classList.add('active');
}
function pushLog(msg) {
    const l = document.getElementById('log'); l.innerHTML = `<div>> ${msg}</div>` + l.innerHTML;
    if (l.children.length > 15) l.lastChild.remove();
}
spawnMob(); gameLoop();
</script>
</body>
</html>
