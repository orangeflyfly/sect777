<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仙俠宗門 V1.8.8 - 萬法歸宗完整版</title>
    <style>
        /* =========================================
           核心樣式：確保深色修仙風格與視覺質感
           ========================================= */
        :root {
            --color-primary: #a29bfe; 
            --color-primary-dark: #6c5ce7;
            --color-bg-deep: #0b0e14; 
            --color-card-bg: rgba(30, 35, 45, 0.98);
            --color-text-main: #adbac7; 
            --color-gold: #ffcf40;
            --color-danger: #f85149; 
            --color-success: #3fb950;
            --color-info: #0fbcf9; 
            --color-border: rgba(162,155,254,0.6);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            user-select: none; 
        }

        body { 
            background: #000; 
            color: var(--color-text-main); 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            overflow: hidden; 
        }

        /* 遊戲主容器 */
        #app {
            width: 100%; 
            max-width: 500px; 
            height: 100%; 
            background: radial-gradient(circle at top, #1a1c2c 0%, #0b0e14 100%);
            display: flex; 
            flex-direction: column; 
            position: relative; 
            border: 2px solid var(--color-border);
            box-shadow: 0 0 50px rgba(108, 92, 231, 0.2);
        }

        /* 突破全螢幕特效 */
        #breakthrough-fx {
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: white; 
            opacity: 0; 
            pointer-events: none; 
            z-index: 999;
        }

        @keyframes breakthrough-flash {
            0% { opacity: 0; }
            50% { opacity: 0.8; }
            100% { opacity: 0; }
        }

        /* 頂部資源列 */
        header { 
            padding: 25px 20px; 
            background: rgba(20, 25, 35, 0.98); 
            border-bottom: 3px solid var(--color-primary); 
            z-index: 100; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.5); 
        }

        .res-row { 
            display: flex; 
            gap: 12px; 
            margin-bottom: 15px; 
        }

        .res-item { 
            background: linear-gradient(180deg, #222, #000); 
            padding: 8px 15px; 
            border-radius: 20px; 
            font-size: 14px; 
            border: 1px solid var(--color-border); 
            color: #fff; 
            box-shadow: inset 0 0 5px rgba(255,255,255,0.1);
        }

        .realm-info {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
        }

        .realm-tag { 
            color: var(--color-gold); 
            font-size: 28px; 
            font-weight: 900; 
            text-shadow: 0 0 15px rgba(255,207,64,0.6); 
            letter-spacing: 2px; 
        }

        /* 內容顯示區 */
        .stage { 
            flex: 1; 
            overflow-y: auto; 
            padding: 20px; 
            padding-bottom: 130px; 
        }

        .page { 
            display: none; 
        }

        .page.active { 
            display: block; 
            animation: slideIn 0.5s ease-out; 
        }

        @keyframes slideIn { 
            from { opacity: 0; transform: translateX(30px); } 
            to { opacity: 1; transform: translateX(0); } 
        }

        /* 卡片與元件 */
        .card { 
            background: var(--color-card-bg); 
            border-radius: 20px; 
            padding: 20px; 
            margin-bottom: 20px; 
            border: 1px solid var(--color-border); 
            position: relative; 
            box-shadow: 0 8px 20px rgba(0,0,0,0.4); 
        }

        .card-title { 
            font-size: 18px; 
            font-weight: bold; 
            margin-bottom: 15px; 
            color: #fff; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
        }

        .card-title::before { 
            content: ''; 
            width: 5px; 
            height: 18px; 
            background: var(--color-gold); 
            border-radius: 2px; 
        }

        /* 血條視覺強化系統 */
        .hp-label { 
            display: flex; 
            justify-content: space-between; 
            font-size: 13px; 
            margin-bottom: 5px; 
            color: #ccc; 
        }

        .hp-wrap { 
            height: 40px; 
            background: #000; 
            border-radius: 20px; 
            overflow: hidden; 
            margin-bottom: 15px; 
            border: 2px solid #444; 
            position: relative; 
            box-shadow: inset 0 0 10px #000;
        }

        .hp-fill { 
            height: 100%; 
            transition: width 0.3s ease-out; 
            position: relative;
        }

        .hp-text { 
            position: absolute; 
            width: 100%; 
            text-align: center; 
            font-size: 16px; 
            line-height: 36px; 
            color: #fff; 
            font-weight: 900; 
            text-shadow: 1px 1px 3px #000; 
            z-index: 10; 
            pointer-events: none; 
        }

        /* 傷害飄字 */
        @keyframes dmgFloat { 
            0% { transform: translate(-50%, 0) scale(0.8); opacity: 0; } 
            20% { opacity: 1; transform: translate(-50%, -30px) scale(1.3); }
            100% { transform: translate(-50%, -80px) scale(1); opacity: 0; } 
        }
        .dmg-pop { 
            position: absolute; 
            left: 50%; 
            top: 30%; 
            font-weight: 900; 
            font-size: 30px; 
            animation: dmgFloat 0.8s forwards; 
            z-index: 1000; 
            text-shadow: 2px 2px 0 #000;
        }

        /* 按鈕設計 */
        .btn-main { 
            width: 100%; 
            padding: 16px; 
            border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.1); 
            background: linear-gradient(135deg, var(--color-primary-dark), var(--color-primary)); 
            color: #fff; 
            font-weight: 900; 
            font-size: 18px; 
            cursor: pointer; 
            transition: 0.2s; 
            margin-bottom: 10px; 
            box-shadow: 0 4px 12px rgba(108, 92, 231, 0.3);
        }

        .btn-main:active { 
            transform: scale(0.97); 
        }

        .btn-main:disabled { 
            background: #222; 
            color: #555; 
            cursor: not-allowed; 
            box-shadow: none;
        }

        /* 日誌系統 */
        #log-box { 
            height: 160px; 
            overflow-y: auto; 
            background: rgba(0,0,0,0.7); 
            border-radius: 15px; 
            padding: 15px; 
            font-size: 13px; 
            border: 1px solid var(--color-border); 
            line-height: 1.8; 
            color: #adbac7;
        }

        /* 導覽列 */
        nav { 
            position: absolute; 
            bottom: 20px; 
            left: 15px; 
            right: 15px; 
            height: 80px; 
            background: rgba(25, 30, 40, 0.98); 
            border-radius: 40px; 
            display: flex; 
            border: 2px solid var(--color-primary); 
            backdrop-filter: blur(15px); 
            z-index: 200; 
        }

        .nav-btn { 
            color: #555; 
            cursor: pointer; 
            text-align: center; 
            flex: 1; 
            padding: 12px 0; 
            transition: 0.3s; 
        }

        .nav-btn.active { 
            color: var(--color-gold); 
            transform: translateY(-5px); 
        }

        .nav-btn span { 
            font-size: 26px; 
            display: block; 
        }

        /* 地圖選擇器 */
        .map-tabs { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 15px; 
            overflow-x: auto; 
            padding: 5px; 
        }

        .map-btn { 
            padding: 8px 18px; 
            border-radius: 20px; 
            background: #000; 
            border: 1px solid #444; 
            color: #777; 
            cursor: pointer; 
            white-space: nowrap; 
            transition: 0.3s; 
        }

        .map-btn.active { 
            background: var(--color-primary-dark); 
            border-color: var(--color-gold); 
            color: #fff; 
        }

        /* 背包網格 */
        .bag-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 12px; 
        }

        .bag-item { 
            background: rgba(255,255,255,0.03); 
            border: 1px solid var(--color-border); 
            border-radius: 12px; 
            padding: 15px 5px; 
            text-align: center; 
            cursor: pointer; 
        }

        .bag-item:active { 
            background: rgba(255,255,255,0.1); 
        }

        .bag-item b { 
            color: var(--color-gold); 
            display: block; 
            margin-top: 5px; 
        }

        .bag-item small {
            display: block;
            color: var(--color-info);
            font-size: 10px;
            margin-top: 4px;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="breakthrough-fx"></div>

    <header>
        <div class="res-row">
            <div class="res-item">🪵 靈木: <span id="val-wood">0</span></div>
            <div class="res-item">💠 靈石: <span id="val-stone">0</span></div>
            <div class="res-item">🍀 氣運: <span id="val-luck">--</span></div>
        </div>
        <div class="realm-info">
            <div>
                <span class="realm-tag" id="val-realm">載入中</span><br>
                <span id="val-lv" style="color:var(--color-primary); font-weight:bold;">第 1 層</span>
            </div>
            <div style="text-align:right">
                <small style="color:#555">宗門威能</small><br>
                <b id="val-power" style="color:var(--color-gold); font-size:22px;">0</b>
            </div>
        </div>
    </header>

    <main class="stage">
        
        <div id="p1" class="page active">
            <div class="card">
                <div class="card-title">👥 宗門招募系統</div>
                <button class="btn-main" onclick="game.recruit()">招募外門弟子 (靈石:<span id="d-cost">0</span>)</button>
                <div style="background:rgba(0,0,0,0.3); padding:10px; border-radius:10px; text-align:center;">
                    總弟子數：<b id="val-d-total">0</b> | 待命：<b id="val-d-idle" style="color:var(--color-success)">0</b>
                </div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:15px;">
                    <div style="text-align:center; background:#111; padding:10px; border-radius:12px; border:1px solid #333;">
                        <small>🌲 伐木工作組</small><br><b id="d-wood" style="font-size:18px; color:var(--color-gold)">0</b>
                        <div style="display:flex; gap:5px; margin-top:8px;">
                            <button class="btn-main" style="padding:5px; font-size:12px;" onclick="game.assign('wood', 1)">+</button>
                            <button class="btn-main" style="padding:5px; font-size:12px; background:var(--color-danger);" onclick="game.assign('wood', -1)">-</button>
                        </div>
                    </div>
                    <div style="text-align:center; background:#111; padding:10px; border-radius:12px; border:1px solid #333;">
                        <small>💎 採礦工作組</small><br><b id="d-stone" style="font-size:18px; color:var(--color-info)">0</b>
                        <div style="display:flex; gap:5px; margin-top:8px;">
                            <button class="btn-main" style="padding:5px; font-size:12px;" onclick="game.assign('stone', 1)">+</button>
                            <button class="btn-main" style="padding:5px; font-size:12px; background:var(--color-danger);" onclick="game.assign('stone', -1)">-</button>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="card" onclick="game.manualWork()">
                <div class="card-title">🪓 手動收集靈木</div>
                <div class="hp-wrap">
                    <div id="bar-work" class="hp-fill" style="width:0%; background:var(--color-primary)"></div>
                    <div class="hp-text">點擊螢幕進行勞動</div>
                </div>
            </div>
        </div>

        <div id="p2" class="page">
            <div class="map-tabs" id="map-list"></div>
            
            <div class="card" id="battle-field">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                    <b id="m-name" style="font-size:20px; color:var(--color-gold);">正在尋找目標...</b>
                    <label style="font-size:14px; color:var(--color-primary); font-weight:bold;">
                        <input type="checkbox" id="auto-check" onchange="game.toggleAuto()"> 自動歷練
                    </label>
                </div>

                <div class="hp-label"><span>👹 妖獸氣息</span><span id="m-hp-val">0 / 0</span></div>
                <div class="hp-wrap" id="m-hp-box" style="border-color: var(--color-danger); height:46px;">
                    <div id="m-hp-bar" class="hp-fill" style="background: linear-gradient(90deg, #ff4d4d, #96281b); width:0%"></div>
                    <div class="hp-text" id="m-hp-txt" style="line-height:42px; font-size:20px;">血量狀態</div>
                </div>

                <div class="hp-label"><span>🧘 掌門真元</span><span id="p-hp-val">0 / 0</span></div>
                <div class="hp-wrap" id="p-hp-box" style="border-color: var(--color-success); height:46px;">
                    <div id="p-hp-bar" class="hp-fill" style="background: linear-gradient(90deg, #2ecc71, #27ae60); width:100%"></div>
                    <div class="hp-text" id="p-hp-txt" style="line-height:42px; font-size:20px;">精神飽滿</div>
                </div>

                <div style="display:grid; grid-template-columns: 2fr 1fr; gap:12px; margin-top:10px;">
                    <button class="btn-main" onclick="game.doAttack()" style="height:65px; font-size:22px;">發動攻擊</button>
                    <button class="btn-main" style="background:var(--color-info); height:65px;" onclick="game.meditate()">打坐回氣</button>
                </div>
            </div>

            <div id="log-box"></div>
        </div>

        <div id="p3" class="page">
            <div class="card">
                <div class="card-title">📜 境界與屬性</div>
                <div style="display:flex; justify-content:space-around; background:rgba(0,0,0,0.5); padding:15px; border-radius:15px;">
                    <div style="text-align:center;"><small>攻擊力</small><br><b id="st-atk" style="color:var(--color-info)">0</b></div>
                    <div style="text-align:center;"><small>生命值</small><br><b id="st-hp" style="color:var(--color-danger)">0</b></div>
                    <div style="text-align:center;"><small>感悟點</small><br><b id="st-pts" style="color:var(--color-gold)">0</b></div>
                </div>
                <button class="btn-main" style="margin-top:15px;" onclick="game.upgrade()">消耗 5 點感悟提升境界</button>
            </div>

            <div class="card">
                <div class="card-title">🎒 儲物袋 (背包)</div>
                <div id="bag-grid" class="bag-grid"></div>
            </div>
        </div>

    </main>

    <nav>
        <div class="nav-btn active" onclick="game.switchTab(1,this)"><span>⛩️</span><small>宗門</small></div>
        <div class="nav-btn" onclick="game.switchTab(2,this)"><span>⚔️</span><small>歷練</small></div>
        <div class="nav-btn" onclick="game.switchTab(3,this)"><span>🎒</span><small>儲物袋</small></div>
    </nav>
</div>

<script>
/**
 * ============================================================
 * 遊戲核心邏輯：XianXiaGame V1.8.8
 * 確保所有資料持久化，並解決血條消失與背包遺失問題。
 * ============================================================
 */
class XianXiaGame {
    constructor() {
        // 從本地存儲加載數據
        const savedData = JSON.parse(localStorage.getItem('XianXia_V188_Master'));
        
        // 初始化狀態（如果沒存檔就用預設值）
        this.state = savedData || {
            res: { wood: 0, stone: 0 },
            sect: { total: 0, woodD: 0, stoneD: 0, killCount: 0 },
            player: { 
                realm: "練氣期", 
                lv: 1, 
                pts: 0, 
                atk: 40, 
                hp: 350, 
                curHp: 350, 
                luck: "平庸" 
            },
            inv: { "聚氣散": 1 }
        };

        // 數據安全性校準
        if (this.state.player.curHp === undefined || this.state.player.curHp <= 0) {
            this.state.player.curHp = this.state.player.hp;
        }

        // 運行時臨時變數
        this.runtime = {
            mob: null,
            isSearching: false,
            autoMode: false,
            lastAtkTime: 0,
            manualProgress: 0
        };

        // 地圖配置：包含等級限制與怪物屬性
        this.maps = [
            { id: 0, name: "🌿 青雲山腳", req: 1, mobBase: { n: "野豬妖", hp: 180, atk: 20, loot: "妖豬皮" } },
            { id: 1, name: "🐍 幽冥森林", req: 5, mobBase: { n: "劇毒林蛇", hp: 1000, atk: 85, loot: "毒蛇膽" } },
            { id: 2, name: "⛰️ 萬仞荒漠", req: 10, mobBase: { n: "荒漠石怪", hp: 6500, atk: 420, loot: "精鐵礦" } }
        ];
        
        this.curMapIdx = 0;

        // 啟動遊戲
        this.init();
    }

    /**
     * 初始化系統
     */
    init() {
        this.rollLuck();
        this.buildMapUI();
        
        // 啟動主循環 (每秒運算一次資源產出)
        setInterval(() => {
            this.gameTick();
        }, 1000);

        this.updateUI();
        this.log("🏮 宗門大陣運轉正常，前塵往事皆已保存。", "var(--color-gold)");
    }

    /**
     * 每日氣運隨機
     */
    rollLuck() {
        const luckList = ["大凶", "凶", "平庸", "小吉", "大吉"];
        this.state.player.luck = luckList[Math.floor(Math.random() * luckList.length)];
    }

    /**
     * 主遊戲循環
     */
    gameTick() {
        // 資源自動產出
        this.state.res.wood += this.state.sect.woodD * 0.6;
        this.state.res.stone += this.state.sect.stoneD * 0.25;

        // 自動歷練邏輯
        if (this.runtime.autoMode === true && this.runtime.isSearching === false) {
            if (this.runtime.mob !== null) {
                this.doAttack();
            } else {
                this.spawnMonster();
            }
        }

        this.updateUI();
        this.saveGame();
    }

    /**
     * 保存存檔
     */
    saveGame() {
        localStorage.setItem('XianXia_V188_Master', JSON.stringify(this.state));
    }

    /**
     * 攻擊邏輯：包含傷害計算、飄字與勝負判定
     */
    doAttack() {
        // 攻速限制：600毫秒一次
        if (this.runtime.mob === null || Date.now() - this.runtime.lastAtkTime < 600) {
            return;
        }
        this.runtime.lastAtkTime = Date.now();

        const p = this.state.player;
        const m = this.runtime.mob;

        // 1. 玩家回合
        let luckBonus = 1.0;
        if (p.luck === "大吉") luckBonus = 1.5;
        if (p.luck === "凶") luckBonus = 0.8;

        let pDmg = Math.floor(p.atk * (0.8 + Math.random() * 0.4) * luckBonus);
        m.curH = Math.max(0, m.curH - pDmg);
        this.createPopText(pDmg, "m-hp-box", "var(--color-info)");

        // 判斷怪物是否死亡
        if (m.curH <= 0) {
            this.onMonsterDeath(m);
        } else {
            // 2. 怪物反擊回合
            let mDmg = Math.floor(m.atk * (0.8 + Math.random() * 0.4));
            p.curHp = Math.max(0, p.curHp - mDmg);
            this.createPopText(mDmg, "p-hp-box", "var(--color-danger)");

            // 判斷玩家是否死亡
            if (p.curHp <= 0) {
                this.onPlayerDefeat();
            }
        }
        this.updateUI();
    }

    onMonsterDeath(m) {
        this.state.player.pts += 1;
        this.state.sect.killCount += 1;
        this.log(`⚔️ 成功斬殺 ${m.n}，感悟增加 1 點。`, "var(--color-success)");

        // 掉落物判斷
        if (Math.random() < 0.6) {
            const itemName = m.loot;
            this.state.inv[itemName] = (this.state.inv[itemName] || 0) + 1;
            this.log(`🎒 獲得戰利品：${itemName}`, "#fff");
        }

        // 進入搜尋狀態
        this.runtime.mob = null;
        this.runtime.isSearching = true;
        setTimeout(() => {
            this.runtime.isSearching = false;
            this.spawnMonster();
        }, 1200);
    }

    onPlayerDefeat() {
        this.log("💀 體力不支，神魂受損，速回宗門修養！", "var(--color-danger)");
        this.runtime.autoMode = false;
        document.getElementById('auto-check').checked = false;
        this.state.player.curHp = 50;
        this.switchTab(1);
    }

    spawnMonster() {
        if (this.runtime.isSearching) return;
        const base = this.maps[this.curMapIdx].mobBase;
        this.runtime.mob = {
            n: base.n,
            maxH: base.hp,
            curH: base.hp,
            atk: base.atk,
            loot: base.loot
        };
        this.updateUI();
    }

    /**
     * 視覺飄字特效
     */
    createPopText(val, boxId, color) {
        const box = document.getElementById(boxId);
        if (!box) return;
        const el = document.createElement('div');
        el.className = 'dmg-pop';
        el.innerText = `-${val}`;
        el.style.color = color;
        box.appendChild(el);
        setTimeout(() => {
            el.remove();
        }, 800);
    }

    /**
     * 手動點擊收集靈木
     */
    manualWork() {
        this.runtime.manualProgress += 20;
        if (this.runtime.manualProgress >= 100) {
            this.runtime.manualProgress = 0;
            this.state.res.wood += 5;
        }
        this.updateUI();
    }

    /**
     * 核心 UI 更新：解決消失問題
     */
    updateUI() {
        const s = this.state;
        const p = s.player;

        // 資源欄
        document.getElementById('val-wood').innerText = Math.floor(s.res.wood);
        document.getElementById('val-stone').innerText = Math.floor(s.res.stone);
        document.getElementById('val-luck').innerText = p.luck;
        document.getElementById('val-realm').innerText = p.realm;
        document.getElementById('val-lv').innerText = `第 ${p.lv} 層`;
        document.getElementById('val-power').innerText = Math.floor(p.atk * 12 + p.hp * 1.5);

        // 宗門數據
        document.getElementById('val-d-idle').innerText = s.sect.total - s.sect.woodD - s.sect.stoneD;
        document.getElementById('val-d-total').innerText = s.sect.total;
        document.getElementById('d-wood').innerText = s.sect.woodD;
        document.getElementById('d-stone').innerText = s.sect.stoneD;
        document.getElementById('d-cost').innerText = 10 + s.sect.total * 8;

        // 手動進度條
        document.getElementById('bar-work').style.width = this.runtime.manualProgress + "%";

        // 怪物血條渲染 (重點修正)
        const m = this.runtime.mob;
        const mBar = document.getElementById('m-hp-bar');
        const mTxt = document.getElementById('m-hp-txt');
        const mName = document.getElementById('m-name');
        const mVal = document.getElementById('m-hp-val');

        if (m !== null) {
            mName.innerText = m.n;
            let mPer = (m.curH / m.maxH) * 100;
            mBar.style.width = mPer + "%";
            mTxt.innerText = Math.ceil(mPer) + "%";
            mVal.innerText = `${m.curH} / ${m.maxH}`;
        } else {
            mName.innerText = this.runtime.isSearching ? "🔍 搜尋妖魔中..." : "等待目標";
            mBar.style.width = "0%";
            mTxt.innerText = "N/A";
            mVal.innerText = "0 / 0";
        }

        // 玩家血條
        let pPer = (p.curHp / p.hp) * 100;
        document.getElementById('p-hp-bar').style.width = pPer + "%";
        document.getElementById('p-hp-txt').innerText = Math.ceil(pPer) + "%";
        document.getElementById('p-hp-val').innerText = `${Math.ceil(p.curHp)} / ${p.hp}`;

        // 屬性欄
        document.getElementById('st-atk').innerText = p.atk;
        document.getElementById('st-hp').innerText = p.hp;
        document.getElementById('st-pts').innerText = p.pts;

        // 背包系統 (重點修正：確保每次渲染都會重新生成網格)
        const bagGrid = document.getElementById('bag-grid');
        let bagHTML = "";
        let itemKeys = Object.keys(s.inv);
        
        if (itemKeys.length > 0) {
            for (let i = 0; i < itemKeys.length; i++) {
                let key = itemKeys[i];
                let count = s.inv[key];
                bagHTML += `
                    <div class="bag-item" onclick="game.meltItem('${key}')">
                        🏺 ${key}
                        <b>x${count}</b>
                        <small>點擊熔煉</small>
                    </div>`;
            }
        } else {
            bagHTML = "<div style='grid-column: span 3; color:#555; text-align:center; padding:20px;'>儲物袋內空無一物</div>";
        }
        bagGrid.innerHTML = bagHTML;
    }

    /**
     * 地圖與等級鎖
     */
    buildMapUI() {
        const container = document.getElementById('map-list');
        container.innerHTML = "";
        
        for (let i = 0; i < this.maps.length; i++) {
            let m = this.maps[i];
            const btn = document.createElement('button');
            const isLocked = this.state.player.lv < m.req;
            
            btn.className = `map-btn ${i === this.curMapIdx ? 'active' : ''}`;
            if (isLocked) {
                btn.innerHTML = `🔒 練氣 ${m.req} 層`;
                btn.style.opacity = "0.5";
            } else {
                btn.innerHTML = m.name;
            }

            btn.onclick = () => {
                if (isLocked) {
                    this.log(`⚠️ 境界不足！無法進入 ${m.name}。`, "var(--color-danger)");
                } else {
                    this.curMapIdx = i;
                    this.runtime.mob = null; // 切換地圖刷新怪物
                    this.buildMapUI();
                    this.spawnMonster();
                    this.log(`🚩 已抵達 ${m.name}。`);
                }
            };
            container.appendChild(btn);
        }
    }

    /**
     * 功能：熔煉物品
     */
    meltItem(name) {
        if (this.state.inv[name] > 0) {
            this.state.inv[name] -= 1;
            if (this.state.inv[name] <= 0) {
                delete this.state.inv[name];
            }
            this.state.player.pts += 2;
            this.log(`🔥 熔煉了 ${name}，獲得 2 點感悟！`, "var(--color-info)");
            this.updateUI();
        }
    }

    /**
     * 功能：突破境界
     */
    upgrade() {
        const p = this.state.player;
        if (p.pts >= 5) {
            p.pts -= 5;
            p.lv += 1;
            p.atk += 25;
            p.hp += 80;
            p.curHp = p.hp; // 突破後回滿血

            // 觸發全螢幕特效
            const fx = document.getElementById('breakthrough-fx');
            fx.style.animation = 'breakthrough-flash 1s ease-out forwards';
            setTimeout(() => { fx.style.animation = ''; }, 1000);

            this.log(`🌟 破繭成蝶！晉升至 ${p.realm} 第 ${p.lv} 層！`, "var(--color-gold)");
            this.buildMapUI(); // 重新整理地圖鎖
            this.updateUI();
        } else {
            this.log("❌ 感悟不夠，難以突破心魔。");
        }
    }

    /**
     * 輔助功能
     */
    recruit() {
        const cost = 10 + this.state.sect.total * 8;
        if (this.state.res.stone >= cost) {
            this.state.res.stone -= cost;
            this.state.sect.total += 1;
            this.updateUI();
        } else {
            this.log("❌ 靈石不足，無法招募門徒。");
        }
    }

    assign(type, val) {
        const s = this.state.sect;
        const idle = s.total - s.woodD - s.stoneD;
        if (val > 0 && idle <= 0) return;
        
        if (type === 'wood' && s.woodD + val >= 0) s.woodD += val;
        if (type === 'stone' && s.stoneD + val >= 0) s.stoneD += val;
        this.updateUI();
    }

    log(msg, color) {
        const box = document.getElementById('log-box');
        const div = document.createElement('div');
        div.style.color = color || "#adbac7";
        div.innerHTML = `<span style="color:#555;">[${new Date().toLocaleTimeString()}]</span> ${msg}`;
        box.prepend(div);
        if (box.children.length > 30) box.lastChild.remove();
    }

    meditate() {
        this.state.player.curHp = this.state.player.hp;
        this.log("🧘 運轉周天，真元充盈如初。", "var(--color-success)");
        this.updateUI();
    }

    toggleAuto() {
        this.runtime.autoMode = document.getElementById('auto-check').checked;
    }

    switchTab(idx, el) {
        const pages = document.querySelectorAll('.page');
        const btns = document.querySelectorAll('.nav-btn');
        for (let i = 0; i < pages.length; i++) {
            pages[i].classList.remove('active');
            btns[i].classList.remove('active');
        }
        document.getElementById('p' + idx).classList.add('active');
        if (el) el.classList.add('active');
    }
}

// 實例化遊戲
const game = new XianXiaGame();
</script>
