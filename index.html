<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>宗門修仙錄 V1.0 - 大圓滿版</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="toast-container"></div>

    <div id="game-container">
        <div class="header-info">
            <div class="header-line">
                <span id="val-level">凡人</span>
                <span id="val-money">🪙 0</span>
            </div>
            <div class="exp-bar-container">
                <div id="val-exp-bar" class="exp-bar-fill"></div>
            </div>
        </div>

        <div id="p-battle" class="stage">
            <div class="monster-area">
                <div id="monster-name">尋找對手中...</div>
                <div id="monster-pic" class="monster-pic">⏳</div>
                <div class="hp-container">
                    <div id="m-hp-bar" class="hp-bar-fill"></div>
                    <div id="m-hp-txt" class="hp-text">0 / 0</div>
                </div>
            </div>

            <div class="player-status-area">
                <div class="hp-container">
                    <div id="p-hp-bar" class="hp-bar-fill p-hp"></div>
                    <div id="p-hp-txt" class="hp-text">0 / 0</div>
                </div>
                <div class="quick-stats">
                    <span>⚔️ <b id="val-atk">0</b></span>
                    <span>🛡️ <b id="val-def">0</b></span>
                    <span>✨ <b id="val-power">0</b></span>
                </div>
            </div>

            <div class="log-container">
                <div class="log-tabs">
                    <button class="log-tab active" onclick="_X_CORE.ui.switchLog('all')">全部</button>
                    <button class="log-tab" onclick="_X_CORE.ui.switchLog('combat')">戰鬥</button>
                    <button class="log-tab" onclick="_X_CORE.ui.switchLog('loot')">獲取</button>
                    <button class="log-tab" onclick="_X_CORE.ui.switchLog('exp')">修為</button>
                </div>
                <div id="log-list" class="log-list"></div>
            </div>
        </div>

        <div id="p-bag" class="stage" style="display:none;">
            <h4>儲物袋 (<span id="bag-count">0</span>/50)</h4>
            <div class="bag-actions">
                <button onclick="_X_CORE.inventory.autoMelt()">一鍵熔煉 (精品以下)</button>
            </div>
            <div id="bag-grid" class="bag-grid"></div>
        </div>

        <div id="p-stats" class="stage" style="display:none;">
            <h4>本命命牌</h4>
            <div id="detail-stats" class="stats-grid"></div>
            <hr>
            <div id="equipment-slots" class="eq-area"></div>
            <hr>
            <div id="stat-points-area">
                <p>可用屬性點：<b id="val-pts" style="color:var(--gold);">0</b></p>
                <div id="stat-list"></div>
            </div>
            <hr>
            <h4>仙法裝配</h4>
            <div id="equipped-skills" class="skill-slots"></div>
        </div>

        <div id="p-map" class="stage" style="display:none;">
            <h4>歷練地圖</h4>
            <div id="map-list" class="map-list"></div>
        </div>

        <div class="nav-bar">
            <button onclick="_X_CORE.ui.switchPage('battle')">⚔️ 歷練</button>
            <button onclick="_X_CORE.ui.switchPage('bag')">🎒 儲物</button>
            <button onclick="_X_CORE.ui.switchPage('stats')">🧘 修為</button>
            <button onclick="_X_CORE.ui.switchPage('map')">🗺️ 地圖</button>
        </div>
    </div>

    <script src="data.js"></script>
    <script src="player.js"></script>
    <script src="combat.js"></script>
    <script src="inventory.js"></script>
    <script src="ui.js"></script>
    <script src="core.js"></script>
</body>
</html>
