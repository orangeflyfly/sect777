<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仙俠宗門 V1.9.0 - 約法三章·絕不縮減版</title>
    <style>
        /* ============================================================
           視覺核心：深色修仙風格
           ============================================================ */
        :root {
            --color-primary: #a29bfe; 
            --color-primary-dark: #6c5ce7;
            --color-bg-deep: #0b0e14; 
            --color-card-bg: rgba(30, 35, 45, 0.98);
            --color-text-main: #adbac7; 
            --color-gold: #ffcf40;
            --color-danger: #f85149; 
            --color-success: #3fb950;
            --color-info: #0fbcf9; 
            --color-border: rgba(162,155,254,0.6);
            --color-inner-bg: #11151c;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            user-select: none; 
        }

        body { 
            background: #000; 
            color: var(--color-text-main); 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            overflow: hidden; 
        }

        /* 遊戲主容器 */
        #app {
            width: 100%; 
            max-width: 500px; 
            height: 100%; 
            background: radial-gradient(circle at top, #1a1c2c 0%, #0b0e14 100%);
            display: flex; 
            flex-direction: column; 
            position: relative; 
            border: 2px solid var(--color-border);
            box-shadow: 0 0 60px rgba(108, 92, 231, 0.3);
        }

        /* 突破全螢幕特效 */
        #breakthrough-fx {
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: #fff; 
            opacity: 0; 
            pointer-events: none; 
            z-index: 999;
        }

        @keyframes breakthrough-flash {
            0% { opacity: 0; }
            50% { opacity: 0.8; }
            100% { opacity: 0; }
        }

        /* 頂部資源列：視覺重新校準 */
        header { 
            padding: 25px 15px; 
            background: rgba(20, 25, 35, 0.98); 
            border-bottom: 3px solid var(--color-primary); 
            z-index: 100; 
            box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        .res-row { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 15px; 
            justify-content: space-between;
        }

        .res-item { 
            background: linear-gradient(180deg, #222, #000); 
            padding: 8px 12px; 
            border-radius: 12px; 
            font-size: 13px; 
            border: 1px solid var(--color-border); 
            color: #fff; 
            min-width: 90px;
            text-align: center;
            box-shadow: inset 0 0 5px rgba(255,255,255,0.05);
        }

        .realm-display {
            display: flex;
            justify-content: space-between;
            align-items: flex-end;
            padding: 0 5px;
        }

        .realm-tag { 
            color: var(--color-gold); 
            font-size: 26px; 
            font-weight: 900; 
            text-shadow: 0 0 15px rgba(255,207,64,0.6); 
            letter-spacing: 2px;
        }

        /* 內容顯示區 */
        .stage { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            padding-bottom: 120px; 
        }

        .page { 
            display: none; 
        }

        .page.active { 
            display: block; 
            animation: fadeInPage 0.5s ease-out; 
        }

        @keyframes fadeInPage { 
            from { opacity: 0; transform: translateY(15px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* 卡片設計與組件 */
        .card { 
            background: var(--color-card-bg); 
            border-radius: 20px; 
            padding: 20px; 
            margin-bottom: 20px; 
            border: 1px solid var(--color-border); 
            position: relative; 
            box-shadow: 0 8px 25px rgba(0,0,0,0.4); 
        }

        .card-title { 
            font-size: 16px; 
            font-weight: bold; 
            margin-bottom: 15px; 
            color: #fff; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
        }

        .card-title::before { 
            content: ''; 
            width: 5px; 
            height: 18px; 
            background: var(--color-gold); 
            border-radius: 2px;
        }

        /* 狀態條：視覺最強化 */
        .hp-label { 
            display: flex; 
            justify-content: space-between; 
            font-size: 13px; 
            margin-bottom: 6px; 
            color: #adbac7; 
        }

        .hp-wrap { 
            height: 40px; 
            background: #000; 
            border-radius: 20px; 
            overflow: hidden; 
            margin-bottom: 15px; 
            border: 2px solid #3d444d; 
            position: relative; 
            box-shadow: inset 0 0 10px rgba(0,0,0,0.8);
        }

        .hp-fill { 
            height: 100%; 
            transition: width 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
            position: relative;
        }

        .hp-text { 
            position: absolute; 
            width: 100%; 
            text-align: center; 
            font-size: 16px; 
            line-height: 36px; 
            color: #fff; 
            font-weight: 900; 
            text-shadow: 1px 1px 3px #000; 
            z-index: 10; 
            pointer-events: none; 
        }

        /* 傷害飄字動畫 */
        @keyframes damagePopup { 
            0% { transform: translate(-50%, 0) scale(0.5); opacity: 0; } 
            25% { opacity: 1; transform: translate(-50%, -40px) scale(1.4); }
            100% { transform: translate(-50%, -100px) scale(1); opacity: 0; } 
        }
        .dmg-pop { 
            position: absolute; 
            left: 50%; 
            top: 25%; 
            font-weight: 900; 
            font-size: 32px; 
            animation: damagePopup 0.9s forwards; 
            z-index: 1000; 
            pointer-events: none;
            text-shadow: 2px 2px 0 #000;
        }

        /* 按鈕系統：修正字體與佈局 */
        .btn-main { 
            width: 100%; 
            padding: 15px; 
            border-radius: 12px; 
            border: 1px solid rgba(255,255,255,0.1); 
            background: linear-gradient(135deg, var(--color-primary-dark), var(--color-primary)); 
            color: #fff; 
            font-weight: 900; 
            font-size: 15px; /* 修復：字體調至合適大小 */
            cursor: pointer; 
            transition: transform 0.2s, background 0.2s; 
            margin-bottom: 12px; 
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
        }

        .btn-main:active { 
            transform: scale(0.96); 
        }

        .btn-main:disabled { 
            background: #222; 
            color: #555; 
            cursor: not-allowed; 
            box-shadow: none;
        }

        /* 弟子分配組件 */
        .assign-box {
            background: var(--color-inner-bg);
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #333;
        }

        .assign-controls {
            display: flex;
            gap: 8px;
            margin-top: 10px;
        }

        .btn-small {
            flex: 1;
            padding: 8px;
            border-radius: 8px;
            border: none;
            color: #fff;
            font-weight: bold;
            font-size: 12px;
            cursor: pointer;
        }

        /* 日誌系統 */
        #log-box { 
            height: 180px; 
            overflow-y: auto; 
            background: rgba(0,0,0,0.8); 
            border-radius: 15px; 
            padding: 18px; 
            font-size: 13px; 
            border: 1px solid var(--color-border); 
            line-height: 1.8; 
            color: #adbac7;
            margin-top: 10px;
        }

        /* 底部導覽列 */
        nav { 
            position: absolute; 
            bottom: 20px; 
            left: 15px; 
            right: 15px; 
            height: 85px; 
            background: rgba(25, 30, 40, 0.98); 
            border-radius: 42px; 
            display: flex; 
            border: 2px solid var(--color-primary); 
            backdrop-filter: blur(15px); 
            z-index: 200; 
        }

        .nav-btn { 
            color: #555; 
            cursor: pointer; 
            text-align: center; 
            flex: 1; 
            padding: 15px 0; 
            transition: 0.4s; 
        }

        .nav-btn.active { 
            color: var(--color-gold); 
            transform: translateY(-8px); 
        }

        .nav-btn span { 
            font-size: 28px; 
            display: block; 
        }

        /* 地圖選擇切換器 */
        .map-tabs { 
            display: flex; 
            gap: 12px; 
            margin-bottom: 20px; 
            overflow-x: auto; 
            padding: 5px; 
        }

        .map-btn { 
            padding: 10px 22px; 
            border-radius: 25px; 
            background: #000; 
            border: 2px solid #333; 
            color: #777; 
            font-weight: bold; 
            cursor: pointer; 
            white-space: nowrap; 
            transition: 0.3s; 
        }

        .map-btn.active { 
            background: var(--color-primary-dark); 
            border-color: var(--color-gold); 
            color: #fff; 
            box-shadow: 0 0 15px var(--color-primary);
        }

        /* 背包儲存格 */
        .bag-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 15px; 
        }

        .bag-item { 
            background: linear-gradient(135deg, #1e222d, #0b0e14); 
            border: 1px solid var(--color-border); 
            border-radius: 15px; 
            padding: 15px 5px; 
            text-align: center; 
            cursor: pointer; 
            position: relative;
        }

        .bag-item:hover {
            border-color: var(--color-gold);
        }

        .bag-item b { 
            color: var(--color-gold); 
            font-size: 14px; 
            display: block; 
            margin-top: 5px; 
        }

        .bag-item small {
            display: block;
            color: var(--color-info);
            font-size: 10px;
            margin-top: 5px;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="breakthrough-fx"></div>

    <header>
        <div class="res-row">
            <div class="res-item">🪵 靈木: <span id="val-wood">0</span></div>
            <div class="res-item">💠 靈石: <span id="val-stone">0</span></div>
            <div class="res-item">🍀 氣運: <span id="val-luck">--</span></div>
        </div>
        <div class="realm-display">
            <div>
                <span class="realm-tag" id="val-realm">載入中</span><br>
                <span id="val-lv" style="color:var(--color-primary); font-weight:bold; font-size:14px;">第 1 層</span>
            </div>
            <div style="text-align:right">
                <small style="color:#555">宗門威能</small><br>
                <b id="val-power" style="color:var(--color-gold); font-size:22px;">0</b>
            </div>
        </div>
    </header>

    <main class="stage">
        
        <div id="p1" class="page active">
            <div class="card">
                <div class="card-title">🏮 宗門招募與產業</div>
                <button class="btn-main" onclick="game.recruit()">招募外門弟子 (消耗靈石:<span id="d-cost">0</span>)</button>
                
                <div style="background:rgba(0,0,0,0.4); padding:12px; border-radius:12px; text-align:center; margin-bottom:15px;">
                    弟子總數：<b id="val-d-total">0</b> | 閒置中：<b id="val-d-idle" style="color:var(--color-success)">0</b>
                </div>

                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                    <div class="assign-box">
                        <small>🌲 靈木伐木場</small><br>
                        <b id="d-wood" style="font-size:20px; color:var(--color-gold)">0</b>人
                        <div class="assign-controls">
                            <button class="btn-small" style="background:var(--color-primary-dark)" onclick="game.assign('wood', 1)">+</button>
                            <button class="btn-small" style="background:var(--color-danger)" onclick="game.assign('wood', -1)">-</button>
                        </div>
                    </div>
                    <div class="assign-box">
                        <small>💎 靈石採礦坑</small><br>
                        <b id="d-stone" style="font-size:20px; color:var(--color-info)">0</b>人
                        <div class="assign-controls">
                            <button class="btn-small" style="background:var(--color-primary-dark)" onclick="game.assign('stone', 1)">+</button>
                            <button class="btn-small" style="background:var(--color-danger)" onclick="game.assign('stone', -1)">-</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card" onclick="game.manualWork()">
                <div class="card-title">⚒️ 掌門親自開採</div>
                <div class="hp-wrap">
                    <div id="bar-work" class="hp-fill" style="width:0%; background:var(--color-primary)"></div>
                    <div class="hp-text">連續點擊以獲取資源</div>
                </div>
                <small style="color:#555; display:block; text-align:center;">手動開採可同時獲得靈木與少量靈石</small>
            </div>
        </div>

        <div id="p2" class="page">
            <div class="map-tabs" id="map-list"></div>
            
            <div class="card" id="battle-area">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                    <b id="m-name" style="font-size:22px; color:var(--color-gold);">正在探尋妖魔...</b>
                    <label style="font-size:14px; color:var(--color-primary); font-weight:bold; cursor:pointer;">
                        <input type="checkbox" id="auto-check" onchange="game.toggleAuto()"> 自動歷練
                    </label>
                </div>

                <div class="hp-label"><span>👹 妖獸氣血</span><span id="m-hp-val">0 / 0</span></div>
                <div class="hp-wrap" id="m-hp-box" style="border-color: var(--color-danger); height:46px;">
                    <div id="m-hp-bar" class="hp-fill" style="background: linear-gradient(90deg, #ff4d4d, #96281b); width:0%"></div>
                    <div class="hp-text" id="m-hp-txt" style="line-height:42px;">等待目標</div>
                </div>

                <div class="hp-label"><span>🧘 掌門真元</span><span id="p-hp-val">0 / 0</span></div>
                <div class="hp-wrap" id="p-hp-box" style="border-color: var(--color-success); height:46px;">
                    <div id="p-hp-bar" class="hp-fill" style="background: linear-gradient(90deg, #2ecc71, #27ae60); width:100%"></div>
                    <div class="hp-text" id="p-hp-txt" style="line-height:42px;">狀態完好</div>
                </div>

                <div style="display:grid; grid-template-columns: 2fr 1fr; gap:15px; margin-top:10px;">
                    <button class="btn-main" onclick="game.doAttack()" style="height:70px; font-size:20px;">施展神通</button>
                    <button class="btn-main" style="background:var(--color-info); height:70px;" onclick="game.meditate()">打坐回氣</button>
                </div>
            </div>

            <div id="log-box"></div>
        </div>

        <div id="p3" class="page">
            <div class="card">
                <div class="card-title">📜 境界修為</div>
                <div style="display:flex; justify-content:space-around; background:rgba(0,0,0,0.5); padding:20px; border-radius:15px; margin-bottom:15px;">
                    <div style="text-align:center;"><small>攻擊</small><br><b id="st-atk" style="color:var(--color-info); font-size:20px;">0</b></div>
                    <div style="text-align:center;"><small>生命</small><br><b id="st-hp" style="color:var(--color-danger); font-size:20px;">0</b></div>
                    <div style="text-align:center;"><small>感悟</small><br><b id="st-pts" style="color:var(--color-gold); font-size:20px;">0</b></div>
                </div>
                <button class="btn-main" onclick="game.upgrade()">消耗 5 點感悟提升境界</button>
            </div>

            <div class="card">
                <div class="card-title">🎒 儲物袋 (點擊素材熔煉)</div>
                <div id="bag-grid" class="bag-grid"></div>
            </div>
        </div>

    </main>

    <nav>
        <div class="nav-btn active" onclick="game.switchTab(1,this)"><span>⛩️</span><small>宗門</small></div>
        <div class="nav-btn" onclick="game.switchTab(2,this)"><span>⚔️</span><small>歷練</small></div>
        <div class="nav-btn" onclick="game.switchTab(3,this)"><span>🎒</span><small>儲物袋</small></div>
    </nav>
</div>

<script>
/**
 * ============================================================
 * 遊戲核心邏輯 XianXiaGame V1.9.0
 * 確保所有資料持久化，修復刷新機制與 UI 字體。
 * ============================================================
 */
class XianXiaGame {
    constructor() {
        // 讀取本地存檔
        const saved = JSON.parse(localStorage.getItem('XianXia_V190_Full'));
        
        // 狀態初始化：嚴格遵循原本功能，不刪減
        this.state = saved || {
            res: { wood: 0, stone: 0 },
            sect: { total: 0, woodD: 0, stoneD: 0, killCount: 0 },
            player: { 
                realm: "練氣期", 
                lv: 1, 
                pts: 0, 
                atk: 50, 
                hp: 450, 
                curHp: 450, 
                luck: "平庸" 
            },
            inv: { "聚靈珠": 1 }
        };

        // 數據校準與安全性檢查
        if (this.state.player.curHp === undefined || this.state.player.curHp <= 0) {
            this.state.player.curHp = this.state.player.hp;
        }

        // 運行時變數（不存入 LocalStorage）
        this.runtime = {
            mob: null,
            isSearching: false,
            autoMode: false,
            lastAtkTime: 0,
            manualProgress: 0
        };

        // 地圖與怪物資料庫
        this.maps = [
            { id: 0, name: "🌿 青雲山腳", req: 1, mob: { n: "兇猛野豬", hp: 220, atk: 30, loot: "野豬獠牙" } },
            { id: 1, name: "🐍 幽冥密林", req: 5, mob: { n: "幻影毒蛇", hp: 1500, atk: 110, loot: "毒液瓶" } },
            { id: 2, name: "⛰️ 萬仞荒漠", req: 10, mob: { n: "荒漠石獸", hp: 8000, atk: 500, loot: "精鋼石" } }
        ];
        
        this.curMapIdx = 0;

        // 啟動遊戲
        this.init();
    }

    init() {
        this.rollLuck();
        this.buildMapUI();
        
        // 主循環控制 (1000ms 一次)
        setInterval(() => {
            this.gameTick();
        }, 1000);

        this.updateUI();
        this.log("🏮 宗門陣法重築完成，所有記錄已封存。", "var(--color-gold)");
    }

    /**
     * 隨機氣運
     */
    rollLuck() {
        const lucks = ["大凶", "凶", "平庸", "小吉", "大吉"];
        this.state.player.luck = lucks[Math.floor(Math.random() * lucks.length)];
    }

    /**
     * 每秒執行的核心邏輯
     */
    gameTick() {
        // 資源自動產出邏輯
        this.state.res.wood += (this.state.sect.woodD * 0.8);
        this.state.res.stone += (this.state.sect.stoneD * 0.4);

        // 戰鬥刷新與自動攻擊 (核心修復：確保刷新循環)
        if (this.runtime.autoMode === true) {
            if (this.runtime.mob === null && this.runtime.isSearching === false) {
                // 如果沒怪且沒在搜尋，則觸發搜尋
                this.spawnMonster();
            } else if (this.runtime.mob !== null) {
                // 如果有怪，則執行攻擊
                this.doAttack();
            }
        }

        this.updateUI();
        this.saveGame();
    }

    saveGame() {
        localStorage.setItem('XianXia_V190_Full', JSON.stringify(this.state));
    }

    /**
     * 攻擊邏輯：修復刷新不斷裂
     */
    doAttack() {
        // 攻速限制 (650ms)
        const now = Date.now();
        if (this.runtime.mob === null || now - this.runtime.lastAtkTime < 650) {
            return;
        }
        this.runtime.lastAtkTime = now;

        const p = this.state.player;
        const m = this.runtime.mob;

        // 1. 玩家攻擊回合
        let luckFactor = 1.0;
        if (p.luck === "大吉") luckFactor = 1.6;
        if (p.luck === "凶") luckFactor = 0.7;

        let pDmg = Math.floor(p.atk * (0.8 + Math.random() * 0.4) * luckFactor);
        m.curH = Math.max(0, m.curH - pDmg);
        this.createDamageText(pDmg, "m-hp-box", "var(--color-info)");

        // 判定勝負
        if (m.curH <= 0) {
            this.handleVictory(m);
        } else {
            // 2. 怪物反擊回合
            let mDmg = Math.floor(m.atk * (0.8 + Math.random() * 0.4));
            p.curHp = Math.max(0, p.curHp - mDmg);
            this.createDamageText(mDmg, "p-hp-box", "var(--color-danger)");

            if (p.curHp <= 0) {
                this.handleDefeat();
            }
        }
        this.updateUI();
    }

    handleVictory(m) {
        this.state.player.pts += 1;
        this.state.sect.killCount += 1;
        this.log(`⚔️ 擊敗了 ${m.n}，感悟提升！`, "var(--color-success)");

        // 掉落物
        if (Math.random() < 0.65) {
            const loot = m.loot;
            this.state.inv[loot] = (this.state.inv[loot] || 0) + 1;
            this.log(`🎒 獲取素材：${loot}`, "#fff");
        }

        // 核心：刷新重置
        this.runtime.mob = null;
        this.runtime.isSearching = true; // 進入搜尋 CD 狀態
        
        // 使用顯式的定時器，確保 1.2 秒後下一隻怪會出現
        setTimeout(() => {
            this.runtime.isSearching = false;
            if (this.runtime.autoMode) {
                this.spawnMonster();
            }
        }, 1200);
    }

    handleDefeat() {
        this.log("💀 體力不支，陷入昏迷，已被弟子救回宗門！", "var(--color-danger)");
        this.runtime.autoMode = false;
        document.getElementById('auto-check').checked = false;
        this.state.player.curHp = 60; // 昏迷醒來恢復少量氣血
        this.switchTab(1);
    }

    spawnMonster() {
        if (this.runtime.isSearching) return;
        
        const mapData = this.maps[this.curMapIdx].mob;
        this.runtime.mob = {
            n: mapData.n,
            maxH: mapData.hp,
            curH: mapData.hp,
            atk: mapData.atk,
            loot: mapData.loot
        };
        this.updateUI();
    }

    /**
     * 視覺特效：傷害飄字
     */
    createDamageText(val, boxId, color) {
        const box = document.getElementById(boxId);
        if (!box) return;
        const el = document.createElement('div');
        el.className = 'dmg-pop';
        el.innerText = `-${val}`;
        el.style.color = color;
        box.appendChild(el);
        setTimeout(() => { el.remove(); }, 850);
    }

    /**
     * 掌門親自勞動
     */
    manualWork() {
        this.runtime.manualProgress += 25;
        if (this.runtime.manualProgress >= 100) {
            this.runtime.manualProgress = 0;
            this.state.res.wood += 5;
            this.state.res.stone += 1; // 掌門開採效率較高
            this.log("⚒️ 掌門親自出手，獲取了大量靈木與靈石。");
        }
        this.updateUI();
    }

    /**
     * 渲染 UI：絕對不精簡，確保所有欄位更新
     */
    updateUI() {
        const s = this.state;
        const p = s.player;

        // 頂部資源
        document.getElementById('val-wood').innerText = Math.floor(s.res.wood);
        document.getElementById('val-stone').innerText = Math.floor(s.res.stone);
        document.getElementById('val-luck').innerText = p.luck;
        document.getElementById('val-realm').innerText = p.realm;
        document.getElementById('val-lv').innerText = `第 ${p.lv} 層`;
        document.getElementById('val-power').innerText = Math.floor(p.atk * 15 + p.hp * 2);

        // 宗門數據與比例條
        document.getElementById('val-d-idle').innerText = s.sect.total - s.sect.woodD - s.sect.stoneD;
        document.getElementById('val-d-total').innerText = s.sect.total;
        document.getElementById('d-wood').innerText = s.sect.woodD;
        document.getElementById('d-stone').innerText = s.sect.stoneD;
        document.getElementById('d-cost').innerText = 15 + s.sect.total * 10;
        document.getElementById('bar-work').style.width = this.runtime.manualProgress + "%";

        // 怪物狀態渲染
        const m = this.runtime.mob;
        const mBar = document.getElementById('m-hp-bar');
        const mTxt = document.getElementById('m-hp-txt');
        const mName = document.getElementById('m-name');
        const mVal = document.getElementById('m-hp-val');

        if (m !== null) {
            mName.innerText = m.n;
            let per = (m.curH / m.maxH) * 100;
            mBar.style.width = per + "%";
            mTxt.innerText = Math.ceil(per) + "%";
            mVal.innerText = `${m.curH} / ${m.maxH}`;
        } else {
            mName.innerText = this.runtime.isSearching ? "🔍 搜尋妖物中..." : "等待下一場歷練";
            mBar.style.width = "0%";
            mTxt.innerText = "搜尋中";
            mVal.innerText = "0 / 0";
        }

        // 玩家狀態渲染
        let pPer = (p.curHp / p.hp) * 100;
        document.getElementById('p-hp-bar').style.width = pPer + "%";
        document.getElementById('p-hp-txt').innerText = Math.ceil(pPer) + "%";
        document.getElementById('p-hp-val').innerText = `${Math.ceil(p.curHp)} / ${p.hp}`;

        // 屬性數值
        document.getElementById('st-atk').innerText = p.atk;
        document.getElementById('st-hp').innerText = p.hp;
        document.getElementById('st-pts').innerText = p.pts;

        // 背包網格渲染
        const bagContainer = document.getElementById('bag-grid');
        let bagHTML = "";
        const keys = Object.keys(s.inv);
        
        if (keys.length > 0) {
            for (let i = 0; i < keys.length; i++) {
                let name = keys[i];
                let qty = s.inv[name];
                bagHTML += `
                    <div class="bag-item" onclick="game.meltItem('${name}')">
                        🏺 ${name}
                        <b>x${qty}</b>
                        <small>點擊熔煉</small>
                    </div>`;
            }
        } else {
            bagHTML = "<div style='grid-column: span 3; color:#555; text-align:center; padding:30px;'>儲物袋內尚無素材</div>";
        }
        bagContainer.innerHTML = bagHTML;
    }

    /**
     * 熔煉：素材轉感悟
     */
    meltItem(name) {
        if (this.state.inv[name] > 0) {
            this.state.inv[name] -= 1;
            if (this.state.inv[name] <= 0) {
                delete this.state.inv[name];
            }
            this.state.player.pts += 2; // 固定獲得 2 點感悟
            this.log(`🔥 成功熔煉 ${name}，轉化為 2 點感悟！`, "var(--color-info)");
            this.updateUI();
        }
    }

    /**
     * 突破：提升境界
     */
    upgrade() {
        const p = this.state.player;
        if (p.pts >= 5) {
            p.pts -= 5;
            p.lv += 1;
            p.atk += 35;
            p.hp += 120;
            p.curHp = p.hp; // 突破時狀態回滿

            // 突破特效
            const fx = document.getElementById('breakthrough-fx');
            fx.style.animation = 'breakthrough-flash 1s ease-out forwards';
            setTimeout(() => { fx.style.animation = ''; }, 1000);

            this.log(`🌟 破繭成蝶！恭喜掌門晉升至練氣期第 ${p.lv} 層！`, "var(--color-gold)");
            this.buildMapUI(); // 刷新地圖鎖定狀態
            this.updateUI();
        } else {
            this.log("❌ 突破失敗：感悟不足以觸發境界壁壘。");
        }
    }

    /**
     * 招募與分配
     */
    recruit() {
        const cost = 15 + this.state.sect.total * 10;
        if (this.state.res.stone >= cost) {
            this.state.res.stone -= cost;
            this.state.sect.total += 1;
            this.updateUI();
        } else {
            this.log("❌ 靈石儲備不足，無法吸引外門弟子。");
        }
    }

    assign(type, val) {
        const s = this.state.sect;
        const idle = s.total - s.woodD - s.stoneD;
        if (val > 0 && idle <= 0) return;
        
        if (type === 'wood' && s.woodD + val >= 0) s.woodD += val;
        if (type === 'stone' && s.stoneD + val >= 0) s.stoneD += val;
        this.updateUI();
    }

    /**
     * 地圖與導覽
     */
    buildMapUI() {
        const container = document.getElementById('map-list');
        container.innerHTML = "";
        
        this.maps.forEach((m, idx) => {
            const btn = document.createElement('button');
            const locked = this.state.player.lv < m.req;
            
            btn.className = `map-btn ${idx === this.curMapIdx ? 'active' : ''}`;
            if (locked) {
                btn.innerHTML = `🔒 練氣 ${m.req} 層`;
                btn.style.opacity = "0.5";
            } else {
                btn.innerHTML = m.name;
            }

            btn.onclick = () => {
                if (locked) {
                    this.log(`⚠️ 境界不足，強闖 ${m.name} 恐有性命之憂！`, "var(--color-danger)");
                } else {
                    this.curMapIdx = idx;
                    this.runtime.mob = null; // 切換地圖刷新怪
                    this.buildMapUI();
                    this.spawnMonster();
                    this.log(`🚩 已移駕至 ${m.name}。`);
                }
            };
            container.appendChild(btn);
        });
    }

    switchTab(idx, el) {
        const pages = document.querySelectorAll('.page');
        const btns = document.querySelectorAll('.nav-btn');
        pages.forEach(p => p.classList.remove('active'));
        btns.forEach(b => b.classList.remove('active'));
        
        document.getElementById('p' + idx).classList.add('active');
        if (el) el.classList.add('active');
    }

    log(msg, color) {
        const box = document.getElementById('log-box');
        const d = document.createElement('div');
        d.style.color = color || "#adbac7";
        d.innerHTML = `<span style="color:#555;">[${new Date().toLocaleTimeString()}]</span> ${msg}`;
        box.prepend(d);
        if (box.children.length > 30) box.lastChild.remove();
    }

    meditate() {
        this.state.player.curHp = this.state.player.hp;
        this.log("🧘 靜坐冥想，天地靈氣匯聚全身。", "var(--color-success)");
        this.updateUI();
    }

    toggleAuto() {
        this.runtime.autoMode = document.getElementById('auto-check').checked;
    }
}

// 實例化啟動
const game = new XianXiaGame();
</script>
