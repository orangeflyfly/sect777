<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仙俠宗門 V1.6.3-Final - 萬法貫通</title>
    <style>
        :root {
            --color-primary: #a29bfe;
            --color-primary-dark: #6c5ce7;
            --color-bg-deep: #0b0e14;
            --color-card-bg: rgba(28, 33, 40, 0.95);
            --color-text-main: #adbac7;
            --color-text-bright: #ffffff;
            --color-gold: #ffcf40;
            --color-danger: #f85149;
            --color-success: #3fb950;
            --color-border: #444c56;
            --shadow-glaze: 0 0 20px rgba(162, 155, 254, 0.3);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; }
        body { background: #000; color: var(--color-text-main); height: 100vh; display: flex; justify-content: center; overflow: hidden; }

        #app {
            width: 100%; max-width: 500px; height: 100%;
            background: radial-gradient(circle at top, #1a1c2c 0%, #0b0e14 100%);
            display: flex; flex-direction: column; position: relative;
            border-left: 1px solid var(--color-border); border-right: 1px solid var(--color-border);
        }

        /* Header: 數值對帳與境界 */
        header {
            padding: 20px; background: rgba(28, 33, 40, 0.9); border-bottom: 2px solid var(--color-primary);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 100;
        }
        .res-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .res-item { background: rgba(0,0,0,0.5); padding: 5px 12px; border-radius: 15px; font-size: 13px; border: 1px solid var(--color-border); color: #fff; }
        
        .realm-area { display: flex; justify-content: space-between; align-items: center; }
        .realm-tag { color: var(--color-gold); font-size: 20px; font-weight: 900; text-shadow: 0 0 10px var(--color-gold); }
        
        .exp-bar { height: 6px; background: #222; border-radius: 3px; margin-top: 10px; overflow: hidden; border: 1px solid #333; }
        .exp-fill { height: 100%; width: 0%; background: linear-gradient(90deg, var(--color-primary), #fff); transition: width 0.5s; }

        /* 主舞台 */
        .stage { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 120px; position: relative; }
        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 卡片設計與【靈木圖騰】回歸 */
        .card {
            background: var(--color-card-bg); border-radius: 20px; padding: 20px; margin-bottom: 20px;
            border: 1px solid var(--color-border); position: relative; overflow: hidden;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3); transition: 0.3s;
        }
        .card:active { transform: scale(0.98); }
        
        /* 靈木圖騰視覺補完 */
        .wood-icon { 
            position: absolute; right: -10px; top: -10px; font-size: 60px; opacity: 0.1; transform: rotate(15deg); 
            pointer-events: none; color: var(--color-success);
        }

        .card-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; color: #fff; display: flex; align-items: center; gap: 8px; }
        .card-title::before { content: ''; width: 4px; height: 16px; background: var(--color-primary); border-radius: 2px; }

        .p-wrap { height: 28px; background: rgba(0,0,0,0.6); border-radius: 14px; position: relative; overflow: hidden; border: 1px solid #444; margin: 10px 0; }
        .p-fill { height: 100%; width: 0%; transition: width 0.1s linear; }
        .p-label { position: absolute; width: 100%; text-align: center; line-height: 28px; font-size: 11px; color: #fff; z-index: 2; font-weight: bold; }

        /* 底部狀態欄：補回消失的文字 */
        #status-bar {
            position: absolute; bottom: 100px; left: 0; width: 100%;
            background: rgba(0,0,0,0.7); padding: 5px 20px; font-size: 11px;
            color: var(--color-primary); border-top: 1px solid rgba(162, 155, 254, 0.2);
            display: flex; justify-content: space-between; z-index: 50;
        }

        /* 導航欄 */
        nav {
            position: absolute; bottom: 20px; left: 15px; right: 15px;
            height: 70px; background: rgba(28, 33, 40, 0.98); border-radius: 35px;
            display: flex; justify-content: space-around; align-items: center;
            border: 1px solid var(--color-border); box-shadow: 0 10px 30px #000; z-index: 200;
        }
        .nav-btn { color: #666; cursor: pointer; text-align: center; transition: 0.3s; }
        .nav-btn.active { color: var(--color-primary); transform: translateY(-5px); }
        .nav-btn span { display: block; font-size: 20px; }
        .nav-btn small { font-size: 10px; font-weight: bold; }

        /* 戰鬥與日誌 */
        #log-box {
            height: 180px; overflow-y: auto; background: rgba(0,0,0,0.4); border-radius: 15px;
            padding: 15px; font-size: 12px; border: 1px solid #333; line-height: 1.8;
        }
        .log-line { border-bottom: 1px solid rgba(255,255,255,0.05); padding: 3px 0; animation: slideIn 0.3s ease; }
        @keyframes slideIn { from { opacity: 0; transform: translateX(-10px); } to { opacity: 1; transform: translateX(0); } }

        /* 按鈕禁用樣式 */
        button:disabled { opacity: 0.4; cursor: not-allowed; filter: grayscale(1); }
        .btn-action {
            width: 100%; padding: 15px; border-radius: 12px; border: none; background: linear-gradient(135deg, var(--color-primary), var(--color-primary-dark));
            color: #fff; font-weight: bold; cursor: pointer; transition: 0.2s;
        }

        /* 飄字特效 */
        .fly-text {
            position: fixed; pointer-events: none; animation: flyUp 1s forwards; font-weight: 900; z-index: 1000;
        }
        @keyframes flyUp { from { transform: translateY(0); opacity: 1; } to { transform: translateY(-60px); opacity: 0; } }

        /* 漣漪 */
        .ripple { position: absolute; border-radius: 50%; background: rgba(255,255,255,0.3); transform: scale(0); animation: rip 0.6s ease-out; pointer-events: none; }
        @keyframes rip { to { transform: scale(4); opacity: 0; } }
    </style>
</head>
<body>

<div id="app">
    <header>
        <div class="res-row">
            <div class="res-item">🪵 <span id="val-wood">0</span></div>
            <div class="res-item">💠 <span id="val-stone">0</span></div>
            <div class="res-item" id="tag-d" style="display:none; border-color:var(--color-gold)">👥 <span id="val-d-count">0</span></div>
        </div>
        <div class="realm-area">
            <div>
                <span class="realm-tag" id="val-realm">練氣期</span>
                <small style="margin-left:5px; opacity:0.6;">第 <span id="val-lv">1</span> 層</small>
            </div>
            <div style="text-align:right">
                <small style="display:block; font-size:10px;">戰鬥力</small>
                <b id="val-power" style="color:var(--color-primary)">0</b>
            </div>
        </div>
        <div class="exp-bar"><div id="val-exp-fill" class="exp-fill"></div></div>
    </header>

    <div id="status-bar">
        <span id="st-map">🌿 青翠山腳</span>
        <span id="st-info">靈氣平穩...</span>
    </div>

    <main class="stage">
        <div id="p1" class="page active">
            <div class="card" onclick="handleWork('wood', event)">
                <div class="wood-icon">🌲</div>
                <div class="card-title">靈木工坊</div>
                <div class="p-wrap">
                    <div id="bar-wood" class="p-fill" style="background:var(--color-success)"></div>
                    <div class="progress-label">採集千年靈木...</div>
                </div>
            </div>

            <div class="card" onclick="handleWork('stone', event)">
                <div class="wood-icon">💠</div>
                <div class="card-title">地脈礦場</div>
                <div class="p-wrap">
                    <div id="bar-stone" class="p-fill" style="background:#00cec9"></div>
                    <div class="progress-label">挖掘靈石礦脈...</div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">👥 招賢館</div>
                <p style="font-size:12px; margin-bottom:10px;">招募弟子自動生產靈木。當前效率：<span id="val-auto-rate">0</span>/10s</p>
                <button id="btn-recruit" class="btn-action" onclick="recruit(event)">招募弟子 (需 <span id="val-d-cost">10</span> 靈石)</button>
            </div>

            <div id="ui-break" class="card" style="display:none; border:2px solid var(--color-gold)">
                <div class="card-title" style="color:var(--color-gold)">⚡ 築基雷劫</div>
                <button class="btn-action" style="background:var(--color-gold); color:#000" onclick="breakthrough(event)">衝擊築基 (50靈石/40%成功)</button>
            </div>
        </div>

        <div id="p2" class="page">
            <div id="map-tabs" style="display:flex; gap:10px; margin-bottom:15px; overflow-x:auto; padding-bottom:5px;"></div>
            
            <div class="card">
                <div class="card-title">⚔️ <span id="m-name">怪物</span></div>
                <div class="p-wrap" style="height:10px;"><div id="m-hp-bar" class="p-fill" style="background:var(--color-danger)"></div></div>
                <div style="display:flex; justify-content:space-between; font-size:11px; margin-top:5px;">
                    <span>對方血量: <span id="m-hp-txt">0</span></span>
                    <span>等級: <span id="m-lv">1</span></span>
                </div>
                
                <hr style="margin:20px 0; opacity:0.1;">
                
                <div class="p-wrap" style="height:10px;"><div id="p-hp-bar" class="p-fill" style="background:var(--color-success)"></div></div>
                <div style="font-size:11px;">你的狀態: <span id="p-hp-txt">0</span></div>

                <button id="btn-atk" class="btn-action" style="margin-top:20px;" onclick="attack(event)">發動攻擊</button>
            </div>
            <div id="log-box"></div>
        </div>

        <div id="p3" class="page">
            <div class="card">
                <div class="card-title">🧘 修為星盤 <small style="margin-left:auto">潛能點: <span id="val-pts">0</span></small></div>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:10px;">
                        <small>攻擊力</small><br><b id="st-atk" style="font-size:20px; color:var(--color-primary)">0</b>
                        <button class="btn-action" style="padding:5px; margin-top:5px; font-size:10px;" onclick="upgrade('atk')">修煉</button>
                    </div>
                    <div style="background:rgba(255,255,255,0.05); padding:10px; border-radius:10px;">
                        <small>生命值</small><br><b id="st-hp" style="font-size:20px; color:var(--color-success)">0</b>
                        <button class="btn-action" style="padding:5px; margin-top:5px; font-size:10px;" onclick="upgrade('hp')">淬體</button>
                    </div>
                </div>
                <div id="val-talent" style="margin-top:15px; color:var(--color-gold); font-size:12px; text-align:center;"></div>
            </div>

            <div class="card">
                <div class="card-title">🛡️ 當前配備</div>
                <div id="ui-equips" style="font-size:13px;"></div>
            </div>
        </div>

        <div id="p4" class="page">
            <div class="card">
                <div class="card-title">🎒 儲物袋</div>
                <div id="bag-grid" style="display:grid; grid-template-columns: repeat(3, 1fr); gap:8px; max-height:200px; overflow-y:auto;"></div>
            </div>
            <div class="card">
                <div class="card-title">🔥 乾坤煉器</div>
                <p style="font-size:11px; margin-bottom:10px;">消耗 15靈石 + 5素材。隨機產生神兵防具。</p>
                <button id="btn-craft" class="btn-action" onclick="craft(event)">開始煉器</button>
            </div>
        </div>
    </main>

    <nav>
        <div class="nav-btn active" onclick="tab(1, this)"><span>⛩️</span><small>宗門</small></div>
        <div class="nav-btn" onclick="tab(2, this)"><span>⚔️</span><small>歷練</small></div>
        <div class="nav-btn" onclick="tab(3, this)"><span>🧘</span><small>星盤</small></div>
        <div class="nav-btn" onclick="tab(4, this)"><span>🎒</span><small>儲物</small></div>
    </nav>
</div>

<script>
/**
 * ==================================================
 * 【守靈魂】核心驅動系統 V1.6.3-Final
 * ==================================================
 */

// --- 核心數據 (嚴禁簡化) ---
let userWoodBalance = 0;
let userStoneBalance = 0;
let userDiscipleCount = 0;
let userRealmTitle = "練氣期";
let userCurrentLevel = 1;
let userCurrentExp = 0;
let userPotentialPts = 0;

let userBaseAttack = 10;
let userBaseHealthMax = 100;
let userCurrentHp = 100;
let userCritRate = 5;
let userDexterity = 5;

let userActiveTalent = null;
let userInventoryMap = {};
let userEquipmentSet = {
    weapon: { name: "鏽鐵長劍", atk: 5, desc: "普通的鐵劍。" },
    armor: { name: "粗布道袍", hp: 0, desc: "遮風擋雨罷了。" }
};

// --- 世界與怪物數據 ---
const MAPS = [
    { name: "🌿 青翠山腳", lv: 1, mob: "野兔精", hp: 60, atk: 8, exp: 30, drop: "兔毛" },
    { name: "🐍 幽暗密林", lv: 5, mob: "幻影毒蛇", hp: 400, atk: 45, exp: 120, drop: "毒牙" },
    { name: "🔥 熔岩洞穴", lv: 10, mob: "烈焰小鬼", hp: 1500, atk: 180, exp: 400, drop: "火精" }
];
let currentMapIdx = 0;
let activeMob = null;
let currentWork = null;
let workProgress = 0;

// --- 初始化 ---
function init() {
    load();
    renderMapTabs();
    spawnMob();
    tick();
    addLog("🌌 歡迎宗主回歸，仙山大陣運轉正常。", "gold");
}

function tick() {
    const now = Date.now();
    // 自動產出
    if (!window.lastTick) window.lastTick = now;
    if (now - window.lastTick >= 10000) {
        if (userDiscipleCount > 0) {
            let gain = userDiscipleCount * 2;
            userWoodBalance += gain;
            createFlyText(window.innerWidth/2, 100, `+${gain} 靈木 (弟子)`, "#55efc4");
            addLog(`👥 弟子修煉歸來，上繳了 ${gain} 靈木。`);
        }
        window.lastTick = now;
    }

    // 採集進度
    if (currentWork) {
        workProgress += 2; // 調整採集速度
        document.getElementById(`bar-${currentWork}`).style.width = workProgress + "%";
        if (workProgress >= 100) {
            if (currentWork === 'wood') { userWoodBalance += 5; createFlyText(window.innerWidth/2, window.innerHeight/2, "+5 靈木", "#55efc4"); }
            else { userStoneBalance += 2; createFlyText(window.innerWidth/2, window.innerHeight/2, "+2 靈石", "#00cec9"); }
            workProgress = 0; currentWork = null;
        }
    }

    updateUI();
    requestAnimationFrame(tick);
}

// --- 核心邏輯 (貫通點) ---
function updateUI() {
    // 基礎數值
    document.getElementById('val-wood').innerText = Math.floor(userWoodBalance);
    document.getElementById('val-stone').innerText = Math.floor(userStoneBalance);
    document.getElementById('val-realm').innerText = userRealmTitle;
    document.getElementById('val-lv').innerText = userCurrentLevel;
    document.getElementById('val-d-count').innerText = userDiscipleCount;
    document.getElementById('tag-d').style.display = userDiscipleCount > 0 ? "flex" : "none";
    document.getElementById('val-d-cost').innerText = 10 + (userDiscipleCount * 5);
    document.getElementById('val-auto-rate').innerText = userDiscipleCount * 2;

    // 經驗條
    let req = userCurrentLevel * 200;
    document.getElementById('val-exp-fill').style.width = (userCurrentExp / req * 100) + "%";

    // 星盤對帳 (解決能力值死水)
    let totalAtk = userBaseAttack + userEquipmentSet.weapon.atk;
    let totalHp = userBaseHealthMax + userEquipmentSet.armor.hp;
    if (userActiveTalent === "劍道宗師") totalAtk = Math.floor(totalAtk * 1.3);
    if (userActiveTalent === "不滅金身") totalHp = Math.floor(totalHp * 1.4);

    document.getElementById('st-atk').innerText = totalAtk;
    document.getElementById('st-hp').innerText = totalHp;
    document.getElementById('val-power').innerText = totalAtk * 2 + totalHp;
    document.getElementById('val-pts').innerText = userPotentialPts;
    document.getElementById('val-talent').innerText = userActiveTalent ? "✨ 覺醒天賦：" + userActiveTalent : "";

    // 戰鬥 UI
    document.getElementById('p-hp-txt').innerText = `${Math.ceil(userCurrentHp)}/${totalHp}`;
    document.getElementById('p-hp-bar').style.width = (userCurrentHp / totalHp * 100) + "%";
    if (activeMob) {
        document.getElementById('m-name').innerText = activeMob.name;
        document.getElementById('m-lv').innerText = activeMob.lv;
        document.getElementById('m-hp-txt').innerText = `${activeMob.hp}/${activeMob.maxHp}`;
        document.getElementById('m-hp-bar').style.width = (activeMob.hp / activeMob.maxHp * 100) + "%";
    }

    // 裝備與儲物 (補回文字描述)
    document.getElementById('ui-equips').innerHTML = `
        <p>🗡️ <b>${userEquipmentSet.weapon.name}</b> (+${userEquipmentSet.weapon.atk} ATK)</p>
        <p style="font-size:10px; opacity:0.6; margin-bottom:10px;">${userEquipmentSet.weapon.desc}</p>
        <p>🛡️ <b>${userEquipmentSet.armor.name}</b> (+${userEquipmentSet.armor.hp} HP)</p>
        <p style="font-size:10px; opacity:0.6;">${userEquipmentSet.armor.desc}</p>
    `;

    let bagHtml = "";
    for (let key in userInventoryMap) {
        if (userInventoryMap[key] > 0) {
            bagHtml += `<div class="res-item" style="font-size:10px; text-align:center;" onclick="useItem('${key}')">${key}<br>x${userInventoryMap[key]}</div>`;
        }
    }
    document.getElementById('bag-grid').innerHTML = bagHtml;

    // 按鈕防呆
    document.getElementById('btn-recruit').disabled = userStoneBalance < (10 + userDiscipleCount * 5);
    document.getElementById('btn-craft').disabled = userStoneBalance < 15 || Object.keys(userInventoryMap).length === 0;
    document.getElementById('ui-break').style.display = (userRealmTitle === "練氣期" && userCurrentLevel === 10 && userCurrentExp >= req) ? "block" : "none";
}

// --- 功能執行 ---
function handleWork(type, e) {
    if (currentWork) return;
    ripple(e);
    currentWork = type;
    workProgress = 0;
    document.getElementById('st-info').innerText = "正在認真勞動中...";
}

function attack(e) {
    ripple(e);
    let totalAtk = userBaseAttack + userEquipmentSet.weapon.atk;
    if (userActiveTalent === "劍道宗師") totalAtk = Math.floor(totalAtk * 1.3);

    // 玩家攻擊
    let dmg = Math.floor(totalAtk * (0.9 + Math.random() * 0.2));
    activeMob.hp -= dmg;
    createFlyText(e.clientX, e.clientY, `-${dmg}`, "#fff");
    addLog(`⚔️ 你揮劍斬向 ${activeMob.name}，造成 ${dmg} 傷害。`);

    // 怪物反擊 (時間差延遲)
    setTimeout(() => {
        if (activeMob.hp > 0) {
            let mDmg = Math.max(1, activeMob.atk - (userCurrentLevel * 2));
            userCurrentHp -= mDmg;
            addLog(`🩸 ${activeMob.name} 反擊，你受創 ${mDmg} 點！`, "dmg");
            if (userCurrentHp <= 0) die();
        } else {
            win();
        }
    }, 200);
}

function win() {
    addLog(`✅ 擊殺成功！${activeMob.name} 化作灰燼。`, "gold");
    userCurrentExp += activeMob.exp;
    userInventoryMap[activeMob.drop] = (userInventoryMap[activeMob.drop] || 0) + 1;
    checkLv();
    spawnMob();
}

function die() {
    addLog(`💀 鬥法失敗，你拖著重傷的身軀逃回宗門。`, "dmg");
    let totalHp = userBaseHealthMax + userEquipmentSet.armor.hp;
    userCurrentHp = totalHp * 0.2;
    spawnMob(); // 解決守屍問題
    tab(1, document.querySelector('.nav-btn'));
}

function recruit(e) {
    ripple(e);
    let cost = 10 + (userDiscipleCount * 5);
    userStoneBalance -= cost;
    userDiscipleCount++;
    addLog(`👥 一名散修被你的威名吸引，加入宗門。`, "gold");
}

function upgrade(type) {
    if (userPotentialPts <= 0) return;
    if (type === 'atk') userBaseAttack += 5;
    else userBaseHealthMax += 50;
    userPotentialPts--;
    addLog("🧘 修為提升，感覺充滿了力量。");
}

function craft(e) {
    ripple(e);
    userStoneBalance -= 15;
    // 扣除素材
    let count = 0;
    for (let k in userInventoryMap) {
        if (userInventoryMap[k] > 0) {
            userInventoryMap[k]--;
            count++;
            if (count >= 5) break;
        }
    }
    
    if (Math.random() > 0.5) {
        userEquipmentSet.weapon = { name: "星辰靈劍", atk: 40 + userCurrentLevel * 5, desc: "流轉著星辰之力的寶劍。" };
        addLog("🔥 爐火大旺！煉成神兵：星辰靈劍！", "gold");
    } else {
        userEquipmentSet.armor = { name: "金蠶絲甲", hp: 300 + userCurrentLevel * 20, desc: "防禦驚人的軟甲。" };
        addLog("🔥 爐火大旺！煉成寶甲：金蠶絲甲！", "gold");
    }
}

function breakthrough(e) {
    ripple(e);
    userStoneBalance -= 50;
    if (Math.random() < 0.4) {
        userRealmTitle = "築基期";
        userCurrentLevel = 1; userCurrentExp = 0; userPotentialPts += 20;
        const ts = ["劍道宗師", "不滅金身"];
        userActiveTalent = ts[Math.floor(Math.random()*ts.length)];
        addLog(`🎊 恭喜！逆天改命成功，晉升築基！獲得天賦：${userActiveTalent}`, "gold");
    } else {
        userCurrentLevel = 9; userCurrentExp = 0;
        addLog(`💀 雷劫太強！突破失敗，修為倒退回 9 層...`, "dmg");
    }
}

function checkLv() {
    let req = userCurrentLevel * 200;
    if (userCurrentExp >= req && (userCurrentLevel < 10 || userRealmTitle === "築基期")) {
        userCurrentExp -= req;
        userCurrentLevel++;
        userPotentialPts += 5;
        addLog(`🌟 突破！你升到了第 ${userCurrentLevel} 層。`, "gold");
    }
}

function spawnMob() {
    let d = MAPS[currentMapIdx];
    activeMob = { 
        name: d.mob, 
        maxHp: d.hp + (userCurrentLevel * 20), 
        hp: d.hp + (userCurrentLevel * 20), 
        atk: d.atk + (userCurrentLevel * 5), 
        exp: d.exp, 
        drop: d.drop,
        lv: d.lv 
    };
    document.getElementById('st-map').innerText = d.name;
}

function renderMapTabs() {
    let h = "";
    MAPS.forEach((m, i) => {
        h += `<button class="res-item" onclick="changeMap(${i})" style="${currentMapIdx==i?'border-color:var(--color-primary)':''}">${m.name}</button>`;
    });
    document.getElementById('map-tabs').innerHTML = h;
}

function changeMap(i) {
    if (userCurrentLevel < MAPS[i].lv && userRealmTitle === "練氣期") {
        addLog("❌ 此地靈壓太重，你無法靠近！", "dmg");
        return;
    }
    currentMapIdx = i;
    spawnMob();
    renderMapTabs();
    addLog(`🚀 移駕：${MAPS[i].name}`);
}

// --- 工具 ---
function addLog(msg, type) {
    let box = document.getElementById('log-box');
    let div = document.createElement('div');
    div.className = 'log-line';
    if (type === "gold") div.style.color = "var(--color-gold)";
    if (type === "dmg") div.style.color = "var(--color-danger)";
    div.innerText = "◈ " + msg;
    box.prepend(div);
}

function tab(p, el) {
    document.querySelectorAll('.page').forEach(x => x.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
    document.getElementById('p' + p).classList.add('active');
    el.classList.add('active');
}

function createFlyText(x, y, txt, color) {
    let el = document.createElement('div');
    el.className = 'fly-text';
    el.innerText = txt;
    el.style.left = x + 'px'; el.style.top = y + 'px'; el.style.color = color;
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 1000);
}

function ripple(e) {
    if(!e) return;
    let r = document.createElement('div');
    r.className = 'ripple';
    r.style.left = e.clientX + 'px'; r.style.top = e.clientY + 'px';
    document.body.appendChild(r);
    setTimeout(() => r.remove(), 600);
}

function save() {
    let d = { wood: userWoodBalance, stone: userStoneBalance, d: userDiscipleCount, realm: userRealmTitle, lv: userCurrentLevel, exp: userCurrentExp, pts: userPotentialPts, atk: userBaseAttack, hp: userBaseHealthMax, t: userActiveTalent, inv: userInventoryMap, eq: userEquipmentSet };
    localStorage.setItem('xian_final_v163', JSON.stringify(d));
}

function load() {
    let s = localStorage.getItem('xian_final_v163');
    if (s) {
        let p = JSON.parse(s);
        userWoodBalance = p.wood || 0;
        userStoneBalance = p.stone || 0;
        userDiscipleCount = p.d || 0;
        userRealmTitle = p.realm || "練氣期";
        userCurrentLevel = p.lv || 1;
        userCurrentExp = p.exp || 0;
        userPotentialPts = p.pts || 0;
        userBaseAttack = p.atk || 10;
        userBaseHealthMax = p.hp || 100;
        userActiveTalent = p.t || null;
        userInventoryMap = p.inv || {};
        userEquipmentSet = p.eq || userEquipmentSet;
        userCurrentHp = userBaseHealthMax + userEquipmentSet.armor.hp;
    }
}

window.onload = init;
setInterval(save, 5000);
</script>
</body>
</html>
