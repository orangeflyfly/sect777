<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仙俠宗門 V0.4.4 - UI優化版</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
    <header>
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <span class="realm-tag" id="val-realm">載入中</span>
            <span style="font-size: 12px;">LV <b id="val-lv">1</b></span>
        </div>
        <div class="bar-container"><div id="bar-xp" class="bar-fill" style="width: 0%; background: var(--info);"></div></div>
        <div class="bar-container" style="height: 5px; margin-top: 0;"><div id="bar-p-hp" class="bar-fill" style="width: 100%; background: var(--success);"></div></div>
        <div style="display: flex; justify-content: space-between; font-size: 10px; margin-top: 2px;">
            <span>戰力: <b id="val-power" style="color: var(--gold);">0</b></span>
            <span>修為: <span id="val-xp">0</span>/<span id="val-next-xp">100</span></span>
        </div>
    </header>

    <div id="p-battle" class="stage" style="display: flex;">
        <div class="battle-view">
            <div id="m-card" class="monster-card" onclick="game.manualAtk(event)">👹</div>
            <div class="action-bar">
                <div id="btn-auto" onclick="game.toggleAuto()" style="padding: 8px 12px; background: #30363d; border-radius: 6px; cursor: pointer; font-size: 12px;">自動歷練: OFF</div>
                <button id="btn-skill" class="btn-skill" onclick="game.useSkill()">
                    御劍術
                    <div id="skill-cd" class="skill-cd"></div>
                </button>
            </div>
            <div style="width: 100%; max-width: 250px; margin-top: 15px;">
                <div style="display: flex; justify-content: space-between; font-size: 12px; margin-bottom: 3px;">
                    <b id="m-name">載入中...</b>
                    <b id="m-hp-txt">0/0</b>
                </div>
                <div class="bar-container"><div id="bar-m-hp" class="bar-fill" style="width: 100%; background: var(--danger);"></div></div>
            </div>
            <div id="log"></div>
        </div>
    </div>

    <div id="p-stats" class="stage" style="display: none; padding: 15px;">
        <h4 style="margin-bottom: 8px;">修為面板 (潛能: <span id="val-pts" style="color:var(--gold)">0</span>)</h4>
        <div id="stat-list"></div>
        
        <div class="equip-box">
            <div class="slot">⚔️ 武器<b id="eq-weapon">無</b></div>
            <div class="slot">🛡️ 防具<b id="eq-body">無</b></div>
        </div>

        <div class="stats-panel">
            <p style="font-size: 12px;">當前氣血: <b id="val-hp">0/0</b></p>
            <div class="stat-detail-grid">
                <div class="stat-detail-item">秒回血 <b id="val-regen">0</b></div>
                <div class="stat-detail-item">閃避 <b id="val-evasion">0</b>%</div>
                <div class="stat-detail-item">暴傷 <b id="val-crit-dmg">1.5</b>x</div>
            </div>
            <div style="font-size: 11px; background: rgba(0,0,0,0.2); padding: 8px; border-radius: 6px;">
                <div style="display:flex; justify-content:space-between; margin-bottom:2px;">
                    <span>基礎攻擊: <b id="val-atk">0</b></span>
                    <span>暴擊率: <b id="val-crit">0</b>%</span>
                </div>
                <div>攻擊速度: <b id="val-spd">0</b> 次/秒</div>
            </div>
            <button class="btn-reset" onclick="game.respec()">重置所有屬性點 (洗點)</button>
        </div>
    </div>

    <div id="p-bag" class="stage" style="display: none; padding: 15px;">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
            <h4>儲物袋 (<span id="bag-count">0</span>/20)</h4>
            <button onclick="game.quickMelt()" style="padding: 4px 8px; background: var(--danger); border: 0; color: #fff; border-radius: 4px; font-size: 11px; cursor: pointer;">一鍵熔煉</button>
        </div>
        <div id="bag-list" class="bag-grid"></div>
    </div>

    <nav>
        <div class="tab active" onclick="game.switchTab('battle', this)">戰鬥</div>
        <div class="tab" onclick="game.switchTab('stats', this)">修為</div>
        <div class="tab" onclick="game.switchTab('bag', this)">儲物袋</div>
    </nav>
</div>

<script src="game.js"></script>
</body>
</html>
