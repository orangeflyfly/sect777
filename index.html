<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>宗門修仙錄 V1.5.10 - 大乘圓滿</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="toast-container"></div>
    <div id="item-modal" class="modal" style="display:none;"></div>

    <div id="game-container">
        <header class="header-info">
            <div class="header-line">
                <span id="val-level" class="realm-text">感應中...</span>
                <span id="val-money" class="coin-text">🪙 0</span>
            </div>
            <div class="exp-bar-container">
                <div id="val-exp-bar" class="exp-bar-fill"></div>
                <div id="val-exp-txt" class="exp-text-overlay">0%</div>
            </div>
        </header>

        <section id="battle-screen" class="stage">
            <div class="map-selector">
                <button class="map-btn" onclick="UI_Battle.showMapSelector()">🗺️ 前往歷練</button>
            </div>
            
            <div id="monster-display" class="battle-main">
                </div>

            <button id="boss-btn" class="boss-btn" onclick="Combat.initBattle(true)" style="display:none;">挑戰區域領主</button>

            <div class="log-system">
                <div class="log-tabs">
                    <button class="log-tab active" onclick="UI_Battle.switchLog('all')">全部</button>
                    <button class="log-tab" onclick="UI_Battle.switchLog('combat')">鬥法</button>
                    <button class="log-tab" onclick="UI_Battle.switchLog('loot')">獲取</button>
                </div>
                <div id="battle-logs" class="log-list"></div>
            </div>
        </section>

        <section id="bag-screen" class="stage" style="display:none;">
            <div class="bag-header">
                <h4>儲物袋 (<span id="bag-count">0</span>/50)</h4>
                <button class="btn-auto-melt" onclick="player.autoMelt()">一鍵熔煉(凡/良)</button>
            </div>
            <div id="bag-grid" class="bag-grid"></div>
        </section>

        <section id="stats-screen" class="stage" style="display:none;">
            <div class="stats-section">
                <h4>本命命牌</h4>
                <div id="detail-stats-list" class="stats-grid-v2"></div>
                <div class="pts-box">
                    <span>可用潛能: <b id="val-pts" style="color:gold;">0</b></span>
                </div>
                <div id="stat-allocate-list" class="stat-allocate-list"></div>
            </div>
        </section>

        <section id="shop-screen" class="stage" style="display:none;">
            <h4>萬寶閣</h4>
            <div id="shop-list" class="shop-grid"></div>
        </section>

        <nav class="nav-bar">
            <button class="nav-btn active" onclick="GameCore.switchTab('battle')">⚔️ 歷練</button>
            <button class="nav-btn" onclick="GameCore.switchTab('bag')">🎒 儲物</button>
            <button class="nav-btn" onclick="GameCore.switchTab('stats')">🧘 修為</button>
            <button class="nav-btn" onclick="GameCore.switchTab('shop')">🏪 坊市</button>
        </nav>
    </div>

    <script src="data.js"></script>
    <script src="player.js"></script>
    <script src="combat.js"></script>
    <script src="ui_battle.js"></script>
    <script src="ui_stats.js"></script>
    <script src="ui_bag.js"></script>
    <script src="ui_shop.js"></script>
    <script src="core.js"></script>
</body>
</html>
