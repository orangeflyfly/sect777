<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仙俠宗門 V2.0.0 - 終極穩定版</title>
    <style>
        :root {
            --color-primary: #a29bfe; 
            --color-primary-dark: #6c5ce7;
            --color-bg-deep: #0b0e14; 
            --color-card-bg: rgba(30, 35, 45, 0.98);
            --color-text-main: #adbac7; 
            --color-gold: #ffcf40;
            --color-danger: #f85149; 
            --color-success: #3fb950;
            --color-info: #0fbcf9; 
            --color-border: rgba(162,155,254,0.6);
            --color-inner-bg: #11151c;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: sans-serif; user-select: none; }
        body { background: #000; color: var(--color-text-main); height: 100vh; display: flex; justify-content: center; overflow: hidden; }

        #app {
            width: 100%; max-width: 500px; height: 100%; 
            background: radial-gradient(circle at top, #1a1c2c 0%, #0b0e14 100%);
            display: flex; flex-direction: column; position: relative; border: 2px solid var(--color-border);
        }

        header { padding: 15px; background: rgba(20, 25, 35, 0.98); border-bottom: 2px solid var(--color-primary); }
        .res-row { display: flex; gap: 8px; margin-bottom: 10px; }
        .res-item { background: #000; padding: 8px; border-radius: 8px; border: 1px solid var(--color-border); flex: 1; text-align: center; font-size: 13px; color: #fff; }

        .stage { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 100px; }
        .page { display: none; }
        .page.active { display: block; }

        .card { background: var(--color-card-bg); border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid var(--color-border); }
        .card-title { font-size: 15px; font-weight: bold; margin-bottom: 10px; color: var(--color-gold); border-left: 4px solid var(--color-gold); padding-left: 8px; }

        /* 雙軌產出 UI */
        .work-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 10px; }
        .work-box { background: var(--color-inner-bg); padding: 10px; border-radius: 10px; text-align: center; border: 1px solid #333; }
        .ctrl-btns { display: flex; gap: 5px; margin-top: 5px; }
        .btn-s { flex: 1; padding: 5px; border-radius: 5px; border: none; color: #fff; font-weight: bold; cursor: pointer; }

        .btn-main { width: 100%; padding: 12px; border-radius: 10px; background: var(--color-primary-dark); color: #fff; font-weight: bold; border: none; cursor: pointer; margin-bottom: 10px; }
        .btn-main:disabled { background: #444; cursor: not-allowed; }

        .hp-wrap { height: 30px; background: #000; border-radius: 15px; overflow: hidden; margin-bottom: 10px; border: 1px solid #444; position: relative; }
        .hp-fill { height: 100%; transition: width 0.2s; }
        .hp-text { position: absolute; width: 100%; text-align: center; font-size: 12px; line-height: 28px; color: #fff; font-weight: bold; z-index: 5; }

        #log-box { height: 150px; overflow-y: auto; background: rgba(0,0,0,0.8); border-radius: 10px; padding: 10px; font-size: 12px; border: 1px solid var(--color-border); color: #ccc; }

        nav { position: absolute; bottom: 10px; left: 10px; right: 10px; height: 70px; background: #1a1e26; border-radius: 35px; display: flex; border: 1px solid var(--color-primary); }
        .nav-btn { flex: 1; text-align: center; padding: 10px 0; color: #555; cursor: pointer; }
        .nav-btn.active { color: var(--color-gold); }
        .nav-btn span { font-size: 20px; display: block; }

        .bag-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
        .bag-item { background: #1a1e26; border: 1px solid #444; padding: 10px 5px; text-align: center; border-radius: 8px; font-size: 12px; }
    </style>
</head>
<body>

<div id="app">
    <header>
        <div class="res-row">
            <div class="res-item">🌲 靈木: <span id="ui-wood">0</span></div>
            <div class="res-item">💠 靈石: <span id="ui-stone">0</span></div>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div><b id="ui-realm" style="color:var(--color-gold); font-size:20px;">載入中</b><br><small id="ui-lv">第 1 層</small></div>
            <div style="text-align:right"><small>戰力</small><br><b id="ui-power" style="color:var(--color-info)">0</b></div>
        </div>
    </header>

    <main class="stage">
        <div id="page-1" class="page active">
            <div class="card">
                <div class="card-title">宗門建設</div>
                <button class="btn-main" onclick="gm.recruit()">招募弟子 (靈石:<span id="ui-recruit-cost">0</span>)</button>
                <div style="text-align:center; font-size:13px; margin-bottom:10px;">弟子: <b id="ui-d-total">0</b> | 閒置: <b id="ui-d-idle" style="color:var(--color-success)">0</b></div>
                
                <div class="work-grid">
                    <div class="work-box">
                        <small>🌲 伐木場</small><br><b id="ui-d-wood">0</b>
                        <div class="ctrl-btns">
                            <button class="btn-s" style="background:var(--color-primary-dark)" onclick="gm.assign('wood', 1)">+</button>
                            <button class="btn-s" style="background:var(--color-danger)" onclick="gm.assign('wood', -1)">-</button>
                        </div>
                    </div>
                    <div class="work-box">
                        <small>💠 採礦坑</small><br><b id="ui-d-stone">0</b>
                        <div class="ctrl-btns">
                            <button class="btn-s" style="background:var(--color-primary-dark)" onclick="gm.assign('stone', 1)">+</button>
                            <button class="btn-s" style="background:var(--color-danger)" onclick="gm.assign('stone', -1)">-</button>
                        </div>
                    </div>
                </div>
            </div>
            <div class="card" onclick="gm.manual()">
                <div class="card-title">掌門親修</div>
                <div class="hp-wrap">
                    <div id="ui-work-bar" class="hp-fill" style="width:0%; background:var(--color-primary)"></div>
                    <div class="hp-text">點擊手動採集</div>
                </div>
            </div>
        </div>

        <div id="page-2" class="page">
            <div id="ui-maps" style="display:flex; gap:8px; margin-bottom:10px; overflow-x:auto;"></div>
            <div class="card">
                <div style="display:flex; justify-content:space-between; margin-bottom:10px;">
                    <b id="ui-m-name" style="color:var(--color-gold)">尋敵中...</b>
                    <label><input type="checkbox" id="ui-auto-cb" onchange="gm.state.auto=this.checked"> 自動歷練</label>
                </div>
                <div class="hp-wrap"><div id="ui-m-hp-bar" class="hp-fill" style="background:var(--color-danger); width:0%"></div><div class="hp-text" id="ui-m-hp-txt">0%</div></div>
                <div class="hp-wrap"><div id="ui-p-hp-bar" class="hp-fill" style="background:var(--color-success); width:100%"></div><div class="hp-text" id="ui-p-hp-txt">100%</div></div>
                <div style="display:grid; grid-template-columns: 2fr 1fr; gap:10px;">
                    <button class="btn-main" onclick="gm.attack()" style="height:50px;">發動攻擊</button>
                    <button class="btn-main" onclick="gm.rest()" style="background:var(--color-info); height:50px;">休息</button>
                </div>
            </div>
            <div id="log-box"></div>
        </div>

        <div id="page-3" class="page">
            <div class="card">
                <div class="card-title">修為屬性</div>
                <div style="display:flex; justify-content:space-around; text-align:center;">
                    <div><small>攻擊</small><br><b id="ui-atk">0</b></div>
                    <div><small>生命</small><br><b id="ui-hp">0</b></div>
                    <div><small>感悟</small><br><b id="ui-pts" style="color:var(--color-gold)">0</b></div>
                </div>
                <button class="btn-main" style="margin-top:15px;" onclick="gm.upgrade()">提升境界 (需 5 感悟)</button>
            </div>
            <div class="card"><div class="card-title">儲物袋</div><div id="ui-bag" class="bag-grid"></div></div>
        </div>
    </main>

    <nav>
        <div class="nav-btn active" onclick="gm.tab(1,this)"><span>⛩️</span><small>宗門</small></div>
        <div class="nav-btn" onclick="gm.tab(2,this)"><span>⚔️</span><small>歷練</small></div>
        <div class="nav-btn" onclick="gm.tab(3,this)"><span>🎒</span><small>背包</small></div>
    </nav>
</div>

<script>
class SectGame {
    constructor() {
        const saved = localStorage.getItem('SectV2');
        this.state = saved ? JSON.parse(saved) : {
            wood: 0, stone: 10, totalD: 0, woodD: 0, stoneD: 0,
            atk: 60, hp: 500, curHp: 500, pts: 0, lv: 1, realm: "練氣期",
            bag: {}, auto: false
        };
        
        this.runtime = { mob: null, searching: false, work: 0, lastAtk: 0 };
        this.maps = [
            { id: 0, name: "🌿 青雲山", req: 1, m: { n: "野豬", hp: 200, atk: 30, loot: "獠牙" } },
            { id: 1, name: "🐍 幽冥林", req: 5, m: { n: "毒蛇", hp: 1500, atk: 120, loot: "毒腺" } }
        ];
        this.curMap = 0;
        
        this.init();
    }

    init() {
        setInterval(() => this.tick(), 1000);
        this.renderMaps();
        this.updateUI();
        this.log("宗門系統重啟成功。");
    }

    save() { localStorage.setItem('SectV2', JSON.stringify(this.state)); }

    tick() {
        // 資源產出
        if (this.state.woodD > 0) this.state.wood += this.state.woodD * 1;
        if (this.state.stoneD > 0) this.state.stone += this.state.stoneD * 0.3;

        // 自動戰鬥
        if (this.state.auto) {
            if (!this.runtime.mob && !this.runtime.searching) this.spawn();
            else if (this.runtime.mob) this.attack();
        }
        
        this.updateUI();
        this.save();
    }

    recruit() {
        const cost = 20 + this.state.totalD * 10;
        if (this.state.stone >= cost) {
            this.state.stone -= cost;
            this.state.totalD++;
            this.updateUI();
        } else { this.log("靈石不足！"); }
    }

    assign(type, val) {
        const idle = this.state.totalD - this.state.woodD - this.state.stoneD;
        if (val > 0 && idle <= 0) return;
        if (type === 'wood' && this.state.woodD + val >= 0) this.state.woodD += val;
        if (type === 'stone' && this.state.stoneD + val >= 0) this.state.stoneD += val;
        this.updateUI();
    }

    manual() {
        this.runtime.work += 25;
        if (this.runtime.work >= 100) {
            this.runtime.work = 0;
            this.state.wood += 5;
            this.state.stone += 1;
        }
        this.updateUI();
    }

    spawn() {
        this.runtime.searching = true;
        setTimeout(() => {
            const m = this.maps[this.curMap].m;
            this.runtime.mob = { ...m, curH: m.hp };
            this.runtime.searching = false;
            this.updateUI();
        }, 1000);
    }

    attack() {
        if (!this.runtime.mob || Date.now() - this.runtime.lastAtk < 800) return;
        this.runtime.lastAtk = Date.now();
        
        const m = this.runtime.mob;
        m.curH -= this.state.atk;
        if (m.curH <= 0) {
            this.state.pts += 1;
            this.state.bag[m.loot] = (this.state.bag[m.loot] || 0) + 1;
            this.log(`擊敗 ${m.n}，獲感悟與${m.loot}`);
            this.runtime.mob = null;
        } else {
            this.state.curHp -= m.atk;
            if (this.state.curHp <= 0) {
                this.state.curHp = 50;
                this.state.auto = false;
                this.runtime.mob = null;
                this.log("力戰不支，撤回宗門。", "red");
                this.tab(1);
            }
        }
        this.updateUI();
    }

    upgrade() {
        if (this.state.pts >= 5) {
            this.state.pts -= 5; this.state.lv++; this.state.atk += 50; this.state.hp += 200; this.state.curHp = this.state.hp;
            this.log(`突破！當前練氣 ${this.state.lv} 層`);
            this.renderMaps();
            this.updateUI();
        }
    }

    updateUI() {
        const set = (id, txt) => { const el = document.getElementById(id); if(el) el.innerText = txt; };
        set('ui-wood', Math.floor(this.state.wood));
        set('ui-stone', Math.floor(this.state.stone));
        set('ui-realm', this.state.realm);
        set('ui-lv', `第 ${this.state.lv} 層`);
        set('ui-power', this.state.atk * 10 + this.state.hp);
        set('ui-recruit-cost', 20 + this.state.totalD * 10);
        set('ui-d-total', this.state.totalD);
        set('ui-d-idle', this.state.totalD - this.state.woodD - this.state.stoneD);
        set('ui-d-wood', this.state.woodD);
        set('ui-d-stone', this.state.stoneD);
        set('ui-atk', this.state.atk);
        set('ui-hp', this.state.hp);
        set('ui-pts', this.state.pts);
        document.getElementById('ui-work-bar').style.width = this.runtime.work + "%";
        document.getElementById('ui-auto-cb').checked = this.state.auto;

        const m = this.runtime.mob;
        set('ui-m-name', m ? m.n : (this.runtime.searching ? "搜尋中..." : "待戰"));
        document.getElementById('ui-m-hp-bar').style.width = m ? (m.curH/m.hp*100)+"%" : "0%";
        set('ui-m-hp-txt', m ? Math.ceil(m.curH/m.hp*100)+"%" : "0%");
        document.getElementById('ui-p-hp-bar').style.width = (this.state.curHp/this.state.hp*100)+"%";
        set('ui-p-hp-txt', Math.ceil(this.state.curHp/this.state.hp*100)+"%");

        let bH = "";
        for(let k in this.state.bag) bH += `<div class="bag-item">${k}<br><b>x${this.state.bag[k]}</b></div>`;
        document.getElementById('ui-bag').innerHTML = bH;
    }

    renderMaps() {
        const box = document.getElementById('ui-maps');
        box.innerHTML = "";
        this.maps.forEach((m, i) => {
            const btn = document.createElement('button');
            const lock = this.state.lv < m.req;
            btn.className = "btn-s";
            btn.style.backgroundColor = i === this.curMap ? "var(--color-primary-dark)" : "#333";
            btn.style.minWidth = "80px";
            btn.innerText = lock ? `🔒Lv.${m.req}` : m.name;
            btn.onclick = () => { if(!lock){ this.curMap = i; this.runtime.mob=null; this.renderMaps(); } };
            box.appendChild(btn);
        });
    }

    tab(i, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(`page-${i}`).classList.add('active');
        if(el) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }
    }

    log(m, c) {
        const b = document.getElementById('log-box');
        const d = document.createElement('div');
        d.style.color = c || "#ccc";
        d.innerHTML = `<small>${new Date().toLocaleTimeString()}</small> ${m}`;
        b.prepend(d);
    }
    
    rest() { this.state.curHp = this.state.hp; this.log("打坐回氣，血量已滿。"); this.updateUI(); }
}
const gm = new SectGame();
</script>
</body>
</html>
