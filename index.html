<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>仙俠宗門 - V1.4.8 真正的基石</title>
    <style>
        /* =========================================
           【第一章：仙界視覺架構】
           ========================================= */
        :root {
            --primary-color: #a29bfe;
            --background-color: #0b0e14;
            --card-background: #161b22;
            --text-color: #c9d1d9;
            --gold-color: #ffcf40;
            --danger-color: #ff4d4d;
            --border-color: #30363d;
            --hp-bar-color: #23d160;
            --exp-bar-color: #7d5fff;
            --transition-speed: 0.3s;
        }

        /* 基礎重置 */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            touch-action: manipulation;
        }

        body {
            background-color: var(--background-color);
            color: var(--text-color);
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        /* 遊戲主容器 */
        #game-container {
            width: 100%;
            max-width: 480px;
            height: 100%;
            display: flex;
            flex-direction: column;
            border-left: 1px solid var(--border-color);
            border-right: 1px solid var(--border-color);
            position: relative;
            background-color: var(--background-color);
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        /* 資源顯示欄 */
        .resource-header {
            padding: 15px 20px;
            background-color: var(--card-background);
            border-bottom: 2px solid var(--primary-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .resource-item {
            font-size: 14px;
            font-weight: bold;
            color: var(--text-color);
        }

        .level-badge {
            color: var(--gold-color);
            font-weight: 900;
            letter-spacing: 1px;
        }

        /* 內容區域 */
        .content-main {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            padding-bottom: 160px;
            scrollbar-width: thin;
        }

        .content-main::-webkit-scrollbar {
            width: 4px;
        }

        .content-main::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }

        /* 頁面切換 */
        .view-page {
            display: none;
        }

        .view-page.active-view {
            display: block;
            animation: fadeInAnimation 0.5s ease;
        }

        @keyframes fadeInAnimation {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* 卡片組件 */
        .info-card {
            background-color: var(--card-background);
            padding: 20px;
            border-radius: 16px;
            margin-bottom: 25px;
            border: 1px solid var(--border-color);
            transition: transform 0.2s;
        }

        .info-card:hover {
            border-color: var(--primary-color);
        }

        .card-header-title {
            font-size: 16px;
            font-weight: 800;
            margin-bottom: 18px;
            color: var(--primary-color);
            border-left: 6px solid var(--primary-color);
            padding-left: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 進度條/血條系統 */
        .progress-container {
            height: 20px;
            background-color: #000000;
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid #444444;
            position: relative;
            margin: 12px 0;
            box-shadow: inset 0 2px 4px rgba(0,0,0,0.5);
        }

        .progress-fill {
            height: 100%;
            width: 0%;
            transition: width 0.1s linear;
        }

        .player-hp-fill {
            background: linear-gradient(90deg, #2ecc71, #23d160);
        }

        .enemy-hp-fill {
            background: linear-gradient(90deg, #e74c3c, #ff4d4d);
        }

        .exp-fill {
            background: linear-gradient(90deg, #9b59b6, #7d5fff);
        }

        /* 按鈕系統 */
        .standard-button {
            background-color: #21262d;
            color: #ffffff;
            border: 1px solid #444444;
            padding: 10px 18px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 13px;
            font-weight: bold;
            transition: all 0.2s;
        }

        .standard-button:hover {
            background-color: #30363d;
            border-color: var(--primary-color);
        }

        .standard-button:active {
            transform: scale(0.96);
        }

        .action-button-large {
            background: linear-gradient(135deg, #a29bfe, #6c5ce7);
            border: none;
            font-weight: 900;
            width: 100%;
            padding: 18px;
            color: #ffffff;
            border-radius: 15px;
            font-size: 18px;
            cursor: pointer;
            box-shadow: 0 6px 20px rgba(108, 92, 231, 0.4);
            margin-top: 10px;
        }

        /* 導航底欄 */
        .bottom-navigation {
            position: absolute;
            bottom: 30px;
            left: 20px;
            right: 20px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            background-color: rgba(22, 27, 34, 0.98);
            padding: 18px;
            border-radius: 25px;
            border: 1px solid var(--border-color);
            backdrop-filter: blur(15px);
            z-index: 200;
        }

        .nav-button {
            text-align: center;
            font-size: 13px;
            cursor: pointer;
            color: #8b949e;
            transition: color 0.3s, transform 0.3s;
        }

        .nav-button.is-active {
            color: var(--primary-color);
            font-weight: 900;
            transform: translateY(-4px);
        }

        /* 戰鬥日誌 */
        #battle-log-window {
            height: 160px;
            overflow-y: auto;
            background-color: rgba(0, 0, 0, 0.6);
            padding: 15px;
            font-size: 12px;
            border-radius: 12px;
            border: 1px solid var(--border-color);
            margin-top: 15px;
            line-height: 2;
            color: #d1d5db;
        }

        /* 地圖滾動 */
        .map-selector {
            display: flex;
            gap: 15px;
            overflow-x: auto;
            padding-bottom: 15px;
            scrollbar-width: none;
        }

        .map-card {
            min-width: 120px;
            padding: 18px;
            background-color: #21262d;
            border: 1px solid var(--border-color);
            border-radius: 15px;
            font-size: 12px;
            text-align: center;
            cursor: pointer;
        }

        .map-card.is-active {
            border-color: var(--primary-color);
            background-color: rgba(162, 155, 254, 0.15);
        }

        .map-card.is-locked {
            opacity: 0.3;
            filter: grayscale(1);
            cursor: not-allowed;
        }

        /* 裝備欄位 */
        .equipment-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
            margin-top: 15px;
        }

        .equipment-box {
            background-color: #0d1117;
            border: 1px dashed #444444;
            padding: 15px;
            border-radius: 12px;
            text-align: center;
            font-size: 11px;
        }

        .equipment-box b {
            color: var(--gold-color);
            display: block;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>

<div id="game-container">
    <div class="resource-header">
        <div class="resource-item">
            📜 靈木: <span id="val-wood">0</span> | 
            💠 靈石: <span id="val-stone">0</span>
        </div>
        <div class="level-badge">
            練氣 <span id="val-lv">1</span> 層
        </div>
    </div>

    <div class="content-main">
        
        <div id="view-sect" class="view-page active-view">
            <div class="info-card" onclick="handleManualClick('wood')">
                <div class="card-header-title">
                    擷取·靈木精華
                    <small style="font-size:10px; opacity:0.6;">[點擊啟動]</small>
                </div>
                <div class="progress-container">
                    <div id="bar-wood-work" class="progress-fill exp-fill"></div>
                </div>
            </div>
            
            <div class="info-card" onclick="handleManualClick('stone')">
                <div class="card-header-title">
                    探尋·靈礦地脈
                    <small style="font-size:10px; opacity:0.6;">[點擊啟動]</small>
                </div>
                <div class="progress-container">
                    <div id="bar-stone-work" class="progress-fill exp-fill"></div>
                </div>
            </div>

            <div class="info-card">
                <div class="card-header-title">
                    外門堂口管理
                    <button class="standard-button" onclick="actionRecruit()">招募弟子 (10石)</button>
                </div>
                <div style="font-size:14px; line-height:3;">
                    🧘 待命：<b id="val-idle">0</b> 人<br>
                    🪓 伐木堂：<b id="val-wW">0</b> / 5 人 
                    <button class="standard-button" style="padding:4px 10px;" onclick="actionAssign('wW')">派駐</button><br>
                    ⛏️ 採礦堂：<b id="val-wS">0</b> / 5 人 
                    <button class="standard-button" style="padding:4px 10px;" onclick="actionAssign('wS')">派駐</button>
                </div>
            </div>
        </div>

        <div id="view-rpg" class="view-page">
            <div class="map-selector" id="ui-map-list">
                </div>
            <div class="info-card">
                <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:6px;">
                    <span>👤 宗主聖體</span>
                    <span id="ui-player-hp-text">100 / 100</span>
                </div>
                <div class="progress-container">
                    <div id="bar-player-hp" class="progress-fill player-hp-fill"></div>
                </div>
                
                <div style="display:flex; justify-content:space-between; font-size:12px; margin-bottom:6px; margin-top:15px;">
                    <span id="ui-enemy-name" style="color:var(--danger-color)">當前妖獸</span>
                    <span id="ui-enemy-hp-text">0 / 0</span>
                </div>
                <div class="progress-container">
                    <div id="bar-enemy-hp" class="progress-fill enemy-hp-fill"></div>
                </div>
                
                <button class="action-button-large" onclick="handlePlayerAttack()">
                    ⚔️ 施展·太乙劍訣
                </button>
            </div>
            <div id="battle-log-window"></div>
        </div>

        <div id="view-stat" class="view-page">
            <div class="info-card">
                <div class="card-header-title">裝備法寶顯化</div>
                <div class="equipment-grid">
                    <div class="equipment-box">
                        <b>[神兵]</b><span id="ui-eq-weapon">無</span>
                    </div>
                    <div class="equipment-box">
                        <b>[靈袍]</b><span id="ui-eq-armor">無</span>
                    </div>
                    <div class="equipment-box">
                        <b>[飾品]</b><span id="ui-eq-ring">無</span>
                    </div>
                </div>
            </div>
            
            <div class="info-card">
                <div class="card-header-title">
                    聖體潛能 (星點: <span id="val-pts">0</span>)
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:15px; font-size:14px; margin-bottom:20px;">
                    <span>神威 (攻): <b id="stat-atk">0</b></span> 
                    <span>天運 (爆): <b id="stat-crit">0</b>%</span>
                    <span>靈動 (閃): <b id="stat-dex">0</b>%</span> 
                    <span>氣血上限: <b id="stat-mhp">0</b></span>
                </div>
                <div style="display:grid; grid-template-columns:repeat(4, 1fr); gap:10px;">
                    <button class="standard-button" onclick="handleUpgrade('str')">加攻</button>
                    <button class="standard-button" onclick="handleUpgrade('crit')">加爆</button>
                    <button class="standard-button" onclick="handleUpgrade('dex')">加閃</button>
                    <button class="standard-button" onclick="handleUpgrade('vit')">加血</button>
                </div>
            </div>
        </div>

        <div id="view-eq" class="view-page">
            <div class="info-card">
                <div class="card-header-title">乾坤儲物袋</div>
                <div id="ui-inv-list" style="font-size:14px; line-height:3;">
                    儲物袋中空無一物。
                </div>
            </div>
            <div class="info-card">
                <div class="card-header-title">九天煉器爐</div>
                <p style="font-size:12px; color:#8b949e; margin-bottom:15px;">
                    消耗 5 份材料與 10 靈石，煉製隨機屬性法寶。
                </p>
                <div style="display:flex; gap:15px;">
                    <button class="action-button-large" style="font-size:15px;" onclick="handleForge('armor')">煉製·靈袍</button>
                    <button class="action-button-large" style="font-size:15px;" onclick="handleForge('ring')">煉製·飾品</button>
                </div>
            </div>
        </div>

    </div>

    <div class="bottom-navigation">
        <div class="nav-button is-active" onclick="switchMainView('sect', this)">🏠 宗門</div>
        <div class="nav-button" onclick="switchMainView('rpg', this)">⚔️ 歷練</div>
        <div class="nav-button" onclick="switchMainView('stat', this)">🧘 洞察</div>
        <div class="nav-button" onclick="switchMainView('eq', this)">🎒 儲物</div>
    </div>
</div>

<script>
    /* =========================================
       【第二章：宗門律令核心 - 邏輯經脈】
       ========================================= */

    // --- 全域數據初始化 ---
    let player = {
        wood: 0,
        stone: 0,
        idle: 1,
        lv: 1,
        exp: 0,
        pts: 0,
        wW: 0,
        wS: 0,
        baseStr: 10,
        baseCrit: 5,
        baseDex: 5,
        baseVit: 0,
        currentHp: 100,
        maxHpBase: 100,
        currentMapIdx: 0,
        inventory: {
            meat: 0,
            iron: 0,
            claw: 0,
            soul: 0
        },
        equips: {
            weapon: {
                name: "九儀天誅劍",
                atk: 30,
                crit: 10
            },
            armor: {
                name: "凡人布衣",
                hp: 0,
                dex: 0
            },
            ring: {
                name: "無",
                str: 0
            }
        }
    };

    // --- 地圖與怪物數據庫 ---
    const worldMaps = [
        {
            name: "青翠山徑",
            levelReq: 1,
            monsterName: "山間野豬",
            hp: 120,
            atk: 15,
            exp: 30,
            dropType: 'meat'
        },
        {
            name: "幽暗靈礦",
            levelReq: 3,
            monsterName: "守礦石妖",
            hp: 450,
            atk: 45,
            exp: 70,
            dropType: 'iron'
        },
        {
            name: "幽冥森林",
            levelReq: 7,
            monsterName: "暗影幻豹",
            hp: 1500,
            atk: 100,
            exp: 180,
            dropType: 'claw'
        }
    ];

    // --- 系統運行變數 ---
    let activeMob = null;
    let timeLastTick = Date.now();
    let taskManualType = null;
    let taskManualProgress = 0;

    // --- 核心遊戲循環 ---
    function runGameHeartbeat() {
        const timeNow = Date.now();
        const deltaTime = (timeNow - timeLastTick) / 1000;
        timeLastTick = timeNow;

        // 1. 處理弟子自動產出
        processAutoProduction(deltaTime);

        // 2. 處理手動任務邏輯
        processManualTask(deltaTime);

        // 3. 全局介面刷新
        refreshGameUI();

        // 持續驅動
        requestAnimationFrame(runGameHeartbeat);
    }

    // --- 資源產出子系統 ---
    function processAutoProduction(dt) {
        // 伐木堂產出
        if (player.wW > 0) {
            player.wood += player.wW * 0.4 * dt;
        }

        // 採礦堂產出
        if (player.wS > 0) {
            player.stone += player.wS * 0.25 * dt;
        }
    }

    // --- 手動任務子系統 ---
    function processManualTask(dt) {
        if (!taskManualType) {
            return;
        }

        taskManualProgress += dt * 75; // 基礎速度
        
        const progressBar = document.getElementById(`bar-${taskManualType}-work`);
        
        if (progressBar) {
            progressBar.style.width = Math.min(100, taskManualProgress) + "%";
        }

        if (taskManualProgress >= 100) {
            completeManualTask();
        }
    }

    function completeManualTask() {
        if (taskManualType === 'wood') {
            player.wood += 5;
            postBattleLog("🌲 成功採集靈木精華，資源增加。");
        } 
        else if (taskManualType === 'stone') {
            player.stone += 2;
            postBattleLog("💠 成功挖掘地脈靈石，資源增加。");
        }

        // 重置狀態
        const lastBar = document.getElementById(`bar-${taskManualType}-work`);
        if (lastBar) {
            lastBar.style.width = "0%";
        }
        
        taskManualType = null;
        taskManualProgress = 0;
    }

    // --- 戰鬥演算法子系統 ---
    function handlePlayerAttack() {
        if (!activeMob) {
            generateNewMonster();
        }

        // 計算最終戰鬥屬性
        const totalAtk = player.baseStr + player.equips.weapon.atk + (player.equips.ring.str || 0);
        const totalCrit = player.baseCrit + player.equips.weapon.crit || 0;
        const totalDex = player.baseDex + (player.equips.armor.dex || 0);

        // 玩家攻擊回合
        let damageToMob = Math.floor(totalAtk * (0.85 + Math.random() * 0.3));
        
        if (Math.random() * 100 < totalCrit) {
            damageToMob *= 2;
            postBattleLog(`<b style="color:var(--gold-color)">💥 暴擊！太乙劍訣威力倍增，造成 ${damageToMob} 點傷害！</b>`);
        } else {
            postBattleLog(`⚔️ 揮動神兵，對妖獸造成 ${damageToMob} 點傷害。`);
        }
        
        activeMob.hp -= damageToMob;

        // 怪物反擊回合
        if (activeMob.hp > 0) {
            executeMonsterCounter(totalDex);
        }

        // 結算勝負
        evaluateCombatResult();
    }

    function executeMonsterCounter(dex) {
        // 判定閃避
        if (Math.random() * 100 < dex) {
            postBattleLog(`<span style="color:#81ecec">💨 靈活閃避，敵方妖獸的攻擊撲空了！</span>`);
        } else {
            const damageToPlayer = Math.ceil(activeMob.atk * (0.8 + Math.random() * 0.4));
            player.currentHp -= damageToPlayer;
            postBattleLog(`<span style="color:var(--danger-color)">🩸 遭受反噬，氣血損耗 ${damageToPlayer} 點。</span>`);
        }
    }

    function evaluateCombatResult() {
        const totalMaxHp = player.maxHpBase + (player.equips.armor.hp || 0);

        if (player.currentHp <= 0) {
            // 戰敗重置
            player.currentHp = totalMaxHp;
            postBattleLog("😫 聖體重傷……啟動宗門接引大陣，瞬間回城重生！");
            
            // 自動切換回宗門頁面
            const firstNav = document.querySelectorAll('.nav-button')[0];
            switchMainView('sect', firstNav);
        } 
        else if (activeMob.hp <= 0) {
            // 戰勝結算
            processVictory();
        }
    }

    function processVictory() {
        const mapData = worldMaps[player.currentMapIdx];
        postBattleLog(`✅ 成功討伐 ${activeMob.name}！`);
        
        // 掉落與經驗
        player.inventory[mapData.dropType]++;
        if (Math.random() < 0.25) {
            player.inventory.soul++;
            postBattleLog("✨ 額外獲得一份 [妖獸精魂]！");
        }
        
        player.exp += mapData.exp;

        // 檢查升級
        if (player.exp >= 100) {
            player.exp = 0;
            player.lv++;
            player.pts += 3;
            postBattleLog("🌟 境界突破！獲取了更多潛能星點！");
        }

        generateNewMonster();
    }

    // --- UI 渲染與刷新子系統 ---
    function refreshGameUI() {
        // 頂部資源
        document.getElementById('val-wood').innerText = Math.floor(player.wood);
        document.getElementById('val-stone').innerText = Math.floor(player.stone);
        document.getElementById('val-lv').innerText = player.lv;

        // 宗門弟子
        document.getElementById('val-idle').innerText = player.idle;
        document.getElementById('val-wW').innerText = player.wW;
        document.getElementById('val-wS').innerText = player.wS;

        // 屬性計算
        const finalAtk = player.baseStr + player.equips.weapon.atk + (player.equips.ring.str || 0);
        const finalMhp = player.maxHpBase + (player.equips.armor.hp || 0);
        const finalDex = player.baseDex + (player.equips.armor.dex || 0);
        const finalCrit = player.baseCrit + (player.equips.weapon.crit || 0);

        document.getElementById('stat-atk').innerText = finalAtk;
        document.getElementById('stat-mhp').innerText = finalMhp;
        document.getElementById('stat-dex').innerText = finalDex;
        document.getElementById('stat-crit').innerText = finalCrit;
        document.getElementById('val-pts').innerText = player.pts;

        // 玩家血條與文字
        const hpPercent = (player.currentHp / finalMhp) * 100;
        document.getElementById('bar-player-hp').style.width = Math.max(0, hpPercent) + "%";
        document.getElementById('ui-player-hp-text').innerText = `${Math.ceil(player.currentHp)} / ${finalMhp}`;

        // 怪物資訊
        if (activeMob) {
            const mobHpPercent = (activeMob.hp / activeMob.max) * 100;
            document.getElementById('bar-enemy-hp').style.width = Math.max(0, mobHpPercent) + "%";
            document.getElementById('ui-enemy-hp-text').innerText = `${Math.ceil(activeMob.hp)} / ${activeMob.max}`;
            document.getElementById('ui-enemy-name').innerText = activeMob.name;
        }

        // 裝備文字
        document.getElementById('ui-eq-weapon').innerText = player.equips.weapon.name;
        document.getElementById('ui-eq-armor').innerText = player.equips.armor.name;
        document.getElementById('ui-eq-ring').innerText = player.equips.ring.name;

        // 渲染地圖與背包
        renderWorldMapSelection();
        renderStorageInventory();
    }

    // --- 輔助與互動函數 ---
    function handleManualClick(type) {
        if (!taskManualType) {
            taskManualType = type;
            taskManualProgress = 0;
        }
    }

    function actionRecruit() {
        if (player.stone >= 10) {
            player.stone -= 10;
            player.idle++;
            postBattleLog("🤝 誠心招攬，一名外門弟子前來歸附。");
        } else {
            postBattleLog("❌ 靈石儲備不足，無法吸引弟子。");
        }
    }

    function actionAssign(type) {
        if (player.idle > 0 && player[type] < 5) {
            player[type]++;
            player.idle--;
            postBattleLog("👷 已派遣弟子前往堂口上工。");
        }
    }

    function handleUpgrade(key) {
        if (player.pts > 0) {
            if (key === 'str') player.baseStr += 2;
            else if (key === 'crit') player.baseCrit += 1;
            else if (key === 'dex') player.baseDex += 1;
            else if (key === 'vit') {
                player.baseVit += 1;
                player.maxHpBase += 40;
                // 升級補滿血
                const newTotalMhp = player.maxHpBase + (player.equips.armor.hp || 0);
                player.currentHp = newTotalMhp;
            }
            player.pts--;
            postBattleLog("🧘 運轉周天，聖體潛能成功激發。");
        }
    }

    function handleForge(type) {
        // 計算材料總量
        let totalMaterials = 0;
        for (let k in player.inventory) {
            if (k !== 'soul') totalMaterials += player.inventory[k];
        }

        if (totalMaterials >= 5 && player.stone >= 10) {
            player.stone -= 10;
            
            // 扣除材料
            let toRemove = 5;
            for (let k in player.inventory) {
                if (k !== 'soul' && toRemove > 0) {
                    let amount = Math.min(player.inventory[k], toRemove);
                    player.inventory[k] -= amount;
                    toRemove -= amount;
                }
            }

            // 煉製邏輯
            if (type === 'armor') {
                player.equips.armor = {
                    name: "琉璃玄黃袍",
                    hp: 300 + player.lv * 50,
                    dex: 15 + Math.floor(Math.random() * 10)
                };
            } else {
                player.equips.ring = {
                    name: "須彌納戒",
                    str: 30 + player.lv * 15
                };
            }
            postBattleLog("🔮 爐火沖天！一件法寶隨機煉製完成！");
        } else {
            postBattleLog("❌ 煉器材料或靈石不足。");
        }
    }

    function renderStorageInventory() {
        let htmlContent = "";
        const itemNames = {
            meat: '妖豬玄肉',
            iron: '精煉玄鐵',
            claw: '影豹利爪',
            soul: '萬年獸魂'
        };

        let hasItem = false;
        for (let key in itemNames) {
            if (player.inventory[key] > 0) {
                htmlContent += `<span>📦 ${itemNames[key]}: ${player.inventory[key]}</span><br>`;
                hasItem = true;
            }
        }

        const invDiv = document.getElementById('ui-inv-list');
        if (hasItem) {
            invDiv.innerHTML = htmlContent;
        } else {
            invDiv.innerHTML = "乾坤袋中空無一物。";
        }
    }

    function renderWorldMapSelection() {
        let htmlContent = "";
        worldMaps.forEach((map, index) => {
            const isLocked = player.lv < map.levelReq;
            const isActive = player.currentMapIdx === index;
            
            htmlContent += `
                <div class="map-card ${isActive ? 'is-active' : ''} ${isLocked ? 'is-locked' : ''}" 
                     onclick="handleMapSelect(${index})">
                    <b>${map.name}</b><br>
                    <small>${isLocked ? '練氣 ' + map.levelReq + ' 層' : '探索中'}</small>
                </div>
            `;
        });
        document.getElementById('ui-map-list').innerHTML = htmlContent;
    }

    function handleMapSelect(idx) {
        if (player.lv >= worldMaps[idx].levelReq) {
            player.currentMapIdx = idx;
            generateNewMonster();
            postBattleLog("🚩 切換歷練區域：" + worldMaps[idx].name);
        }
    }

    function generateNewMonster() {
        const data = worldMaps[player.currentMapIdx];
        activeMob = {
            name: data.monsterName,
            hp: data.hp,
            max: data.hp,
            atk: data.atk
        };
    }

    function switchMainView(pageId, element) {
        // 切換頁面顯示
        document.querySelectorAll('.view-page').forEach(pg => {
            pg.classList.remove('active-view');
        });
        document.getElementById('view-' + pageId).classList.add('active-view');

        // 切換導航狀態
        document.querySelectorAll('.nav-button').forEach(nb => {
            nb.classList.remove('is-active');
        });
        element.classList.add('is-active');
    }

    function postBattleLog(msg) {
        const logWindow = document.getElementById('battle-log-window');
        logWindow.innerHTML = `<div>> ${msg}</div>` + logWindow.innerHTML;
        
        // 限制日誌數量防止卡頓
        if (logWindow.children.length > 50) {
            logWindow.lastChild.remove();
        }
    }

    // --- 啟動初始化 ---
    generateNewMonster();
    runGameHeartbeat();

    /* =========================================
       【最終章：基石穩固，法陣顯化完成】
       ========================================= */
</script>
</body>
</html>
