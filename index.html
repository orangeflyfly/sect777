<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仙俠宗門 V1.6.4 - 真·靈魂回歸</title>
    <style>
        :root {
            --color-primary: #a29bfe; --color-primary-dark: #6c5ce7;
            --color-bg-deep: #0b0e14; --color-card-bg: rgba(28, 33, 40, 0.95);
            --color-text-main: #adbac7; --color-gold: #ffcf40;
            --color-danger: #f85149; --color-success: #3fb950;
            --color-border: #444c56;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "PingFang TC", sans-serif; }
        body { background: #000; color: var(--color-text-main); height: 100vh; display: flex; justify-content: center; overflow: hidden; }
        #app { width: 100%; max-width: 500px; height: 100%; background: radial-gradient(circle at top, #1a1c2c 0%, #0b0e14 100%); display: flex; flex-direction: column; position: relative; border: 1px solid var(--color-border); }
        header { padding: 20px; background: rgba(28, 33, 40, 0.9); border-bottom: 2px solid var(--color-primary); z-index: 100; }
        .res-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .res-item { background: rgba(0,0,0,0.6); padding: 5px 12px; border-radius: 15px; font-size: 13px; border: 1px solid var(--color-border); color: #fff; }
        .realm-tag { color: var(--color-gold); font-size: 22px; font-weight: 900; }
        .exp-bar { height: 6px; background: #222; border-radius: 3px; margin-top: 10px; overflow: hidden; border: 1px solid #333; }
        .exp-fill { height: 100%; width: 0%; background: var(--color-primary); transition: width 0.5s; }
        .stage { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 120px; z-index: 10; }
        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        .card { background: var(--color-card-bg); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--color-border); position: relative; }
        .card-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; color: #fff; display: flex; align-items: center; gap: 8px; }
        .card-title::before { content: ''; width: 4px; height: 16px; background: var(--color-primary); }
        .dispatch-row { display: flex; justify-content: space-between; align-items: center; background: rgba(0,0,0,0.3); padding: 10px; border-radius: 10px; margin-bottom: 5px; }
        .ctrl-btn { width: 30px; height: 30px; border-radius: 50%; border: 1px solid var(--color-primary); background: none; color: #fff; cursor: pointer; }
        .btn-main { width: 100%; padding: 12px; border-radius: 12px; border: none; background: var(--color-primary); color: #fff; font-weight: bold; cursor: pointer; }
        .map-tabs { display: flex; gap: 10px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .map-btn { padding: 8px 15px; border-radius: 10px; border: 1px solid var(--color-border); background: #1c2128; color: #888; white-space: nowrap; cursor: pointer; }
        .map-btn.active { border-color: var(--color-primary); color: var(--color-primary); }
        .hp-wrap { height: 12px; background: rgba(0,0,0,0.6); border-radius: 6px; overflow: hidden; margin: 8px 0; border: 1px solid #333; }
        .hp-fill { height: 100%; width: 100%; transition: width 0.3s; }
        #log-box { height: 180px; overflow-y: auto; background: rgba(0,0,0,0.5); border-radius: 15px; padding: 15px; font-size: 13px; border: 1px solid #333; line-height: 1.8; }
        nav { position: absolute; bottom: 20px; left: 15px; right: 15px; height: 70px; background: rgba(28, 33, 40, 0.95); border-radius: 35px; display: flex; justify-content: space-around; align-items: center; border: 1px solid var(--color-border); z-index: 200; }
        .nav-btn { color: #666; cursor: pointer; text-align: center; flex: 1; }
        .nav-btn.active { color: var(--color-primary); }
        .fly-text { position: fixed; pointer-events: none; animation: flyUp 1s forwards; font-weight: 900; z-index: 1000; }
        @keyframes flyUp { from { transform: translateY(0); opacity: 1; } to { transform: translateY(-70px); opacity: 0; } }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .shake { animation: shake 0.2s; }
        @keyframes shake { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-5px);} 75%{transform:translateX(5px);} }
    </style>
</head>
<body>

<div id="app">
    <header>
        <div class="res-row">
            <div class="res-item">🪵 <span id="val-wood">0</span></div>
            <div class="res-item">💠 <span id="val-stone">0</span></div>
            <div class="res-item" style="border-color:var(--color-gold)">👥 <span id="val-d-idle">0</span>/<span id="val-d-total">0</span></div>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:flex-end;">
            <div><span class="realm-tag" id="val-realm">練氣期</span> <small id="val-lv">1</small></div>
            <div style="text-align:right"><small>戰力</small> <b id="val-power" style="color:var(--color-primary)">0</b></div>
        </div>
        <div class="exp-bar"><div id="val-exp-fill" class="exp-fill"></div></div>
    </header>

    <main class="stage">
        <div id="p1" class="page active">
            <div class="card">
                <div class="card-title">👥 弟子調度</div>
                <div class="dispatch-row"><span>🪵 採伐: <span id="d-wood">0</span>人</span><div><button class="ctrl-btn" onclick="assign('wood',-1)">-</button><button class="ctrl-btn" onclick="assign('wood',1)">+</button></div></div>
                <div class="dispatch-row"><span>💠 採礦: <span id="d-stone">0</span>人</span><div><button class="ctrl-btn" onclick="assign('stone',-1)">-</button><button class="ctrl-btn" onclick="assign('stone',1)">+</button></div></div>
                <button class="btn-main" onclick="recruit()" style="margin-top:10px;">招募弟子 (<span id="d-cost">10</span> 靈石)</button>
            </div>
            <div class="card" onclick="manualWork('wood', event)">
                <div class="card-title">🌲 手工伐木</div>
                <div class="hp-wrap"><div id="bar-wood" class="hp-fill" style="width:0%; background:var(--color-success)"></div></div>
            </div>
            <div class="card" onclick="manualWork('stone', event)">
                <div class="card-title">⛏️ 手工採礦</div>
                <div class="hp-wrap"><div id="bar-stone" class="hp-fill" style="width:0%; background:var(--color-primary)"></div></div>
            </div>
            <div id="ui-break" class="card" style="display:none; border:1px solid var(--color-gold); text-align:center;">
                <button class="btn-main" style="background:var(--color-gold); color:#000;" onclick="breakthrough()">衝擊境界</button>
            </div>
        </div>

        <div id="p2" class="page">
            <div class="map-tabs" id="map-tabs"></div>
            <div class="card" id="mob-card">
                <div class="card-title">⚔️ <span id="m-name">載入中...</span> <small id="m-lv-tag" style="margin-left:auto"></small></div>
                <div class="hp-wrap"><div id="m-hp-bar" class="hp-fill" style="background:var(--color-danger)"></div></div>
                <div style="display:flex; justify-content:space-between; font-size:12px;"><span>敵方血量</span> <span id="m-hp-txt">0/0</span></div>
                <div class="hp-wrap" style="margin-top:15px;"><div id="p-hp-bar" class="hp-fill" style="background:var(--color-success)"></div></div>
                <div style="display:flex; justify-content:space-between; font-size:12px;"><span>掌門血量</span> <span id="p-hp-txt">0/0</span></div>
                <button class="btn-main" style="margin-top:15px; height:50px;" onclick="attack(event)">發動攻擊</button>
            </div>
            <div id="log-box"></div>
        </div>

        <div id="p3" class="page">
            <div class="card">
                <div class="card-title">🧘 修為星盤 <small style="margin-left:auto">點數: <span id="val-pts">0</span></small></div>
                <div style="margin-bottom:15px;">
                    <div style="display:flex; justify-content:space-between;"><b>⚔️ 總攻擊力</b> <b id="st-atk-total" style="color:var(--color-primary)">0</b></div>
                    <div style="font-size:11px; color:#888;">基礎: <span id="st-atk-base">0</span> | 裝備: +<span id="st-atk-eq">0</span> <span id="st-atk-buff"></span></div>
                    <button class="map-btn" style="width:100%; margin-top:5px;" onclick="upgrade('atk')">修煉攻擊</button>
                </div>
                <div>
                    <div style="display:flex; justify-content:space-between;"><b>❤️ 總生命值</b> <b id="st-hp-total" style="color:var(--color-success)">0</b></div>
                    <div style="font-size:11px; color:#888;">基礎: <span id="st-hp-base">0</span> | 裝備: +<span id="st-hp-eq">0</span> <span id="st-hp-buff"></span></div>
                    <button class="map-btn" style="width:100%; margin-top:5px;" onclick="upgrade('hp')">修煉生命</button>
                </div>
            </div>
            <div class="card"><div class="card-title">🛡️ 配備</div><div style="font-size:13px;">武器: <span id="eq-w">無</span><br>防具: <span id="eq-a">無</span><br><br><span id="val-talent" style="color:var(--color-gold)"></span></div></div>
        </div>

        <div id="p4" class="page">
            <div class="card">
                <div class="card-title">🎒 儲物袋</div>
                <div id="bag-grid" style="display:grid; grid-template-columns:repeat(3,1fr); gap:10px;"></div>
            </div>
            <div class="card">
                <div class="card-title">🔥 煉器爐</div>
                <button class="btn-main" onclick="craft()">煉製裝備 (15靈石+5素材)</button>
            </div>
        </div>
    </main>

    <nav>
        <div class="nav-btn active" onclick="tab(1,this)"><span>⛩️</span><br><small>宗門</small></div>
        <div class="nav-btn" onclick="tab(2,this)"><span>⚔️</span><br><small>歷練</small></div>
        <div class="nav-btn" onclick="tab(3,this)"><span>🧘</span><br><small>星盤</small></div>
        <div class="nav-btn" onclick="tab(4,this)"><span>🎒</span><br><small>儲物</small></div>
    </nav>
</div>

<script>
// --- [修正後的核心邏輯] ---
let wood = 0, stone = 0, totalD = 0, dWood = 0, dStone = 0;
let realm = "練氣期", lv = 1, exp = 0, pts = 0;
let bAtk = 10, bHp = 100, curHp = 100, talent = null;
let inv = {}, eqW = {n:"鏽鐵劍", v:5}, eqA = {n:"粗布衣", v:0};

const MAPS = [
    {n:"🌿 青翠山腳", req:1, mob:"野犬", hp:60, atk:8, exp:40, d:"犬牙"},
    {n:"🐍 幽暗密林", req:5, mob:"幻影蟒", hp:400, atk:45, exp:180, d:"蟒皮"},
    {n:"🔥 熔岩地獄", req:10, mob:"地獄火鬼", hp:1800, atk:190, exp:550, d:"火晶"}
];
let curMap = 0, activeMob = null, workP = {wood:0, stone:0}, curW = null;

function init() {
    load();
    if(!bAtk) bAtk = 10; if(!bHp) bHp = 100; // 保底機制
    spawn();
    setInterval(save, 5000);
    log("🌌 V1.6.4 正式版啟動。地圖與血量系統已緊急校準！", "gold");
    tick();
}

function tick() {
    const now = Date.now();
    if(!window.lT) window.lT = now;
    if(now - window.lT >= 5000) {
        if(dWood > 0) { wood += dWood * 2; fly(80, 100, `+${dWood*2}`, "#55efc4"); }
        if(dStone > 0) { stone += dStone * 1; fly(160, 100, `+${dStone}`, "#00cec9"); }
        window.lT = now;
    }
    if(curW) {
        workP[curW] += 10;
        document.getElementById('bar-'+curW).style.width = workP[curW]+"%";
        if(workP[curW]>=100) {
            if(curW=='wood') wood+=5; else stone+=2;
            fly(250, 450, curW=='wood'?'+5':'+2', "#fff");
            workP[curW]=0; curW=null;
        }
    }
    updateUI();
    requestAnimationFrame(tick);
}

function updateUI() {
    document.getElementById('val-wood').innerText = Math.floor(wood);
    document.getElementById('val-stone').innerText = Math.floor(stone);
    document.getElementById('val-d-idle').innerText = totalD - dWood - dStone;
    document.getElementById('val-d-total').innerText = totalD;
    document.getElementById('d-wood').innerText = dWood;
    document.getElementById('d-stone').innerText = dStone;
    document.getElementById('val-realm').innerText = realm;
    document.getElementById('val-lv').innerText = `第 ${lv} 層`;
    document.getElementById('d-cost').innerText = 10 + totalD*5;

    let tAtk = bAtk + (eqW.v || 0); if(talent=="劍尊") tAtk = Math.floor(tAtk*1.3);
    let tHp = bHp + (eqA.v || 0); if(talent=="金身") tHp = Math.floor(tHp*1.4);
    document.getElementById('val-power').innerText = tAtk*2 + tHp;

    document.getElementById('st-atk-total').innerText = tAtk;
    document.getElementById('st-atk-base').innerText = bAtk;
    document.getElementById('st-atk-eq').innerText = eqW.v || 0;
    document.getElementById('st-hp-total').innerText = tHp;
    document.getElementById('st-hp-base').innerText = bHp;
    document.getElementById('st-hp-eq').innerText = eqA.v || 0;
    document.getElementById('val-pts').innerText = pts;
    document.getElementById('eq-w').innerText = eqW.n;
    document.getElementById('eq-a').innerText = eqA.n;

    if(curHp > tHp) curHp = tHp;
    document.getElementById('p-hp-txt').innerText = `${Math.ceil(curHp)}/${tHp}`;
    document.getElementById('p-hp-bar').style.width = (curHp/tHp*100)+"%";

    if(activeMob) {
        document.getElementById('m-name').innerText = activeMob.n;
        document.getElementById('m-lv-tag').innerText = `LV.${activeMob.req}`;
        document.getElementById('m-hp-txt').innerText = `${activeMob.hp}/${activeMob.mH}`;
        document.getElementById('m-hp-bar').style.width = (activeMob.hp/activeMob.mH*100)+"%";
    }

    let req = lv*200;
    document.getElementById('val-exp-fill').style.width = (exp/req*100)+"%";
    document.getElementById('ui-break').style.display = (realm=="練氣期" && lv==10 && exp>=req)?"block":"none";

    renderMapList();
    renderInventory();
}

function assign(t, v) {
    let idle = totalD - dWood - dStone;
    if(v > 0 && idle <= 0) return;
    if(t=='wood') { if(v<0 && dWood<=0) return; dWood += v; }
    else { if(v<0 && dStone<=0) return; dStone += v; }
}

function attack(e) {
    let tAtk = bAtk + (eqW.v||0); if(talent=="劍尊") tAtk = Math.floor(tAtk*1.3);
    let dmg = Math.floor(tAtk * (0.9 + Math.random()*0.2));
    activeMob.hp -= dmg; fly(e.clientX, e.clientY, `-${dmg}`, "#fff");
    log(`你對 ${activeMob.n} 造成 ${dmg} 傷害`);

    setTimeout(() => {
        if(activeMob.hp > 0) {
            let mDmg = Math.max(1, activeMob.atk - lv*2);
            curHp -= mDmg;
            document.getElementById('mob-card').classList.add('shake');
            setTimeout(() => document.getElementById('mob-card').classList.remove('shake'), 200);
            log(`${activeMob.n} 反擊，你受到 ${mDmg} 傷害`, "dmg");
            if(curHp <= 0) die();
        } else {
            log(`✨ 斬殺 ${activeMob.n}！獲得 ${activeMob.exp} 經驗`, "gold");
            exp += activeMob.exp; inv[activeMob.d] = (inv[activeMob.d]||0)+1;
            checkLv(); spawn();
        }
    }, 300);
}

function die() {
    log("💀 戰敗逃回宗門！", "dmg");
    let tHp = bHp + (eqA.v||0); if(talent=="金身") tHp = Math.floor(tHp*1.4);
    curHp = tHp; // 重生滿血
    log("⛲ 宗門大陣運轉，傷勢痊癒。");
    spawn(); tab(1, document.querySelectorAll('.nav-btn')[0]);
}

function renderMapList() {
    let h = "";
    MAPS.forEach((m, i) => {
        let locked = (m.req > lv && realm=="練氣期");
        h += `<button class="map-btn ${curMap==i?'active':''} ${locked?'locked':''}" onclick="goMap(${i})">${locked?'🔒':m.n}</button>`;
    });
    document.getElementById('map-tabs').innerHTML = h;
}

function goMap(i) {
    if(MAPS[i].req > lv && realm=="練氣期") return;
    curMap = i; spawn();
}

function craft() {
    if(stone < 15) return;
    let keys = Object.keys(inv).filter(k => (k=="犬牙"||k=="蟒皮"||k=="火晶") && inv[k]>0);
    if(!keys.length) return;
    stone -= 15; inv[keys[0]]--;
    let isW = Math.random() > 0.5;
    let item = isW ? {type:'weapon', n:"靈劍", v:30+lv*10} : {type:'armor', n:"法袍", v:200+lv*50};
    let id = item.n + Date.now();
    inv[id] = { ...item, equipable: true };
    log(`🔥 煉成 [${item.n}]！`, "gold");
}

function equip(id) {
    let item = inv[id];
    if(!item || !item.equipable) return;
    if(item.type == 'weapon') eqW = { n: item.n, v: item.v };
    else eqA = { n: item.n, v: item.v };
    delete inv[id];
    log(`🛡️ 裝備了 [${item.n}]`);
}

function recruit() {
    let cost = 10 + totalD*5;
    if(stone < cost) return;
    stone -= cost; totalD++;
}

function breakthrough() {
    if(stone < 50) return;
    stone -= 50;
    if(Math.random() < 0.4) {
        realm = "築基期"; lv = 1; exp = 0; pts += 30;
        talent = Math.random() > 0.5 ? "劍尊" : "金身";
        log(`🎊 晉升築基！天賦：${talent}`, "gold");
    } else { exp = 0; log("💀 突破失敗！", "dmg"); }
}

function upgrade(t) {
    if(pts <= 0) return;
    if(t=='atk') bAtk += 5; else bHp += 50;
    pts--;
}

function spawn() {
    let m = MAPS[curMap];
    activeMob = { n:m.mob, mH:m.hp+lv*40, hp:m.hp+lv*40, atk:m.atk+lv*8, exp:m.exp, d:m.d, req:m.req };
}

function renderInventory() {
    let h = "";
    for(let k in inv) {
        if(typeof inv[k] === 'object') h += `<div class="res-item" onclick="equip('${k}')">${inv[k].n}<br><small>裝備</small></div>`;
        else if(inv[k]>0) h += `<div class="res-item">${k} x${inv[k]}</div>`;
    }
    document.getElementById('bag-grid').innerHTML = h || "<small>空</small>";
}

function log(m, t) {
    let b = document.getElementById('log-box');
    let d = document.createElement('div');
    d.innerHTML = "◈ " + m;
    if(t=="gold") d.style.color="var(--color-gold)";
    if(t=="dmg") d.style.color="var(--color-danger)";
    b.prepend(d);
}

function tab(p, el) {
    document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active'));
    document.getElementById('p'+p).classList.add('active'); el.classList.add('active');
}

function manualWork(t, e) { if(curW) return; curW=t; workP[t]=0; }
function fly(x, y, t, c) {
    let e = document.createElement('div'); e.className='fly-text';
    e.innerText=t; e.style.left=x+'px'; e.style.top=y+'px'; e.style.color=c;
    document.body.appendChild(e); setTimeout(()=>e.remove(), 1000);
}

function checkLv() {
    let req = lv*200;
    if(exp >= req && (lv < 10 || realm == "築基期")) { exp -= req; lv++; pts += 5; log(`🌟 提升至第 ${lv} 層！`, "gold"); }
}

function save() {
    let d = { wood, stone, totalD, dWood, dStone, realm, lv, exp, pts, bAtk, bHp, talent, inv, eqW, eqA };
    localStorage.setItem('xian_save_v164', JSON.stringify(d));
}
function load() {
    let s = localStorage.getItem('xian_save_v164');
    if(s) {
        let p = JSON.parse(s);
        wood=p.wood; stone=p.stone; totalD=p.totalD; dWood=p.dWood; dStone=p.dStone;
        realm=p.realm; lv=p.lv; exp=p.exp; pts=p.pts; bAtk=p.bAtk; bHp=p.bHp;
        talent=p.talent; inv=p.inv; eqW=p.eqW; eqA=p.eqA; curHp = bHp + (eqA.v||0);
    }
}
window.onload = init;
</script>
</body>
</html>
