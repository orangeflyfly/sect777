<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-select=none">
    <title>宗門修仙錄 V1.5.15 - 大乘圓滿版</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="toast-container"></div>

    <div id="game-container">
        <header class="header-info">
            <div class="header-line">
                <span id="val-level" class="realm-text">感應中...</span>
                <span id="val-money" class="coin-text">🪙 0</span>
            </div>
            <div class="bar-container exp">
                <div id="val-exp-bar" class="bar-fill exp"></div>
                <div id="val-exp-txt" class="bar-text">0%</div>
            </div>
            <div class="bar-container hp">
                <div id="val-hp-bar" class="bar-fill hp"></div>
                <div id="val-hp-txt" class="bar-text">100 / 100</div>
            </div>
        </header>

        <section id="battle-screen" class="stage active">
            <div class="stage-header">
                <button class="map-btn" onclick="UI_Battle.showMapSelector()">🗺️ 選擇區域</button>
                <button id="btn-auto-combat" class="auto-btn" onclick="GameCore.toggleAuto()">自動練功：關</button>
            </div>
            
            <div id="monster-display" class="battle-main">
                </div>

            <button id="boss-btn" class="boss-btn" onclick="Combat.initBattle(true)" style="display:none;">挑戰區域領主</button>

            <div class="log-system">
                <div class="log-tabs">
                    <button class="log-tab active" onclick="UI_Battle.switchLog('all')">全部</button>
                    <button class="log-tab" onclick="UI_Battle.switchLog('combat')">鬥法</button>
                    <button class="log-tab" onclick="UI_Battle.switchLog('loot')">獲取</button>
                </div>
                <div id="battle-logs" class="log-list"></div>
            </div>
        </section>

        <section id="bag-screen" class="stage" style="display:none;"></section>

        <section id="stats-screen" class="stage" style="display:none;"></section>

        <section id="shop-screen" class="stage" style="display:none;"></section>

        <nav class="nav-bar">
            <button class="nav-btn active" onclick="GameCore.switchTab('battle')"><span>⚔️</span>歷練</button>
            <button class="nav-btn" onclick="GameCore.switchTab('bag')"><span>🎒</span>儲物</button>
            <button class="nav-btn" onclick="GameCore.switchTab('stats')"><span>🧘</span>修為</button>
            <button class="nav-btn" onclick="GameCore.switchTab('shop')"><span>🏪</span>坊市</button>
        </nav>
    </div>

    <script src="data.js"></script>
    <script src="player.js"></script>
    <script src="ui_battle.js"></script>
    <script src="ui_stats.js"></script>
    <script src="ui_bag.js"></script>
    <script src="ui_shop.js"></script>
    <script src="combat.js"></script>
    <script src="core.js"></script>
</body>
</html>
