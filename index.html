<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>仙俠宗門 - 姊姊不反悔 V1.1</title>
    <style>
        :root { 
            --p: #a29bfe; --bg: #0b0e14; --card: #161b22; --text: #c9d1d9; 
            --gold: #ffcf40; --danger: #ff4d4d; --border: #30363d; --hp-p: #23d160;
            --exp-c: #7d5fff;
        }
        * { box-sizing: border-box; touch-action: manipulation; }
        body { background: var(--bg); color: var(--text); margin: 0; font-family: "Segoe UI", "PingFang TC", sans-serif; display: flex; justify-content: center; height: 100vh; overflow: hidden; }
        #game { width: 100%; max-width: 480px; display: flex; flex-direction: column; border: 1px solid var(--border); position: relative; box-shadow: 0 0 30px rgba(0,0,0,0.5); }
        
        /* 頂部資源：雅致化 */
        .header { padding: 15px; background: rgba(22,27,34,0.9); border-bottom: 2px solid var(--p); display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(5px); }
        .res-item { font-size: 14px; font-weight: bold; text-shadow: 0 0 5px rgba(162,155,254,0.3); }

        .main { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 120px; scroll-behavior: smooth; }
        .page { display: none; } .page.active { display: block; animation: slideUp 0.3s ease-out; }
        @keyframes slideUp { from { transform: translateY(10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

        .card { background: var(--card); padding: 18px; border-radius: 15px; margin-bottom: 15px; border: 1px solid var(--border); position: relative; transition: 0.3s; }
        .card:hover { border-color: var(--p); }
        .card-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; color: var(--p); display: flex; align-items: center; }
        .card-title::before { content: "◈"; margin-right: 8px; font-size: 12px; }

        .btn { background: #21262d; color: #f0f6fc; border: 1px solid var(--border); padding: 8px 14px; border-radius: 8px; cursor: pointer; font-size: 12px; transition: 0.2s; }
        .btn:hover { background: #30363d; border-color: #8b949e; }
        .btn-p { background: linear-gradient(135deg, #a29bfe, #6c5ce7); border: none; font-weight: bold; width: 100%; padding: 16px; color: white; border-radius: 12px; cursor: pointer; font-size: 19px; box-shadow: 0 6px 15px rgba(108,92,231,0.3); margin-top: 10px; }
        
        /* 進度條特效：增加流光 */
        .bar-container { margin: 12px 0; }
        .bar-label { font-size: 12px; display: flex; justify-content: space-between; margin-bottom: 6px; letter-spacing: 1px; }
        .bar-outer { height: 14px; background: #000; border-radius: 10px; overflow: hidden; border: 1px solid #444; position: relative; }
        .bar-inner { height: 100%; width: 0%; transition: width 0.4s ease; position: relative; }
        .bar-inner::after { content: ""; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent); animation: shine 2s infinite; }
        @keyframes shine { from { transform: translateX(-100%); } to { transform: translateX(100%); } }

        .hp-player-bg { background: linear-gradient(90deg, #2ea043, #55efc4); }
        .hp-mob-bg { background: linear-gradient(90deg, #f85149, #ff7675); }
        .exp-bg { background: linear-gradient(90deg, #a29bfe, #6c5ce7); }

        .nav { position: absolute; bottom: 15px; left: 10px; right: 10px; display: grid; grid-template-columns: repeat(4, 1fr); background: rgba(22,27,34,0.95); padding: 12px; border-radius: 20px; border: 1px solid var(--border); backdrop-filter: blur(10px); }
        .nav-item { text-align: center; font-size: 12px; cursor: pointer; color: #8b949e; opacity: 0.8; }
        .nav-item.active { color: var(--p); font-weight: bold; opacity: 1; transform: scale(1.1); }
        
        #log { height: 130px; overflow-y: auto; background: rgba(0,0,0,0.4); padding: 12px; font-size: 12px; border-radius: 10px; border: 1px solid var(--border); margin-top: 15px; color: #8b949e; }
        .log-crit { color: var(--gold); font-weight: bold; }
        .log-dodge { color: #81ecec; }
        .log-dmg { color: var(--danger); }

        .map-scroll { display: flex; gap: 12px; overflow-x: auto; padding-bottom: 10px; }
        .map-item { min-width: 110px; padding: 12px; background: #161b22; border: 1px solid var(--border); border-radius: 12px; font-size: 12px; text-align: center; }
        .map-item.active { border-color: var(--p); background: rgba(162,155,254,0.1); color: var(--p); box-shadow: 0 0 10px rgba(162,155,254,0.2); }
        .prog-work { position: absolute; bottom: 0; left: 0; height: 4px; background: var(--p); width: 0%; border-radius: 0 0 15px 15px; transition: width 0.1s linear; }
    </style>
</head>
<body>

<div id="game">
    <div class="header">
        <div class="res-item">📜 靈木: <span id="u-wood">0</span> | 💠 靈石: <span id="u-stone">0</span></div>
        <div style="color:var(--gold); font-weight:bold; letter-spacing:1px;">練氣 <span id="u-lv">1</span> 層</div>
    </div>

    <div class="main">
        <div id="p-sect" class="page active">
            <div class="card" onclick="startManualWork('wood')">
                <div class="card-title">擷取·靈木精華</div>
                <div style="font-size:12px; color:#8b949e;">親自運功伐木，累積宗門基石。</div>
                <div id="w-wood-bar" class="prog-work"></div>
            </div>
            <div class="card" onclick="startManualWork('stone')">
                <div class="card-title">探尋·靈礦地脈</div>
                <div style="font-size:12px; color:#8b949e;">深入地底，挖掘蘊含靈力的礦石。</div>
                <div id="w-stone-bar" class="prog-work"></div>
            </div>
            <div class="card">
                <div class="card-title">外門堂口 <button class="btn" style="float:right" onclick="recruitDisciple()">招募弟子</button></div>
                <div style="font-size:13px; line-height:2.4;">
                    待命弟子：<b id="u-idle">0</b> 人<br>
                    伐木堂 (Lv.<span id="l-wood">1</span>)：<b id="u-wW">0</b>/<span id="m-wood">5</span>人 
                    <button class="btn" onclick="assignJob('wW')">調派</button> 
                    <button class="btn" onclick="upgradeBuilding('wood')">擴建</button><br>
                    採礦堂 (Lv.<span id="l-stone">1</span>)：<b id="u-wS">0</b>/<span id="m-stone">5</span>人 
                    <button class="btn" onclick="assignJob('wS')">調派</button> 
                    <button class="btn" onclick="upgradeBuilding('stone')">擴建</button>
                </div>
            </div>
        </div>

        <div id="p-rpg" class="page">
            <div class="map-scroll" id="map-list"></div>
            <div class="card">
                <div class="bar-container">
                    <div class="bar-label"><span>👤 宗主聖體</span><span id="p-hp-txt">100 / 100</span></div>
                    <div class="bar-outer"><div id="p-hp-bar" class="bar-inner hp-player-bg"></div></div>
                </div>
                <div class="bar-container">
                    <div class="bar-label"><span id="m-name" style="color:var(--danger)">當前妖獸</span><span id="m-hp-txt">0 / 0</span></div>
                    <div class="bar-outer"><div id="m-hp-bar" class="bar-inner hp-mob-bg"></div></div>
                </div>
                <button class="btn-p" onclick="playerAttack()">⚔️ 施展·太乙劍訣</button>
            </div>
            <div class="card" style="padding:15px; border-bottom: 2px solid var(--exp-c);">
                <div class="bar-label"><span>✨ 突破契機 (修為感應)</span><span id="u-exp-txt">0 / 50</span></div>
                <div class="bar-outer"><div id="u-exp-bar" class="bar-inner exp-bg"></div></div>
            </div>
            <div id="log"></div>
        </div>

        <div id="p-stat" class="page">
            <div class="card">
                <div class="card-title">本命法寶：九儀天誅劍</div>
                <div id="relic-info" style="font-size:12px; margin:10px 0; line-height:1.8; color:var(--gold);"></div>
                <button class="btn" style="width:100%" onclick="reforgeRelic()">🔮 消耗 5 獸魂·重煉神兵</button>
            </div>
            <div class="card">
                <div class="card-title">星脈天賦 (天賦點: <span id="u-pts">0</span>)</div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:12px; font-size:12px; margin-bottom:15px;">
                    <span>神威: <b id="v-atk">0</b></span> <span>天運: <b id="v-crit">0</b>%</span>
                    <span>靈動: <b id="v-dex">0</b>%</span> <span>氣血: <b id="v-mhp">0</b></span>
                </div>
                <div style="display:grid; grid-template-columns:1fr 1fr; gap:10px;">
                    <button class="btn" onclick="spendPoint('str')">🔥 朱雀(攻)</button>
                    <button class="btn" onclick="spendPoint('crit')">💥 白虎(爆)</button>
                    <button class="btn" onclick="spendPoint('dex')">💨 青龍(閃)</button>
                    <button class="btn" onclick="spendPoint('vit')">🛡️ 玄武(血)</button>
                </div>
            </div>
        </div>

        <div id="p-eq" class="page">
            <div class="card"><div class="card-title">乾坤儲物袋</div><div id="inv-list" style="font-size:13px; line-height:2.8; display:grid; grid-template-columns:1fr 1fr;"></div></div>
        </div>
    </div>

    <div class="nav">
        <div class="nav-item active" onclick="changePage('sect', this)">🏠 宗門</div>
        <div class="nav-item" onclick="changePage('rpg', this)">⚔️ 歷練</div>
        <div class="nav-item" onclick="changePage('stat', this)">🧘 洞察</div>
        <div class="nav-item" onclick="changePage('eq', this)">🎒 儲物</div>
    </div>
</div>

<script>
let userData = {
    wood: 0, stone: 0, idle: 1, lv: 1, exp: 0, pts: 0, wW: 0, wS: 0, lvW: 1, lvS: 1, maxW: 5, maxS: 5,
    str: 10, crit: 5, dex: 5, vit: 0, hp: 100, mHp: 100, curMap: 0, inventory: { soul: 0 },
    affixes: [{ name: "吸血", value: 0 }, { name: "額外傷害", value: 0 }]
};

const mapDatabase = [
    { n: "青翠山徑", req: 1, mon: "野豬", hp: 50, atk: 6, exp: 8, drop: { id: 'meat', n: '妖豬肉' } },
    { n: "幽暗靈礦", req: 5, mon: "石巨人", hp: 200, atk: 20, exp: 25, drop: { id: 'iron', n: '百煉玄鐵' } },
    { n: "幽冥森林", req: 10, mon: "幻影豹", hp: 600, atk: 50, exp: 60, drop: { id: 'claw', n: '幻影利爪' } },
    { n: "埋骨之地", req: 20, mon: "魔化骷髏", hp: 2000, atk: 150, exp: 150, drop: { id: 'bone', n: '枯竭靈骨' } },
    { n: "萬妖谷", req: 50, mon: "萬妖之王", hp: 10000, atk: 500, exp: 600, drop: { id: 'orb', n: '萬妖內丹' } }
];

let currentMob = null, lastUpdate = Date.now(), manualWorkTask = null, manualWorkProgress = 0;

function gameLoop() {
    const now = Date.now(), dt = (now - lastUpdate) / 1000; lastUpdate = now;
    userData.wood += userData.wW * (0.2 * userData.lvW) * dt;
    userData.stone += userData.wS * (0.1 * userData.lvS) * dt;
    if (manualWorkTask) {
        manualWorkProgress += dt * 100;
        document.getElementById(`w-${manualWorkTask}-bar`).style.width = Math.min(100, manualWorkProgress) + "%";
        if (manualWorkProgress >= 100) { userData[manualWorkTask]++; manualWorkTask = null; manualWorkProgress = 0; }
    }
    updateUI();
    requestAnimationFrame(gameLoop);
}

function updateUI() {
    document.getElementById('u-wood').innerText = Math.floor(userData.wood);
    document.getElementById('u-stone').innerText = Math.floor(userData.stone);
    document.getElementById('u-lv').innerText = userData.lv;
    document.getElementById('u-idle').innerText = userData.idle;
    document.getElementById('u-wW').innerText = userData.wW;
    document.getElementById('u-wS').innerText = userData.wS;
    document.getElementById('l-wood').innerText = userData.lvW;
    document.getElementById('l-stone').innerText = userData.lvS;
    document.getElementById('m-wood').innerText = userData.maxW;
    document.getElementById('m-stone').innerText = userData.maxS;
    document.getElementById('c-wood').innerText = userData.lvW * 50;
    document.getElementById('c-stone').innerText = userData.lvS * 50;
    document.getElementById('u-pts').innerText = userData.pts;
    document.getElementById('p-hp-bar').style.width = (userData.hp / userData.mHp) * 100 + "%";
    document.getElementById('p-hp-txt').innerText = `${Math.ceil(userData.hp)} / ${userData.mHp}`;
    document.getElementById('u-exp-bar').style.width = (userData.exp / 50) * 100 + "%";
    document.getElementById('u-exp-txt').innerText = `${userData.exp} / 50`;
    if (currentMob) {
        document.getElementById('m-hp-bar').style.width = (currentMob.hp / currentMob.max) * 100 + "%";
        document.getElementById('m-hp-txt').innerText = `${Math.ceil(currentMob.hp)} / ${currentMob.max}`;
        document.getElementById('m-name').innerText = currentMob.n;
    }
    let bonusAtk = (userData.affixes[1].name === "額外傷害" ? userData.affixes[1].value : 0);
    document.getElementById('v-atk').innerText = userData.str + bonusAtk;
    document.getElementById('v-crit').innerText = userData.crit;
    document.getElementById('v-dex').innerText = userData.dex;
    document.getElementById('v-mhp').innerText = userData.mHp;
    document.getElementById('relic-info').innerHTML = userData.affixes.map(a => `💠 ${a.name}: +${a.value}${['吸血','爆擊','閃避'].includes(a.name)?'%':''}`).join('<br>');
    renderMaps(); renderInventory();
}

function renderMaps() {
    let h = ""; mapDatabase.forEach((m, i) => {
        let isL = userData.lv < m.req;
        h += `<div class="map-item ${userData.curMap===i?'active':''} ${isL?'locked':''}" onclick="selectMap(${i})">${m.n}<br><small>${isL?'🔒 Lv.'+m.req:'可進'}</small></div>`;
    }); document.getElementById('map-list').innerHTML = h;
}

function renderInventory() {
    let h = ""; if (userData.inventory.soul > 0) h += `<span>✨ 殘存獸魂: ${userData.inventory.soul}</span>`;
    for (let id in userData.inventory) { if (id !== 'soul' && userData.inventory[id] > 0) {
        let itemName = "未知材料"; mapDatabase.forEach(m => { if (m.drop.id === id) itemName = m.drop.n; });
        h += `<span>📦 ${itemName}: ${userData.inventory[id]}</span>`;
    } } document.getElementById('inv-list').innerHTML = h || "<span>袋中空空如也</span>";
}

function selectMap(i) { if (userData.lv >= mapDatabase[i].req) { userData.curMap = i; spawnMob(); pushLog("🚩 前往「" + mapDatabase[i].n + "」進行歷練"); } }
function spawnMob() { const m = mapDatabase[userData.curMap]; currentMob = { n: m.mon, hp: m.hp, max: m.hp, atk: m.atk }; }

function playerAttack() {
    if (!currentMob) spawnMob();
    let dmg = userData.str + (userData.affixes[1].name === "額外傷害" ? userData.affixes[1].value : 0);
    if (Math.random()*100 < userData.crit) { dmg *= 2; pushLog(`<span class="log-crit">💥 暴擊！太乙劍訣造成 ${dmg} 傷害</span>`); } 
    else pushLog(`⚔️ 揮劍砍擊，造成 ${dmg} 傷害`);
    
    currentMob.hp -= dmg;
    if (userData.affixes[0].name === "吸血") userData.hp = Math.min(userData.mHp, userData.hp + dmg * (userData.affixes[0].value / 100));
    
    if (currentMob.hp > 0) {
        if (Math.random() * 100 > userData.dex) {
            let mDmg = Math.ceil(currentMob.atk * (0.8 + Math.random() * 0.4));
            userData.hp -= mDmg; pushLog(`<span class="log-dmg">🩸 ${currentMob.n}反擊，聖體受損 ${mDmg}</span>`);
        } else pushLog(`<span class="log-dodge">💨 身法靈動，避開了攻擊！</span>`);
    }
    
    if (userData.hp <= 0) { userData.hp = userData.mHp * 0.2; pushLog("😫 體力不支，被迫返回宗門打坐..."); changePage('sect', document.querySelectorAll('.nav-item')[0]); }
    else if (currentMob.hp <= 0) {
        pushLog(`✅ 成功斬殺 ${currentMob.n}！`); userData.exp += mapDatabase[userData.curMap].exp;
        userData.inventory[mapDatabase[userData.curMap].drop.id] = (userData.inventory[mapDatabase[userData.curMap].drop.id] || 0) + 1;
        if (Math.random() < 0.4) userData.inventory.soul++;
        if (userData.exp >= 50) { userData.exp -= 50; userData.lv++; userData.pts++; pushLog(`<span class="log-crit">🌟 境界突破！已達練氣 ${userData.lv} 層</span>`); }
        spawnMob();
    }
}

function startManualWork(t) { if (!manualWorkTask) manualWorkTask = t; }
function recruitDisciple() { if (userData.stone >= 10) { userData.stone -= 10; userData.idle++; pushLog("🤝 緣分已至，一名新弟子加入宗門"); } }
function assignJob(t) { let limit = (t === 'wW' ? userData.maxW : userData.maxS); if (userData.idle > 0 && userData[t] < limit) { userData[t]++; userData.idle--; } }
function upgradeBuilding(t) {
    let cost = (t === 'wood' ? userData.lvW * 50 : userData.lvS * 50); let res = (t === 'wood' ? 'wood' : 'stone');
    if (userData[res] >= cost) { userData[res] -= cost; if (t === 'wood') { userData.lvW++; userData.maxW += 5; } else { userData.lvS++; userData.maxS += 5; } pushLog("🏰 堂口擴建完畢，規模壯大！"); }
}
function spendPoint(k) { if (userData.pts > 0) { userData[k]++; userData.pts--; if (k === 'vit') { userData.mHp += 20; userData.hp += 20; } pushLog("🧘 運功完畢，天賦加強"); } }
function reforgeRelic() {
    if (userData.inventory.soul >= 5) {
        userData.inventory.soul -= 5; const pool = ["吸血", "額外傷害", "爆擊", "閃避"];
        userData.affixes = userData.affixes.map(a => ({ name: pool[Math.floor(Math.random() * pool.length)], value: Math.floor(Math.random() * 15) + 5 }));
        pushLog("🔮 爐火純青，神兵詞條更換成功！");
    }
}
function changePage(p, el) {
    document.querySelectorAll('.page').forEach(pg => pg.classList.remove('active'));
    document.getElementById('p-' + p).classList.add('active');
    document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active')); el.classList.add('active');
}
function pushLog(msg) {
    const l = document.getElementById('log'); l.innerHTML = `<div>${msg}</div>` + l.innerHTML;
    if (l.children.length > 25) l.lastChild.remove();
}
spawnMob(); gameLoop();
</script>
</body>
</html>
