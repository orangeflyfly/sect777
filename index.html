<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仙俠宗門 V1.8.3 - 邏輯修正版</title>
    <style>
        :root {
            --color-primary: #a29bfe; --color-primary-dark: #6c5ce7;
            --color-bg-deep: #0b0e14; --color-card-bg: rgba(30, 35, 45, 0.95);
            --color-text-main: #adbac7; --color-gold: #ffcf40;
            --color-danger: #f85149; --color-success: #3fb950;
            --color-info: #0fbcf9; --color-border: rgba(162,155,254,0.4);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "PingFang TC", sans-serif; user-select: none; }
        body { background: #000; color: var(--color-text-main); height: 100vh; display: flex; justify-content: center; overflow: hidden; }
        #app {
            width: 100%; max-width: 500px; height: 100%; background: radial-gradient(circle at top, #1a1c2c 0%, #0b0e14 100%);
            display: flex; flex-direction: column; position: relative; border: 1px solid var(--color-border);
        }
        header { padding: 25px 20px; background: rgba(20, 25, 35, 0.95); border-bottom: 2px solid var(--color-primary); }
        .res-row { display: flex; gap: 10px; margin-bottom: 12px; }
        .res-item { background: rgba(0,0,0,0.8); padding: 6px 14px; border-radius: 20px; font-size: 13px; border: 1px solid var(--color-border); color: #fff; }
        
        /* 頁面結構 */
        .stage { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 120px; position: relative; }
        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 卡片與 UI */
        .card { background: var(--color-card-bg); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid var(--color-border); position: relative; }
        .hp-wrap { height: 26px; background: rgba(0,0,0,0.8); border-radius: 13px; overflow: hidden; margin: 10px 0; border: 1px solid #444; position: relative; }
        .hp-fill { height: 100%; transition: width 0.3s ease-out; position: relative; }
        .hp-text { position: absolute; width: 100%; text-align: center; font-size: 14px; line-height: 26px; color: #fff; font-weight: bold; text-shadow: 1px 1px 2px #000; z-index: 10; pointer-events: none; }

        /* 飄字修正：固定在父容器上方 */
        @keyframes dmgFloat {
            0% { transform: translateY(0); opacity: 1; }
            100% { transform: translateY(-40px); opacity: 0; }
        }
        .dmg-pop {
            position: absolute; top: -10px; left: 50%; transform: translateX(-50%);
            font-weight: 900; font-size: 22px; pointer-events: none;
            animation: dmgFloat 0.7s ease-out forwards; z-index: 100; text-shadow: 2px 2px 0 #000;
        }

        .btn-main { width: 100%; padding: 14px; border-radius: 12px; border: none; background: linear-gradient(135deg, var(--color-primary-dark), var(--color-primary)); color: #fff; font-weight: bold; cursor: pointer; margin-bottom: 8px; }
        .btn-main:active { transform: scale(0.97); }

        #log-box { height: 160px; overflow-y: auto; background: rgba(0,0,0,0.5); border-radius: 10px; padding: 10px; font-size: 12px; border: 1px solid var(--color-border); margin-top: 10px; }
        
        nav { position: absolute; bottom: 20px; left: 15px; right: 15px; height: 75px; background: rgba(25,30,40,0.95); border-radius: 38px; display: flex; border: 1px solid var(--color-border); backdrop-filter: blur(10px); }
        .nav-btn { color: #555; cursor: pointer; text-align: center; flex: 1; padding: 12px 0; }
        .nav-btn.active { color: var(--color-primary); }
    </style>
</head>
<body>

<div id="app">
    <header>
        <div class="res-row">
            <div class="res-item">🪵 <span id="val-wood">0</span></div>
            <div class="res-item">💠 <span id="val-stone">0</span></div>
            <div class="res-item">🍀 <span id="luck-txt">平庸</span></div>
        </div>
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <div><span id="val-realm" style="color:var(--color-gold); font-size:22px; font-weight:bold;">練氣期</span> <small id="val-lv">1層</small></div>
            <div style="text-align:right"><small>戰力</small><br><b id="val-power" style="color:var(--color-primary);">0</b></div>
        </div>
    </header>

    <main class="stage">
        <div id="p1" class="page active">
            <div class="card">
                <b>👥 弟子管理</b>
                <div style="margin:10px 0; font-size:13px;">閒置：<span id="val-d-idle">0</span> / <span id="val-d-total">0</span></div>
                <button class="btn-main" onclick="game.recruit()">招募 (靈石:<span id="d-cost">10</span>)</button>
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px;">
                    <button class="btn-main" style="background:#2d3436" onclick="game.assign('wood', 1)">派駐伐木 (<span id="d-wood">0</span>)</button>
                    <button class="btn-main" style="background:#2d3436" onclick="game.assign('stone', 1)">派駐採礦 (<span id="d-stone">0</span>)</button>
                </div>
            </div>
            <div class="card" onclick="game.startWork('wood')">
                <b>🪵 手動採伐靈木</b>
                <div class="hp-wrap"><div id="bar-wood" class="hp-fill" style="width:0%; background:var(--color-success)"></div><div class="hp-text">點擊獲取資源</div></div>
            </div>
            <div class="card" onclick="game.startWork('stone')">
                <b>💠 手動挖掘礦脈</b>
                <div class="hp-wrap"><div id="bar-stone" class="hp-fill" style="width:0%; background:var(--color-info)"></div><div class="hp-text">點擊獲取資源</div></div>
            </div>
        </div>

        <div id="p2" class="page">
            <div class="card" id="battle-area">
                <div style="display:flex; justify-content:space-between; align-items:center;">
                    <b id="m-name">搜尋中...</b>
                    <label style="font-size:12px;"><input type="checkbox" id="auto-battle-check" onchange="game.toggleAuto()"> 自動歷練</label>
                </div>
                <div class="hp-wrap" id="m-hp-box">
                    <div id="m-hp-bar" class="hp-fill" style="background:var(--color-danger); width:0%"></div>
                    <div class="hp-text" id="m-hp-txt">0 / 0</div>
                </div>
                
                <b style="margin-top:15px; display:block;">🧘 掌門真元</b>
                <div class="hp-wrap" id="p-hp-box">
                    <div id="p-hp-bar" class="hp-fill" style="background:var(--color-success); width:100%"></div>
                    <div class="hp-text" id="p-hp-txt">0 / 0</div>
                </div>
                
                <div style="display:grid; grid-template-columns: 2fr 1fr; gap:10px; margin-top:10px;">
                    <button class="btn-main" onclick="game.doAttack()">靈力攻擊</button>
                    <button class="btn-main" style="background:var(--color-warning)" onclick="game.meditate()">打坐</button>
                </div>
            </div>
            <div id="log-box"></div>
        </div>
    </main>

    <nav>
        <div class="nav-btn active" onclick="game.switchTab(1,this)"><span>⛩️</span><small>宗門</small></div>
        <div class="nav-btn" onclick="game.switchTab(2,this)"><span>⚔️</span><small>歷練</small></div>
    </nav>
</div>

<script>
class XianXiaGame {
    constructor() {
        const saved = JSON.parse(localStorage.getItem('XianXia_V183'));
        this.state = saved || {
            res: { wood: 0, stone: 0 },
            sect: { total: 0, woodD: 0, stoneD: 0 },
            player: { realm: "練氣期", lv: 1, atk: 15, hp: 120, curHp: 120, luck: "平庸" }
        };
        
        // 強制修復：如果血量為空或不正常，初始化它
        if (!this.state.player.curHp || this.state.player.curHp <= 0) {
            this.state.player.curHp = this.state.player.hp || 120;
        }

        this.runtime = {
            mob: null, isSearching: false,
            auto: false, lastAtk: 0,
            workProgress: { wood: 0, stone: 0 }
        };

        this.init();
    }

    init() {
        setInterval(() => this.tick(), 1000);
        this.updateUI();
        this.log("🏮 修復陣法完成，數據已校準。", "var(--color-info)");
    }

    // --- [ 戰鬥邏輯 ] ---
    doAttack() {
        if (this.runtime.isSearching || !this.runtime.mob) return;
        if (Date.now() - this.runtime.lastAtk < 600) return;
        this.runtime.lastAtk = Date.now();

        const p = this.state.player; const m = this.runtime.mob;
        let pDmg = Math.floor(p.atk * (0.9 + Math.random() * 0.2));
        m.curH -= pDmg;
        this.popup(pDmg, "m-hp-box", "var(--color-info)");

        if (m.curH <= 0) {
            this.onWin(m);
        } else {
            let mDmg = Math.floor(m.atk * 0.8);
            p.curHp -= mDmg;
            this.popup(mDmg, "p-hp-box", "var(--color-danger)");
            if (p.curHp <= 0) this.onLose();
        }
        this.updateUI();
    }

    popup(val, boxId, color) {
        const box = document.getElementById(boxId);
        const el = document.createElement('div');
        el.className = 'dmg-pop';
        el.innerText = `-${val}`;
        el.style.color = color;
        box.appendChild(el);
        setTimeout(() => el.remove(), 700);
    }

    onWin(m) {
        this.log(`✨ 擊敗 ${m.n}，收穫靈氣。`, "var(--color-gold)");
        this.state.res.stone += 1;
        this.runtime.mob = null;
        this.runtime.isSearching = true;
        this.updateUI();
        setTimeout(() => { this.runtime.isSearching = false; this.spawn(); }, 1000);
    }

    onLose() {
        this.log("💀 真元渙散，返回宗門...", "var(--color-danger)");
        this.state.player.curHp = this.state.player.hp;
        this.runtime.auto = false;
        document.getElementById('auto-battle-check').checked = false;
        this.switchTab(1);
    }

    spawn() {
        this.runtime.mob = { n: "守山小妖", maxH: 100, curH: 100, atk: 10 };
        this.updateUI();
    }

    // --- [ 資源邏輯 ] ---
    startWork(type) {
        this.runtime.workProgress[type] += 25;
        if (this.runtime.workProgress[type] >= 100) {
            this.runtime.workProgress[type] = 0;
            if (type === 'wood') this.state.res.wood += 2;
            else this.state.res.stone += 1;
        }
        this.updateUI();
    }

    tick() {
        this.state.res.wood += this.state.sect.woodD * 0.2;
        this.state.res.stone += this.state.sect.stoneD * 0.1;
        if (this.runtime.auto && this.runtime.mob) this.doAttack();
        this.updateUI();
        localStorage.setItem('XianXia_V183', JSON.stringify(this.state));
    }

    // --- [ UI 渲染 ] ---
    updateUI() {
        const s = this.state; const p = s.player;
        document.getElementById('val-wood').innerText = Math.floor(s.res.wood);
        document.getElementById('val-stone').innerText = Math.floor(s.res.stone);
        document.getElementById('val-power').innerText = p.atk * 5 + p.hp;
        
        // 弟子
        document.getElementById('val-d-idle').innerText = s.sect.total - s.sect.woodD - s.sect.stoneD;
        document.getElementById('val-d-total').innerText = s.sect.total;
        document.getElementById('d-wood').innerText = s.sect.woodD;
        document.getElementById('d-stone').innerText = s.sect.stoneD;
        document.getElementById('d-cost').innerText = 10 + s.sect.total * 5;

        // 手動條
        document.getElementById('bar-wood').style.width = this.runtime.workProgress.wood + "%";
        document.getElementById('bar-stone').style.width = this.runtime.workProgress.stone + "%";

        // 戰鬥 UI
        if (this.runtime.mob) {
            const m = this.runtime.mob;
            document.getElementById('m-name').innerText = m.n;
            document.getElementById('m-hp-bar').style.width = (m.curH / m.maxH * 100) + "%";
            document.getElementById('m-hp-txt').innerText = `${m.curH} / ${m.maxH}`;
        }
        
        document.getElementById('p-hp-bar').style.width = (p.curHp / p.hp * 100) + "%";
        document.getElementById('p-hp-txt').innerText = `${Math.ceil(p.curHp)} / ${p.hp}`;
    }

    // --- [ 雜項 ] ---
    log(m, c) {
        const b = document.getElementById('log-box');
        const d = document.createElement('div');
        d.innerHTML = `<span style="color:#666">[訊]</span> <span style="color:${c}">${m}</span>`;
        b.prepend(d);
        if (b.children.length > 20) b.lastChild.remove();
    }
    recruit() {
        const c = 10 + this.state.sect.total * 5;
        if (this.state.res.stone >= c) { this.state.res.stone -= c; this.state.sect.total++; this.updateUI(); }
    }
    assign(t, v) {
        if (v > 0 && (this.state.sect.total - this.state.sect.woodD - this.state.sect.stoneD) <= 0) return;
        if (t === 'wood') this.state.sect.woodD += v; else this.state.sect.stoneD += v;
        this.updateUI();
    }
    meditate() { if (this.state.res.stone >= 5) { this.state.res.stone -= 5; this.state.player.curHp = this.state.player.hp; this.updateUI(); } }
    toggleAuto() { this.runtime.auto = document.getElementById('auto-battle-check').checked; if (this.runtime.auto && !this.runtime.mob) this.spawn(); }
    switchTab(i, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById('p' + i).classList.add('active');
        if (el) {
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            el.classList.add('active');
        }
    }
}
const game = new XianXiaGame();
</script>
</body>
</html>
