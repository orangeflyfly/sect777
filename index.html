<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仙俠宗門 V1.9.8 - 萬象並行版</title>
    <style>
        /* ============================================================
           視覺核心與防跑位 CSS
           ============================================================ */
        :root {
            --color-primary: #a29bfe; 
            --color-primary-dark: #6c5ce7;
            --color-bg-deep: #0b0e14; 
            --color-card-bg: rgba(30, 35, 45, 0.98);
            --color-text-main: #adbac7; 
            --color-gold: #ffcf40;
            --color-danger: #f85149; 
            --color-success: #3fb950;
            --color-info: #0fbcf9; 
            --color-border: rgba(162,155,254,0.6);
            --color-inner-bg: #11151c;
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            user-select: none; 
        }

        body { 
            background: #000; 
            color: var(--color-text-main); 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            overflow: hidden; 
        }

        #app {
            width: 100%; 
            max-width: 500px; 
            height: 100%; 
            background: radial-gradient(circle at top, #1a1c2c 0%, #0b0e14 100%);
            display: flex; 
            flex-direction: column; 
            position: relative; 
            border: 2px solid var(--color-border);
            box-shadow: 0 0 60px rgba(108, 92, 231, 0.3);
        }

        /* 資源跳動特效 */
        @keyframes res-gain {
            0% { transform: scale(1); }
            50% { transform: scale(1.15); color: var(--color-gold); }
            100% { transform: scale(1); }
        }
        .res-pulse { animation: res-gain 0.4s ease; }

        /* 頂部資源列 */
        header { 
            padding: 20px 15px; 
            background: rgba(20, 25, 35, 0.98); 
            border-bottom: 3px solid var(--color-primary); 
            z-index: 100; 
        }

        .res-row { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 15px; 
        }

        .res-item { 
            background: #000; 
            padding: 10px 5px; 
            border-radius: 12px; 
            font-size: 13px; 
            border: 1px solid var(--color-border); 
            flex: 1;
            text-align: center;
            color: #fff;
        }

        .realm-display {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5px;
        }

        .realm-tag { 
            color: var(--color-gold); 
            font-size: 26px; 
            font-weight: 900; 
            text-shadow: 0 0 10px rgba(255,207,64,0.5); 
        }

        /* 內容顯示區 */
        .stage { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            padding-bottom: 120px; 
        }

        .page { display: none; }
        .page.active { display: block; animation: fadeIn 0.4s; }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 卡片與弟子分配區 */
        .card { 
            background: var(--color-card-bg); 
            border-radius: 20px; 
            padding: 20px; 
            margin-bottom: 20px; 
            border: 1px solid var(--color-border); 
        }

        .card-title { 
            font-size: 16px; 
            font-weight: bold; 
            margin-bottom: 15px; 
            color: #fff; 
            display: flex; 
            align-items: center; 
            gap: 10px; 
        }

        .card-title::before { content: ''; width: 4px; height: 18px; background: var(--color-gold); }

        /* 雙軌產出佈局：確保伐木與採礦並存 */
        .work-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 15px;
        }

        .work-box {
            background: var(--color-inner-bg);
            padding: 15px 10px;
            border-radius: 15px;
            text-align: center;
            border: 1px solid #333;
            min-width: 0; /* 防止子元素撐開 */
        }

        .work-box b { font-size: 18px; display: block; margin: 5px 0; }

        .ctrl-btns {
            display: flex;
            gap: 6px;
            margin-top: 8px;
        }

        .btn-s {
            flex: 1;
            padding: 8px 0;
            border-radius: 8px;
            border: none;
            color: #fff;
            font-weight: bold;
            font-size: 14px;
            cursor: pointer;
        }

        /* 核心按鈕：修正字體與寬度 */
        .btn-main { 
            width: 100%; 
            padding: 15px; 
            border-radius: 12px; 
            background: linear-gradient(135deg, var(--color-primary-dark), var(--color-primary)); 
            color: #fff; 
            font-weight: bold; 
            font-size: 15px; /* 修復：字體不跑掉 */
            border: none;
            cursor: pointer; 
            margin-bottom: 10px;
        }

        .btn-main:active { transform: scale(0.98); }

        /* 血條視覺 */
        .hp-wrap { 
            height: 40px; 
            background: #000; 
            border-radius: 20px; 
            overflow: hidden; 
            margin-bottom: 15px; 
            border: 2px solid #444; 
            position: relative; 
        }

        .hp-fill { height: 100%; transition: width 0.3s; }
        .hp-text { 
            position: absolute; width: 100%; text-align: center; 
            font-size: 15px; line-height: 36px; color: #fff; 
            font-weight: bold; z-index: 5; text-shadow: 1px 1px 2px #000;
        }

        /* 日誌盒 */
        #log-box { 
            height: 180px; 
            overflow-y: auto; 
            background: rgba(0,0,0,0.8); 
            border-radius: 15px; 
            padding: 15px; 
            font-size: 13px; 
            border: 1px solid var(--color-border); 
            line-height: 1.8; 
        }

        /* 導覽列 */
        nav { 
            position: absolute; bottom: 20px; left: 15px; right: 15px; 
            height: 80px; background: rgba(20, 25, 30, 0.98); 
            border-radius: 40px; display: flex; border: 1px solid var(--color-primary); 
            z-index: 200; 
        }

        .nav-btn { flex: 1; text-align: center; padding: 12px 0; color: #555; cursor: pointer; }
        .nav-btn.active { color: var(--color-gold); }
        .nav-btn span { font-size: 26px; display: block; }

        /* 背包網格 */
        .bag-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .bag-item { background: #1a1e26; border: 1px solid var(--color-border); border-radius: 12px; padding: 15px 5px; text-align: center; }
        .bag-item b { color: var(--color-gold); font-size: 14px; display: block; }
    </style>
</head>
<body>

<div id="app">
    <header>
        <div class="res-row">
            <div class="res-item" id="res-wood-ui">🌲 靈木: <span id="val-wood">0</span></div>
            <div class="res-item" id="res-stone-ui">💠 靈石: <span id="val-stone">0</span></div>
            <div class="res-item">🍀 氣運: <span id="val-luck">--</span></div>
        </div>
        <div class="realm-display">
            <div>
                <span class="realm-tag" id="val-realm">載入中</span><br>
                <span id="val-lv" style="color:var(--color-primary); font-weight:bold; font-size:14px;">第 1 層</span>
            </div>
            <div style="text-align:right">
                <small style="color:#555">綜合戰力</small><br>
                <b id="val-power" style="color:var(--color-gold); font-size:22px;">0</b>
            </div>
        </div>
    </header>

    <main class="stage">
        <div id="p1" class="page active">
            <div class="card">
                <div class="card-title">🏮 宗門管理中心</div>
                <button class="btn-main" onclick="game.recruit()">招募外門弟子 (靈石:<span id="d-cost">0</span>)</button>
                
                <div style="background:rgba(0,0,0,0.4); padding:12px; border-radius:12px; text-align:center; margin-bottom:15px;">
                    門下弟子：<b id="val-d-total">0</b> 人 | 待命：<b id="val-d-idle" style="color:var(--color-success)">0</b>
                </div>

                <div class="work-grid">
                    <div class="work-box">
                        <small>🌲 靈木伐木場</small><br>
                        <b id="d-wood" style="color:var(--color-gold)">0</b>
                        <div class="ctrl-btns">
                            <button class="btn-s" style="background:var(--color-primary-dark)" onclick="game.assign('wood', 1)">+</button>
                            <button class="btn-s" style="background:var(--color-danger)" onclick="game.assign('wood', -1)">-</button>
                        </div>
                    </div>
                    <div class="work-box">
                        <small>💠 靈石採礦坑</small><br>
                        <b id="d-stone" style="color:var(--color-info)">0</b>
                        <div class="ctrl-btns">
                            <button class="btn-s" style="background:var(--color-primary-dark)" onclick="game.assign('stone', 1)">+</button>
                            <button class="btn-s" style="background:var(--color-danger)" onclick="game.assign('stone', -1)">-</button>
                        </div>
                    </div>
                </div>
            </div>

            <div class="card" onclick="game.manualWork()">
                <div class="card-title">⚒️ 掌門親力親為</div>
                <div class="hp-wrap">
                    <div id="bar-work" class="hp-fill" style="width:0%; background:var(--color-primary)"></div>
                    <div class="hp-text">點擊此處手動開採</div>
                </div>
            </div>
        </div>

        <div id="p2" class="page">
            <div id="map-list" style="display:flex; gap:10px; margin-bottom:15px; overflow-x:auto; padding:5px;"></div>
            
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                    <b id="m-name" style="font-size:20px; color:var(--color-gold);">正在尋敵...</b>
                    <label style="font-size:14px; color:var(--color-primary); font-weight:bold;">
                        <input type="checkbox" id="auto-check" onchange="game.toggleAuto()"> 自動歷練
                    </label>
                </div>

                <div class="hp-wrap" id="m-hp-box" style="border-color: var(--color-danger);">
                    <div id="m-hp-bar" class="hp-fill" style="background: linear-gradient(90deg, #f85149, #a30000); width:0%"></div>
                    <div class="hp-text" id="m-hp-txt">0%</div>
                </div>

                <div class="hp-wrap" id="p-hp-box" style="border-color: var(--color-success);">
                    <div id="p-hp-bar" class="hp-fill" style="background: linear-gradient(90deg, #3fb950, #1e6027); width:100%"></div>
                    <div class="hp-text" id="p-hp-txt">100%</div>
                </div>

                <div style="display:grid; grid-template-columns: 2fr 1fr; gap:12px;">
                    <button class="btn-main" onclick="game.doAttack()" style="height:60px; font-size:18px;">神通攻擊</button>
                    <button class="btn-main" style="background:var(--color-info); height:60px;" onclick="game.meditate()">打坐</button>
                </div>
            </div>

            <div id="log-box"></div>
        </div>

        <div id="p3" class="page">
            <div class="card">
                <div class="card-title">📖 修為進境</div>
                <div style="display:flex; justify-content:space-around; background:rgba(0,0,0,0.5); padding:15px; border-radius:15px; margin-bottom:15px;">
                    <div style="text-align:center;"><small>攻</small><br><b id="st-atk" style="color:var(--color-info)">0</b></div>
                    <div style="text-align:center;"><small>血</small><br><b id="st-hp" style="color:var(--color-danger)">0</b></div>
                    <div style="text-align:center;"><small>悟</small><br><b id="st-pts" style="color:var(--color-gold)">0</b></div>
                </div>
                <button class="btn-main" onclick="game.upgrade()">晉升境界 (需 5 感悟)</button>
            </div>

            <div class="card">
                <div class="card-title">🎒 儲物袋</div>
                <div id="bag-grid" class="bag-grid"></div>
            </div>
        </div>
    </main>

    <nav>
        <div class="nav-btn active" onclick="game.switchTab(1,this)"><span>⛩️</span><small>宗門</small></div>
        <div class="nav-btn" onclick="game.switchTab(2,this)"><span>⚔️</span><small>歷練</small></div>
        <div class="nav-btn" onclick="game.switchTab(3,this)"><span>🎒</span><small>儲物袋</small></div>
    </nav>
</div>

<script>
/**
 * XianXiaGame V1.9.8
 * 核心修復：確保伐木場 UI 回歸，並與採礦場並行運作。
 */
class XianXiaGame {
    constructor() {
        const saved = JSON.parse(localStorage.getItem('XianXia_V198_Master'));
        
        this.state = saved || {
            res: { wood: 0, stone: 0 },
            sect: { total: 0, woodD: 0, stoneD: 0, kill: 0 },
            player: { 
                realm: "練氣期", lv: 1, pts: 0, 
                atk: 60, hp: 500, curHp: 500, luck: "平庸" 
            },
            inv: { "聚靈珠": 1 }
        };

        this.runtime = {
            mob: null,
            isSearching: false,
            auto: false,
            lastAtk: 0,
            workProgress: 0
        };

        this.maps = [
            { id: 0, name: "🌿 青雲山腳", req: 1, mob: { n: "兇猛野豬", hp: 260, atk: 40, loot: "野豬牙" } },
            { id: 1, name: "🐍 幽冥密林", req: 5, mob: { n: "幻影毒蛇", hp: 1800, atk: 140, loot: "毒液瓶" } },
            { id: 2, name: "⛰️ 萬仞荒漠", req: 10, mob: { n: "沙漠石蠍", hp: 10000, atk: 600, loot: "蠍殼" } }
        ];
        
        this.curMapIdx = 0;
        this.init();
    }

    init() {
        this.rollLuck();
        this.buildMapUI();
        
        // 核心主循環 (1秒一次)
        setInterval(() => this.tick(), 1000);

        this.updateUI();
        this.log("🏮 宗門氣運重聚，伐木與採礦雙業並興。", "var(--color-gold)");
    }

    rollLuck() {
        const list = ["大凶", "凶", "平庸", "小吉", "大吉"];
        this.state.player.luck = list[Math.floor(Math.random() * list.length)];
    }

    /**
     * 每秒執行的核心邏輯
     */
    tick() {
        const s = this.state.sect;

        // 1. 伐木產出邏輯 (實體化增加)
        if (s.woodD > 0) {
            this.state.res.wood += s.woodD * 1.5;
            this.pulse('res-wood-ui');
        }

        // 2. 採礦產出邏輯 (實體化增加)
        if (s.stoneD > 0) {
            this.state.res.stone += s.stoneD * 0.4;
            this.pulse('res-stone-ui');
        }

        // 3. 自動戰鬥循環
        if (this.runtime.auto) {
            if (this.runtime.mob === null && !this.runtime.isSearching) {
                this.spawnMonster();
            } else if (this.runtime.mob !== null) {
                this.doAttack();
            }
        }

        this.updateUI();
        this.save();
    }

    pulse(id) {
        const el = document.getElementById(id);
        el.classList.add('res-pulse');
        setTimeout(() => el.classList.remove('res-pulse'), 400);
    }

    save() {
        localStorage.setItem('XianXia_V198_Master', JSON.stringify(this.state));
    }

    /**
     * 戰鬥與刷新
     */
    doAttack() {
        if (!this.runtime.mob || Date.now() - this.runtime.lastAtk < 700) return;
        this.runtime.lastAtk = Date.now();

        const p = this.state.player;
        const m = this.runtime.mob;

        let bonus = p.luck === "大吉" ? 1.5 : (p.luck === "凶" ? 0.7 : 1.0);
        let pDmg = Math.floor(p.atk * (0.8 + Math.random() * 0.4) * bonus);
        m.curH -= pDmg;

        if (m.curH <= 0) {
            this.onWin(m);
        } else {
            let mDmg = Math.floor(m.atk * (0.8 + Math.random() * 0.4));
            p.curHp -= mDmg;
            if (p.curHp <= 0) this.onLose();
        }
        this.updateUI();
    }

    onWin(m) {
        this.state.player.pts += 1;
        this.log(`⚔️ 成功擊殺 ${m.n}，獲得 1 感悟。`, "var(--color-success)");
        if (Math.random() < 0.6) {
            this.state.inv[m.loot] = (this.state.inv[m.loot] || 0) + 1;
            this.log(`🎒 獲得：${m.loot}`);
        }
        this.runtime.mob = null;
        this.runtime.isSearching = true;
        setTimeout(() => {
            this.runtime.isSearching = false;
            if (this.runtime.auto) this.spawnMonster();
        }, 1200);
    }

    onLose() {
        this.log("💀 傷重昏迷，已撤回宗門療傷。", "var(--color-danger)");
        this.runtime.auto = false;
        document.getElementById('auto-check').checked = false;
        this.state.player.curHp = 50;
        this.switchTab(1);
    }

    spawnMonster() {
        if (this.runtime.isSearching) return;
        const data = this.maps[this.curMapIdx].mob;
        this.runtime.mob = { n: data.n, maxH: data.hp, curH: data.hp, atk: data.atk, loot: data.loot };
        this.updateUI();
    }

    /**
     * 宗門庶務與 UI 更新
     */
    manualWork() {
        this.runtime.workProgress += 20;
        if (this.runtime.workProgress >= 100) {
            this.runtime.workProgress = 0;
            this.state.res.wood += 6;
            this.state.res.stone += 1.5;
            this.log("⚒️ 辛苦開採，資源入庫。");
        }
        this.updateUI();
    }

    updateUI() {
        const s = this.state;
        const p = s.player;

        // 資源
        document.getElementById('val-wood').innerText = Math.floor(s.res.wood);
        document.getElementById('val-stone').innerText = Math.floor(s.res.stone);
        document.getElementById('val-luck').innerText = p.luck;
        document.getElementById('val-realm').innerText = p.realm;
        document.getElementById('val-lv').innerText = `第 ${p.lv} 層`;
        document.getElementById('val-power').innerText = Math.floor(p.atk * 15 + p.hp);

        // 弟子與分配
        document.getElementById('val-d-idle').innerText = s.sect.total - s.woodD - s.stoneD;
        document.getElementById('val-d-total').innerText = s.sect.total;
        document.getElementById('d-wood').innerText = s.woodD;
        document.getElementById('d-stone').innerText = s.stoneD;
        document.getElementById('d-cost').innerText = 20 + s.sect.total * 15;
        document.getElementById('bar-work').style.width = this.runtime.workProgress + "%";

        // 怪物狀態
        const m = this.runtime.mob;
        if (m) {
            document.getElementById('m-name').innerText = m.n;
            let per = (m.curH / m.maxH) * 100;
            document.getElementById('m-hp-bar').style.width = per + "%";
            document.getElementById('m-hp-txt').innerText = Math.ceil(per) + "%";
        } else {
            document.getElementById('m-name').innerText = this.runtime.isSearching ? "🔍 搜尋中..." : "待機";
            document.getElementById('m-hp-bar').style.width = "0%";
            document.getElementById('m-hp-txt').innerText = "0%";
        }

        // 玩家血條
        let pPer = (p.curHp / p.hp) * 100;
        document.getElementById('p-hp-bar').style.width = Math.max(0, pPer) + "%";
        document.getElementById('p-hp-txt').innerText = Math.max(0, Math.ceil(pPer)) + "%";

        // 屬性與背包
        document.getElementById('st-atk').innerText = p.atk;
        document.getElementById('st-hp').innerText = p.hp;
        document.getElementById('st-pts').innerText = p.pts;

        const bg = document.getElementById('bag-grid');
        let html = "";
        for (let k in s.inv) {
            html += `<div class="bag-item" onclick="game.melt('${k}')">🏺 ${k}<b>x${s.inv[k]}</b></div>`;
        }
        bg.innerHTML = html || "<small style='grid-column:span 3; color:#444'>儲物袋空</small>";
    }

    melt(k) {
        if (this.state.inv[k] > 0) {
            this.state.inv[k]--;
            if (this.state.inv[k] === 0) delete this.state.inv[k];
            this.state.player.pts += 2;
            this.log(`🔥 熔煉 ${k}，獲得 2 感悟。`);
            this.updateUI();
        }
    }

    upgrade() {
        const p = this.state.player;
        if (p.pts >= 5) {
            p.pts -= 5; p.lv++; p.atk += 45; p.hp += 180; p.curHp = p.hp;
            this.log(`🌟 晉升至練氣第 ${p.lv} 層！`, "var(--color-gold)");
            this.buildMapUI();
            this.updateUI();
        } else {
            this.log("❌ 感悟不足。");
        }
    }

    recruit() {
        const cost = 20 + this.state.sect.total * 15;
        if (this.state.res.stone >= cost) {
            this.state.res.stone -= cost;
            this.state.sect.total++;
            this.updateUI();
        } else {
            this.log("❌ 靈石不足。");
        }
    }

    assign(type, v) {
        const s = this.state.sect;
        const idle = s.total - s.woodD - s.stoneD;
        if (v > 0 && idle <= 0) return;
        if (type === 'wood' && s.woodD + v >= 0) s.woodD += v;
        if (type === 'stone' && s.stoneD + v >= 0) s.stoneD += v;
        this.updateUI();
    }

    buildMapUI() {
        const c = document.getElementById('map-list');
        c.innerHTML = "";
        this.maps.forEach((m, i) => {
            const btn = document.createElement('button');
            const locked = this.state.player.lv < m.req;
            btn.style.padding = "10px 15px";
            btn.style.borderRadius = "20px";
            btn.style.border = "1px solid #444";
            btn.style.backgroundColor = i === this.curMapIdx ? "var(--color-primary-dark)" : "#111";
            btn.style.color = "#fff";
            btn.style.whiteSpace = "nowrap";
            btn.innerHTML = locked ? `🔒 第 ${m.req} 層` : m.name;
            btn.onclick = () => {
                if (!locked) {
                    this.curMapIdx = i;
                    this.runtime.mob = null;
                    this.buildMapUI();
                    this.spawnMonster();
                } else {
                    this.log("⚠️ 境界未到，不可強求。");
                }
            };
            c.appendChild(btn);
        });
    }

    switchTab(idx, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('p' + idx).classList.add('active');
        if (el) el.classList.add('active');
    }

    log(msg, color) {
        const box = document.getElementById('log-box');
        const d = document.createElement('div');
        d.style.color = color || "#adbac7";
        d.innerHTML = `<span style="color:#555;">[${new Date().toLocaleTimeString()}]</span> ${msg}`;
        box.prepend(d);
        if (box.children.length > 25) box.lastChild.remove();
    }

    meditate() {
        this.state.player.curHp = this.state.player.hp;
        this.log("🧘 運轉真元，狀態全滿。");
        this.updateUI();
    }

    toggleAuto() { this.runtime.auto = document.getElementById('auto-check').checked; }
}

const game = new XianXiaGame();
</script>
</body>
</html>
