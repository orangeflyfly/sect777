<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仙俠宗門 V1.8.9 - 宗門修復重築版</title>
    <style>
        /* =========================================
           核心視覺定義
           ========================================= */
        :root {
            --color-primary: #a29bfe; 
            --color-primary-dark: #6c5ce7;
            --color-bg-deep: #0b0e14; 
            --color-card-bg: rgba(30, 35, 45, 0.98);
            --color-text-main: #adbac7; 
            --color-gold: #ffcf40;
            --color-danger: #f85149; 
            --color-success: #3fb950;
            --color-info: #0fbcf9; 
            --color-border: rgba(162,155,254,0.6);
        }

        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            user-select: none; 
        }

        body { 
            background: #000; 
            color: var(--color-text-main); 
            height: 100vh; 
            display: flex; 
            justify-content: center; 
            overflow: hidden; 
        }

        #app {
            width: 100%; 
            max-width: 500px; 
            height: 100%; 
            background: radial-gradient(circle at top, #1a1c2c 0%, #0b0e14 100%);
            display: flex; 
            flex-direction: column; 
            position: relative; 
            border: 2px solid var(--color-border);
            box-shadow: 0 0 50px rgba(108, 92, 231, 0.2);
        }

        /* 突破特效層 */
        #breakthrough-fx {
            position: absolute; 
            top: 0; 
            left: 0; 
            width: 100%; 
            height: 100%;
            background: white; 
            opacity: 0; 
            pointer-events: none; 
            z-index: 999;
        }

        @keyframes breakthrough-flash {
            0% { opacity: 0; }
            50% { opacity: 0.8; }
            100% { opacity: 0; }
        }

        /* 頂部資源列 */
        header { 
            padding: 20px 15px; 
            background: rgba(20, 25, 35, 0.98); 
            border-bottom: 3px solid var(--color-primary); 
            z-index: 100; 
        }

        .res-row { 
            display: flex; 
            gap: 10px; 
            margin-bottom: 12px; 
            justify-content: space-around;
        }

        .res-item { 
            background: #111; 
            padding: 6px 12px; 
            border-radius: 15px; 
            font-size: 13px; 
            border: 1px solid var(--color-border); 
            color: #fff; 
            min-width: 80px;
            text-align: center;
        }

        .realm-info {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5px;
        }

        .realm-tag { 
            color: var(--color-gold); 
            font-size: 24px; 
            font-weight: 900; 
            text-shadow: 0 0 10px rgba(255,207,64,0.5); 
        }

        /* 內容滾動區 */
        .stage { 
            flex: 1; 
            overflow-y: auto; 
            padding: 15px; 
            padding-bottom: 110px; 
        }

        .page { 
            display: none; 
        }

        .page.active { 
            display: block; 
            animation: slideIn 0.4s ease-out; 
        }

        @keyframes slideIn { 
            from { opacity: 0; transform: translateY(10px); } 
            to { opacity: 1; transform: translateY(0); } 
        }

        /* 卡片設計 */
        .card { 
            background: var(--color-card-bg); 
            border-radius: 18px; 
            padding: 15px; 
            margin-bottom: 15px; 
            border: 1px solid var(--color-border); 
            box-shadow: 0 6px 15px rgba(0,0,0,0.3); 
        }

        .card-title { 
            font-size: 16px; 
            font-weight: bold; 
            margin-bottom: 12px; 
            color: #fff; 
            display: flex; 
            align-items: center; 
            gap: 8px; 
        }

        .card-title::before { 
            content: ''; 
            width: 4px; 
            height: 16px; 
            background: var(--color-gold); 
        }

        /* 血條視覺優化 */
        .hp-label { 
            display: flex; 
            justify-content: space-between; 
            font-size: 12px; 
            margin-bottom: 4px; 
            color: #bbb; 
        }

        .hp-wrap { 
            height: 36px; 
            background: #000; 
            border-radius: 18px; 
            overflow: hidden; 
            margin-bottom: 12px; 
            border: 2px solid #333; 
            position: relative; 
        }

        .hp-fill { 
            height: 100%; 
            transition: width 0.3s ease-in-out; 
        }

        .hp-text { 
            position: absolute; 
            width: 100%; 
            text-align: center; 
            font-size: 14px; 
            line-height: 32px; 
            color: #fff; 
            font-weight: bold; 
            z-index: 5; 
            text-shadow: 1px 1px 2px #000;
        }

        /* 按鈕視覺調整（修復字體過大問題） */
        .btn-main { 
            width: 100%; 
            padding: 12px; 
            border-radius: 10px; 
            border: 1px solid rgba(255,255,255,0.1); 
            background: linear-gradient(135deg, var(--color-primary-dark), var(--color-primary)); 
            color: #fff; 
            font-weight: bold; 
            font-size: 15px; /* 修復：縮小按鈕字體 */
            cursor: pointer; 
            transition: 0.2s; 
            margin-bottom: 8px; 
        }

        .btn-main:active { 
            transform: scale(0.98); 
        }

        /* 日誌盒 */
        #log-box { 
            height: 150px; 
            overflow-y: auto; 
            background: rgba(0,0,0,0.6); 
            border-radius: 12px; 
            padding: 12px; 
            font-size: 12px; 
            border: 1px solid var(--color-border); 
            line-height: 1.6; 
        }

        /* 導覽列 */
        nav { 
            position: absolute; 
            bottom: 15px; 
            left: 10px; 
            right: 10px; 
            height: 75px; 
            background: rgba(25, 30, 40, 0.95); 
            border-radius: 35px; 
            display: flex; 
            border: 1px solid var(--color-primary); 
            z-index: 200; 
        }

        .nav-btn { 
            color: #666; 
            cursor: pointer; 
            text-align: center; 
            flex: 1; 
            padding: 10px 0; 
        }

        .nav-btn.active { 
            color: var(--color-gold); 
        }

        .nav-btn span { 
            font-size: 24px; 
            display: block; 
        }

        /* 背包樣式 */
        .bag-grid { 
            display: grid; 
            grid-template-columns: repeat(3, 1fr); 
            gap: 10px; 
        }

        .bag-item { 
            background: #1a1e26; 
            border: 1px solid var(--color-border); 
            border-radius: 10px; 
            padding: 10px 5px; 
            text-align: center; 
            font-size: 13px;
        }

        /* 傷害動畫 */
        @keyframes float-up {
            0% { transform: translate(-50%, 0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translate(-50%, -50px); opacity: 0; }
        }
        .dmg-pop {
            position: absolute; left: 50%; top: 20%;
            font-weight: 900; font-size: 24px;
            animation: float-up 0.8s forwards; pointer-events: none;
        }
    </style>
</head>
<body>

<div id="app">
    <div id="breakthrough-fx"></div>

    <header>
        <div class="res-row">
            <div class="res-item">🪵 靈木: <span id="val-wood">0</span></div>
            <div class="res-item">💠 靈石: <span id="val-stone">0</span></div>
            <div class="res-item">🍀 氣運: <span id="val-luck">--</span></div>
        </div>
        <div class="realm-info">
            <div>
                <span class="realm-tag" id="val-realm">載入中</span>
                <span id="val-lv" style="margin-left:8px; color:var(--color-primary); font-size:14px;">第 1 層</span>
            </div>
            <div style="text-align:right">
                <small style="color:#666">戰力</small><br>
                <b id="val-power" style="color:var(--color-gold); font-size:18px;">0</b>
            </div>
        </div>
    </header>

    <main class="stage">
        
        <div id="p1" class="page active">
            <div class="card">
                <div class="card-title">👥 宗門庶務</div>
                <button class="btn-main" onclick="game.recruit()">招募外門弟子 (靈石:<span id="d-cost">0</span>)</button>
                <div style="text-align:center; font-size:14px; margin:8px 0;">
                    弟子總計：<b id="val-d-total">0</b> | 閒置：<b id="val-d-idle" style="color:var(--color-success)">0</b>
                </div>
                
                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:10px; margin-top:10px;">
                    <div style="text-align:center; background:#111; padding:10px; border-radius:12px;">
                        <small>🌲 伐木場</small><br><b id="d-wood" style="color:var(--color-gold)">0</b>人
                        <div style="display:flex; gap:5px; margin-top:8px;">
                            <button class="btn-main" style="padding:4px; font-size:12px;" onclick="game.assign('wood', 1)">+</button>
                            <button class="btn-main" style="padding:4px; font-size:12px; background:#d63031;" onclick="game.assign('wood', -1)">-</button>
                        </div>
                    </div>
                    <div style="text-align:center; background:#111; padding:10px; border-radius:12px;">
                        <small>💎 採礦坑</small><br><b id="d-stone" style="color:var(--color-info)">0</b>人
                        <div style="display:flex; gap:5px; margin-top:8px;">
                            <button class="btn-main" style="padding:4px; font-size:12px;" onclick="game.assign('stone', 1)">+</button>
                            <button class="btn-main" style="padding:4px; font-size:12px; background:#d63031;" onclick="game.assign('stone', -1)">-</button>
                        </div>
                    </div>
                </div>
            </div>
            
            <div class="card" onclick="game.manualWork()">
                <div class="card-title">⚒️ 手動採集資源</div>
                <div class="hp-wrap">
                    <div id="bar-work" class="hp-fill" style="width:0%; background:var(--color-primary)"></div>
                    <div class="hp-text">點擊螢幕進行開採</div>
                </div>
            </div>
        </div>

        <div id="p2" class="page">
            <div class="map-tabs" id="map-list"></div>
            
            <div class="card">
                <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:8px;">
                    <b id="m-name" style="font-size:18px; color:var(--color-gold);">搜尋中...</b>
                    <label style="font-size:13px; color:var(--color-primary);">
                        <input type="checkbox" id="auto-check" onchange="game.toggleAuto()"> 自動歷練
                    </label>
                </div>

                <div class="hp-label"><span>👹 妖獸目標</span><span id="m-hp-val">0/0</span></div>
                <div class="hp-wrap" id="m-hp-box" style="border-color: var(--color-danger); height:40px;">
                    <div id="m-hp-bar" class="hp-fill" style="background: linear-gradient(90deg, #ff4d4d, #b33939); width:0%"></div>
                    <div class="hp-text" id="m-hp-txt">0%</div>
                </div>

                <div class="hp-label"><span>🧘 自身狀態</span><span id="p-hp-val">0/0</span></div>
                <div class="hp-wrap" id="p-hp-box" style="border-color: var(--color-success); height:40px;">
                    <div id="p-hp-bar" class="hp-fill" style="background: linear-gradient(90deg, #2ecc71, #218c74); width:100%"></div>
                    <div class="hp-text" id="p-hp-txt">100%</div>
                </div>

                <div style="display:grid; grid-template-columns: 2fr 1fr; gap:10px;">
                    <button class="btn-main" onclick="game.doAttack()" style="height:60px;">發動進攻</button>
                    <button class="btn-main" style="background:var(--color-info); height:60px;" onclick="game.meditate()">打坐回氣</button>
                </div>
            </div>

            <div id="log-box"></div>
        </div>

        <div id="p3" class="page">
            <div class="card">
                <div class="card-title">📖 修為屬性</div>
                <div style="display:flex; justify-content:space-around; background:rgba(0,0,0,0.4); padding:12px; border-radius:12px;">
                    <div style="text-align:center;"><small>攻</small><br><b id="st-atk" style="color:var(--color-info)">0</b></div>
                    <div style="text-align:center;"><small>命</small><br><b id="st-hp" style="color:var(--color-danger)">0</b></div>
                    <div style="text-align:center;"><small>悟</small><br><b id="st-pts" style="color:var(--color-gold)">0</b></div>
                </div>
                <button class="btn-main" style="margin-top:12px;" onclick="game.upgrade()">消耗 5 點感悟突破</button>
            </div>

            <div class="card">
                <div class="card-title">🎒 儲物袋</div>
                <div id="bag-grid" class="bag-grid"></div>
            </div>
        </div>

    </main>

    <nav>
        <div class="nav-btn active" onclick="game.switchTab(1,this)"><span>⛩️</span><small>宗門</small></div>
        <div class="nav-btn" onclick="game.switchTab(2,this)"><span>⚔️</span><small>歷練</small></div>
        <div class="nav-btn" onclick="game.switchTab(3,this)"><span>🎒</span><small>儲物袋</small></div>
    </nav>
</div>

<script>
/**
 * XianXiaGame V1.8.9
 * 核心：修正刷新邏輯、礦場佈局、UI 尺寸溢出。
 */
class XianXiaGame {
    constructor() {
        // 加載數據
        const saved = JSON.parse(localStorage.getItem('XianXia_V189_Master'));
        
        this.state = saved || {
            res: { wood: 0, stone: 0 },
            sect: { total: 0, woodD: 0, stoneD: 0, kill: 0 },
            player: { 
                realm: "練氣期", lv: 1, pts: 0, 
                atk: 45, hp: 400, curHp: 400, luck: "平庸" 
            },
            inv: { "聚靈珠": 1 }
        };

        // 數據補正
        if (!this.state.player.curHp || this.state.player.curHp <= 0) {
            this.state.player.curHp = this.state.player.hp;
        }

        this.runtime = {
            mob: null,
            isSearching: false,
            auto: false,
            lastAtk: 0,
            workProgress: 0
        };

        this.maps = [
            { id: 0, name: "🌿 青雲山腳", req: 1, mob: { n: "野豬精", hp: 200, atk: 25, loot: "野豬牙" } },
            { id: 1, name: "🐍 幽冥密林", req: 5, mob: { n: "幻影毒蛇", hp: 1200, atk: 90, loot: "毒液瓶" } },
            { id: 2, name: "⛰️ 萬仞荒漠", req: 10, mob: { n: "沙漠巨蠍", hp: 7000, atk: 450, loot: "蠍殼" } }
        ];
        
        this.curMapIdx = 0;
        this.init();
    }

    init() {
        this.rollLuck();
        this.buildMapUI();
        
        // 主時鐘：資源產出與自動戰鬥
        setInterval(() => {
            this.tick();
        }, 1000);

        this.updateUI();
        this.log("🏮 修仙界規則已更新，宗門資源運轉中。", "var(--color-gold)");
    }

    rollLuck() {
        const list = ["大凶", "凶", "平庸", "小吉", "大吉"];
        this.state.player.luck = list[Math.floor(Math.random() * list.length)];
    }

    tick() {
        // 1. 資源生產：礦場與伐木場
        this.state.res.wood += this.state.sect.woodD * 0.7;
        this.state.res.stone += this.state.sect.stoneD * 0.3;

        // 2. 刷新與自動戰鬥邏輯
        if (this.runtime.auto === true) {
            if (this.runtime.mob === null && this.runtime.isSearching === false) {
                this.spawnMonster(); // 沒怪就刷新
            } else if (this.runtime.mob !== null) {
                this.doAttack(); // 有怪就打
            }
        }

        this.updateUI();
        this.save();
    }

    save() {
        localStorage.setItem('XianXia_V189_Master', JSON.stringify(this.state));
    }

    doAttack() {
        if (this.runtime.mob === null || Date.now() - this.runtime.lastAtk < 650) {
            return;
        }
        this.runtime.lastAtk = Date.now();

        const p = this.state.player;
        const m = this.runtime.mob;

        // 玩家攻擊
        let bonus = (p.luck === "大吉") ? 1.5 : ((p.luck === "凶") ? 0.8 : 1.0);
        let pDmg = Math.floor(p.atk * (0.85 + Math.random() * 0.3) * bonus);
        m.curH = Math.max(0, m.curH - pDmg);
        this.pop(pDmg, "m-hp-box", "var(--color-info)");

        if (m.curH <= 0) {
            this.onWin(m);
        } else {
            // 怪物反擊
            let mDmg = Math.floor(m.atk * (0.8 + Math.random() * 0.4));
            p.curHp = Math.max(0, p.curHp - mDmg);
            this.pop(mDmg, "p-hp-box", "var(--color-danger)");

            if (p.curHp <= 0) {
                this.onLose();
            }
        }
        this.updateUI();
    }

    onWin(m) {
        this.state.player.pts += 1;
        this.state.sect.kill += 1;
        this.log(`⚔️ 討伐 ${m.n} 成功！獲得 1 點感悟。`, "var(--color-success)");

        if (Math.random() < 0.6) {
            this.state.inv[m.loot] = (this.state.inv[m.loot] || 0) + 1;
            this.log(`🎒 拾得：${m.loot}`);
        }

        this.runtime.mob = null;
        this.runtime.isSearching = true; // 鎖定狀態防止連刷
        setTimeout(() => {
            this.runtime.isSearching = false;
            this.spawnMonster(); // 1.2秒後刷新下一隻
        }, 1200);
    }

    onLose() {
        this.log("💀 傷勢過重，已逃回宗門療傷。", "var(--color-danger)");
        this.runtime.auto = false;
        document.getElementById('auto-check').checked = false;
        this.state.player.curHp = 50;
        this.switchTab(1);
    }

    spawnMonster() {
        if (this.runtime.isSearching) return;
        const data = this.maps[this.curMapIdx].mob;
        this.runtime.mob = {
            n: data.n,
            maxH: data.hp,
            curH: data.hp,
            atk: data.atk,
            loot: data.loot
        };
        this.updateUI();
    }

    pop(v, id, color) {
        const box = document.getElementById(id);
        if (!box) return;
        const el = document.createElement('div');
        el.className = 'dmg-pop';
        el.innerText = `-${v}`;
        el.style.color = color;
        box.appendChild(el);
        setTimeout(() => { el.remove(); }, 800);
    }

    manualWork() {
        this.runtime.workProgress += 25;
        if (this.runtime.workProgress >= 100) {
            this.runtime.workProgress = 0;
            this.state.res.stone += 2; // 手動增加礦產
            this.state.res.wood += 5;
        }
        this.updateUI();
    }

    updateUI() {
        const s = this.state;
        const p = s.player;

        // 資源
        document.getElementById('val-wood').innerText = Math.floor(s.res.wood);
        document.getElementById('val-stone').innerText = Math.floor(s.res.stone);
        document.getElementById('val-luck').innerText = p.luck;
        document.getElementById('val-realm').innerText = p.realm;
        document.getElementById('val-lv').innerText = `第 ${p.lv} 層`;
        document.getElementById('val-power').innerText = Math.floor(p.atk * 10 + p.hp * 0.5);

        // 弟子分配
        document.getElementById('val-d-idle').innerText = s.sect.total - s.sect.woodD - s.sect.stoneD;
        document.getElementById('val-d-total').innerText = s.sect.total;
        document.getElementById('d-wood').innerText = s.sect.woodD;
        document.getElementById('d-stone').innerText = s.sect.stoneD;
        document.getElementById('d-cost').innerText = 10 + s.sect.total * 8;
        document.getElementById('bar-work').style.width = this.runtime.workProgress + "%";

        // 戰鬥 UI
        const m = this.runtime.mob;
        if (m) {
            document.getElementById('m-name').innerText = m.n;
            let per = (m.curH / m.maxH) * 100;
            document.getElementById('m-hp-bar').style.width = per + "%";
            document.getElementById('m-hp-txt').innerText = Math.ceil(per) + "%";
            document.getElementById('m-hp-val').innerText = `${m.curH}/${m.maxH}`;
        } else {
            document.getElementById('m-name').innerText = this.runtime.isSearching ? "🔍 搜尋中..." : "等待";
            document.getElementById('m-hp-bar').style.width = "0%";
            document.getElementById('m-hp-txt').innerText = "0%";
            document.getElementById('m-hp-val').innerText = "0/0";
        }

        let pPer = (p.curHp / p.hp) * 100;
        document.getElementById('p-hp-bar').style.width = pPer + "%";
        document.getElementById('p-hp-txt').innerText = Math.ceil(pPer) + "%";
        document.getElementById('p-hp-val').innerText = `${Math.ceil(p.curHp)}/${p.hp}`;

        // 屬性與背包
        document.getElementById('st-atk').innerText = p.atk;
        document.getElementById('st-hp').innerText = p.hp;
        document.getElementById('st-pts').innerText = p.pts;

        const bag = document.getElementById('bag-grid');
        let html = "";
        for (let k in s.inv) {
            html += `<div class="bag-item" onclick="game.melt('${k}')">🏺 ${k}<b>x${s.inv[k]}</b></div>`;
        }
        bag.innerHTML = html || "<small style='grid-column: span 3; color:#555;'>儲物袋空</small>";
    }

    melt(k) {
        if (this.state.inv[k] > 0) {
            this.state.inv[k]--;
            if (this.state.inv[k] <= 0) delete this.state.inv[k];
            this.state.player.pts += 2;
            this.log(`🔥 熔煉 ${k} 獲得 2 感悟。`, "var(--color-info)");
            this.updateUI();
        }
    }

    upgrade() {
        const p = this.state.player;
        if (p.pts >= 5) {
            p.pts -= 5;
            p.lv += 1;
            p.atk += 30;
            p.hp += 100;
            p.curHp = p.hp;
            const fx = document.getElementById('breakthrough-fx');
            fx.style.animation = 'breakthrough-flash 0.8s forwards';
            setTimeout(() => { fx.style.animation = ''; }, 800);
            this.log(`🌟 晉升成功！當前為練氣期第 ${p.lv} 層！`, "var(--color-gold)");
            this.buildMapUI();
            this.updateUI();
        } else {
            this.log("❌ 感悟點不足 5 點。");
        }
    }

    buildMapUI() {
        const c = document.getElementById('map-list');
        c.innerHTML = "";
        this.maps.forEach((m, i) => {
            const b = document.createElement('button');
            const locked = this.state.player.lv < m.req;
            b.className = `map-btn ${i === this.curMapIdx ? 'active' : ''}`;
            b.innerHTML = locked ? `🔒 需${m.req}層` : m.name;
            b.onclick = () => {
                if (!locked) {
                    this.curMapIdx = i;
                    this.runtime.mob = null;
                    this.buildMapUI();
                    this.spawnMonster();
                } else {
                    this.log("⚠️ 境界未到，強行進入必死無疑！", "var(--color-danger)");
                }
            };
            c.appendChild(b);
        });
    }

    recruit() {
        const cost = 10 + this.state.sect.total * 8;
        if (this.state.res.stone >= cost) {
            this.state.res.stone -= cost;
            this.state.sect.total += 1;
            this.updateUI();
        } else {
            this.log("❌ 靈石不足。");
        }
    }

    assign(type, val) {
        const s = this.state.sect;
        const idle = s.total - s.woodD - s.stoneD;
        if (val > 0 && idle <= 0) return;
        if (type === 'wood' && s.woodD + val >= 0) s.woodD += val;
        if (type === 'stone' && s.stoneD + val >= 0) s.stoneD += val;
        this.updateUI();
    }

    log(msg, color) {
        const box = document.getElementById('log-box');
        const d = document.createElement('div');
        d.style.color = color || "#adbac7";
        d.innerHTML = `<span>[${new Date().toLocaleTimeString()}]</span> ${msg}`;
        box.prepend(d);
        if (box.children.length > 25) box.lastChild.remove();
    }

    meditate() {
        this.state.player.curHp = this.state.player.hp;
        this.log("🧘 運轉周天，真元全滿。", "var(--color-success)");
        this.updateUI();
    }

    toggleAuto() {
        this.runtime.auto = document.getElementById('auto-check').checked;
    }

    switchTab(idx, el) {
        const pages = document.querySelectorAll('.page');
        const btns = document.querySelectorAll('.nav-btn');
        pages.forEach(p => p.classList.remove('active'));
        btns.forEach(b => b.classList.remove('active'));
        document.getElementById('p' + idx).classList.add('active');
        if (el) el.classList.add('active');
    }
}

const game = new XianXiaGame();
</script>
