<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>練功修練 - V3.4.0 「萬象森羅：煉丹閣與天道循環」</title>
    
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/page_battle.css">
    <link rel="stylesheet" href="css/page_economy.css">
    <link rel="stylesheet" href="css/page_stats.css">
    <link rel="stylesheet" href="css/fx.css">
    <link rel="stylesheet" href="css/page_world.css">
    <link rel="stylesheet" href="css/page_sect.css"> 
    
    <style>
        .exp-full-glow {
            background: #fbbf24 !important;
            box-shadow: 0 0 15px #fbbf24, 0 0 30px rgba(251,191,36,0.5);
            animation: exp-pulse 1.5s infinite;
        }
        @keyframes exp-pulse {
            0% { filter: brightness(1); }
            50% { filter: brightness(1.4); }
            100% { filter: brightness(1); }
        }
    </style>
</head>
<body>
    <div id="skill-cut-in-layer" style="position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:9999; display:flex; align-items:center; justify-content:center; overflow:hidden;"></div>

    <header class="header-info">
        <div class="player-main-stats">
            <div id="player-realm" class="realm-title">感應天地中...</div>
            <div class="bars-stack">
                <div class="bar-container hp">
                    <div id="player-hp-fill" class="fill fill-hp" style="width: 100%;"></div>
                    <div class="bar-text">
                        <span id="player-hp-val">0</span> / <span id="player-hp-max">0</span>
                    </div>
                </div>
                <div class="bar-container exp">
                    <div id="exp-fill" class="fill fill-exp" style="width: 0%;"></div>
                    <div class="bar-text">EXP</div>
                </div>
            </div>
        </div>
        <div class="currency-display">靈石: <span id="player-coin">0</span></div>
    </header>

    <main id="game-container">
        <section id="page-battle" class="game-page active"></section>
        <section id="page-sect" class="game-page" style="display:none;"></section>
        <section id="page-world" class="game-page" style="display:none; flex-direction:column;"></section>
        <section id="page-stats" class="game-page" style="display:none;"></section>
        <section id="page-bag" class="game-page" style="display:none;"></section>
        <section id="page-shop" class="game-page" style="display:none;"></section>
    </main>

    <nav class="bottom-nav">
        <button class="nav-btn active" onclick="Core.switchPage('battle')">⚔️ 歷練</button>
        <button class="nav-btn" onclick="Core.switchPage('stats')">🧘‍♂️ 修為</button>
        <button class="nav-btn" onclick="Core.switchPage('bag')">🎒 儲物</button>
        <button class="nav-btn" onclick="Core.switchPage('shop')">🏪 坊市</button>
    </nav>

    <div id="float-nav-wrap">
        <button id="btn-jump-sect" class="fab-btn" onclick="Core.switchPage('sect')">
            <span class="fab-icon">⛩️</span><span class="fab-text">回宗門</span>
        </button>
        <button id="btn-jump-battle" class="fab-btn" style="display:none;" onclick="Core.switchPage('battle')">
            <span class="fab-icon">⚔️</span><span class="fab-text">去歷練</span>
        </button>
    </div>

    <div id="modal-map" class="modal-overlay" style="display:none;"></div>
    <div id="tribulation-overlay" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.9); z-index:10000; flex-direction:column; justify-content:center; align-items:center; color:white;"></div>

    <script type="module">
        // ==========================================
        // 1. 引入 工具類 (Utils) - 必須最先載入
        // ==========================================
        import { MessageCenter } from './utils/MessageCenter.js';
        import { FX } from './utils/fx.js';
        import { Formula } from './utils/Formula.js';

        // ==========================================
        // 2. 引入 系統類 (Systems) - 邏輯核心
        // ==========================================
        import { CombatEngine } from './systems/CombatEngine.js';
        import { SectSystem } from './systems/SectSystem.js';
        import { FarmSystem } from './systems/FarmSystem.js';
        import { MineSystem } from './systems/MineSystem.js';
        import { AlchemySystem } from './systems/AlchemySystem.js'; // 🌟 新增：煉丹閣大腦
        import { TribulationSystem } from './systems/TribulationSystem.js';
        import { TaskSystem } from './systems/TaskSystem.js';
        import { SectManager } from './systems/SectManager.js';

        // ==========================================
        // 3. 引入 介面類 (UI) - 渲染單元
        // ==========================================
        import { UI_Battle } from './ui/ui_battle.js';
        import { UI_Bag } from './ui/ui_bag.js';
        import { UI_Shop } from './ui/ui_shop.js';
        import { UI_Stats } from './ui/ui_stats.js';
        import { UI_World } from './ui/ui_world.js';
        import { UI_Sect } from './ui/ui_sect.js';
        import { UI_System } from './ui/ui_system.js';
        import { UI_Recruit } from './ui/ui_recruit.js';
        import { UI_Farm } from './ui/ui_farm.js';
        import { UI_Mine } from './ui/ui_mine.js';
        import { UI_Alchemy } from './ui/ui_alchemy.js'; // 🌟 新增：煉丹閣 UI

        // ==========================================
        // 4. 引入 核心與數據 (Core & Data)
        // ==========================================
        import { Core } from './core.js';
        import { DB } from './data/database.js';

        // ==========================================
        // 🌟 關鍵：將所有模組手動掛載至 window 🌟
        // 確保 core.js 與 HTML onclick 能夠精準抓取
        // ==========================================
        window.MessageCenter = MessageCenter;
        window.FX = FX;
        window.Formula = Formula;
        
        window.CombatEngine = CombatEngine;
        window.SectSystem = SectSystem;
        window.FarmSystem = FarmSystem;
        window.MineSystem = MineSystem;
        window.AlchemySystem = AlchemySystem; // 🌟 註冊煉丹閣大腦
        window.TribulationSystem = TribulationSystem;
        window.TaskSystem = TaskSystem;
        window.SectManager = SectManager;

        window.UI_Battle = UI_Battle;
        window.UI_Bag = UI_Bag;
        window.UI_Shop = UI_Shop;
        window.UI_Stats = UI_Stats;
        window.UI_World = UI_World;
        window.UI_Sect = UI_Sect;
        window.UI_System = UI_System;
        window.UI_Recruit = UI_Recruit;
        window.UI_Farm = UI_Farm;
        window.UI_Mine = UI_Mine;
        window.UI_Alchemy = UI_Alchemy; // 🌟 註冊煉丹閣 UI

        window.Core = Core;
        window.DB = DB;            
        window.DATA = DB; // 相容性別名

        // ==========================================
        // 5. 大陣啟動邏輯
        // ==========================================
        window.onload = () => {
            // 系統啟動日誌
            console.log("%c【系統】V3.4.0 萬象森羅：三大產業鏈與天道共鳴啟動！", "color: #fbbf24; font-weight: bold; font-size: 14px;");
            
            // 延遲初始化，確保所有 DOM 節點與全局對象已就緒
            setTimeout(() => {
                Core.init();
            }, 100);
        };

        // 開發者調試：逆轉時空
        window.DEBUG_RESET = () => {
            if (window.UI_System && window.UI_System.restartGame) {
                window.UI_System.restartGame();
            } else {
                if (confirm("⚠️ 確定要清除所有存檔重新開始嗎？")) {
                    localStorage.clear();
                    location.reload();
                }
            }
        };
    </script>
</body>
</html>
