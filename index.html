<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仙俠宗門 V1.6.2 - 逆天改命 · 宏大版</title>
    <style>
        /* --- 視覺美化：回歸深邃且充滿質感的仙境風格 --- */
        :root { 
            --primary-color: #a29bfe; 
            --background-dark: #0b0e14; 
            --card-background: #1c2128; 
            --text-main: #adbac7; 
            --text-gold: #ffcf40; 
            --color-danger: #f85149; 
            --color-success: #3fb950;
            --border-color: #444c56; 
        }

        * { box-sizing: border-box; margin: 0; padding: 0; touch-action: manipulation; }
        
        body { 
            background: var(--background-dark); 
            color: var(--text-main); 
            font-family: "PingFang TC", "Microsoft JhengHei", sans-serif; 
            display: flex; 
            justify-content: center; 
            height: 100vh; 
            overflow: hidden; 
        }
        
        #game-container { 
            width: 100%; 
            max-width: 500px; 
            height: 100%; 
            display: flex; 
            flex-direction: column; 
            border: 1px solid var(--border-color); 
            position: relative; 
            background: radial-gradient(circle at top, #1c2128 0%, #0b0e14 100%);
        }

        /* 頂部資源狀態列 */
        .status-header { 
            padding: 20px; 
            background: var(--card-background); 
            border-bottom: 2px solid var(--primary-color); 
            z-index: 100;
            box-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }
        .status-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .resource-tag { font-weight: bold; font-size: 14px; color: #fff; text-shadow: 0 0 5px var(--primary-color); }
        .realm-tag { color: var(--text-gold); font-size: 16px; font-weight: 800; letter-spacing: 1px; }

        /* 主舞台 */
        .game-main { flex: 1; overflow-y: auto; padding: 15px; padding-bottom: 120px; }
        .content-page { display: none; } 
        .content-page.active { display: block; animation: pageFadeIn 0.5s ease; }
        @keyframes pageFadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* 通用卡片設計 */
        .system-card { 
            background: var(--card-background); 
            padding: 20px; 
            border-radius: 18px; 
            margin-bottom: 20px; 
            border: 1px solid var(--border-color); 
            box-shadow: 0 10px 25px rgba(0,0,0,0.4);
        }
        .card-header { 
            font-size: 18px; 
            color: #fff; 
            margin-bottom: 15px; 
            border-left: 5px solid var(--primary-color); 
            padding-left: 12px; 
            font-weight: bold; 
            display: flex;
            justify-content: space-between;
        }

        /* 進度條組件 */
        .progress-container { 
            height: 22px; 
            background: rgba(0,0,0,0.6); 
            border-radius: 11px; 
            overflow: hidden; 
            border: 1px solid #333; 
            margin: 10px 0; 
            position: relative; 
        }
        .progress-fill { height: 100%; width: 0%; transition: width 0.3s ease; }
        .fill-hp { background: linear-gradient(90deg, #2ecc71, #27ae60); box-shadow: 0 0 10px rgba(46,204,113,0.3); }
        .fill-exp { background: linear-gradient(90deg, #a29bfe, #6c5ce7); }
        .fill-enemy { background: linear-gradient(90deg, #e74c3c, #c0392b); }
        .progress-text { 
            position: absolute; width: 100%; text-align: center; 
            font-size: 11px; line-height: 22px; color: #fff; font-weight: bold; 
            text-shadow: 1px 1px 2px #000; 
        }

        /* 詳細能力值網格 */
        .attribute-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .attribute-item { 
            background: rgba(0,0,0,0.2); 
            padding: 15px; 
            border-radius: 12px; 
            border: 1px solid rgba(162,155,254,0.1); 
        }
        .attr-label { font-size: 11px; color: #8b949e; display: block; margin-bottom: 5px; }
        .attr-value { font-size: 20px; font-weight: bold; color: var(--primary-color); }

        /* 突破專用視覺 */
        .breakthrough-alert { 
            background: linear-gradient(145deg, #2c210a, #1c2128); 
            border: 2px solid var(--text-gold); 
            animation: pulseGold 2s infinite;
        }
        @keyframes pulseGold { 
            0% { box-shadow: 0 0 5px rgba(255,207,64,0.2); } 
            50% { box-shadow: 0 0 20px rgba(255,207,64,0.5); } 
            100% { box-shadow: 0 0 5px rgba(255,207,64,0.2); } 
        }

        /* 按鈕設計 */
        .action-button { 
            background: linear-gradient(135deg, #a29bfe, #6c5ce7); 
            border: none; padding: 16px; color: #fff; 
            border-radius: 14px; width: 100%; 
            font-weight: bold; font-size: 16px; cursor: pointer; 
            box-shadow: 0 5px 15px rgba(108, 92, 231, 0.3);
            transition: 0.2s;
        }
        .action-button:active { transform: scale(0.97); }
        .button-break { background: linear-gradient(135deg, #ffcf40, #ff9f43); color: #000; }

        /* 導航列 */
        .bottom-nav { 
            position: absolute; bottom: 20px; left: 15px; right: 15px; 
            display: grid; grid-template-columns: repeat(4, 1fr); 
            background: var(--card-background); padding: 15px; border-radius: 25px; 
            border: 1px solid var(--border-color); box-shadow: 0 10px 30px rgba(0,0,0,0.8);
        }
        .nav-link { text-align: center; color: #8b949e; cursor: pointer; font-size: 12px; }
        .nav-link.active { color: var(--primary-color); font-weight: bold; }

        /* 日誌系統 */
        #combat-log { 
            height: 180px; overflow-y: auto; background: rgba(0,0,0,0.4); 
            padding: 15px; border-radius: 12px; font-size: 13px; 
            color: #adbac7; border: 1px solid var(--border-color); margin-top: 15px;
        }
        .log-line { margin-bottom: 6px; padding-left: 10px; border-left: 2px solid #444; }
    </style>
</head>
<body>

<div id="game-container">
    <div class="status-header">
        <div class="status-row">
            <div class="resource-group">
                <span class="resource-tag">🌲 靈木: <span id="display-wood">0</span></span>
                <span class="resource-tag" style="margin-left:15px;">💠 靈石: <span id="display-stone">0</span></span>
            </div>
            <div class="realm-tag">✨ <span id="display-realm">練氣期</span> <span id="display-level">1</span> 層</div>
        </div>
        <div class="progress-container" style="height: 6px; border:none; margin:0;">
            <div id="exp-bar-top" class="progress-fill fill-exp"></div>
        </div>
    </div>

    <div class="game-main">
        <div id="page-sect-1" class="content-page active">
            <div class="system-card" onclick="triggerManualWork('wood')">
                <div class="card-header">🪵 擷取千年靈木 <small style="font-size:10px; color:var(--primary-color)">點擊手動</small></div>
                <div class="progress-container">
                    <div id="progress-wood" class="progress-fill fill-exp"></div>
                    <div class="progress-text">採集進度</div>
                </div>
            </div>

            <div class="system-card" onclick="triggerManualWork('stone')">
                <div class="card-header">💎 開採地脈靈石 <small style="font-size:10px; color:var(--primary-color)">點擊手動</small></div>
                <div class="progress-container">
                    <div id="progress-stone" class="progress-fill fill-exp"></div>
                    <div class="progress-text">挖掘進度</div>
                </div>
            </div>

            <div id="breakthrough-area" style="display:none;" class="system-card breakthrough-alert">
                <div class="card-header" style="color:var(--text-gold)">⚡ 築基大劫 · 天道試煉</div>
                <p style="font-size:13px; line-height:1.6; margin-bottom:15px;">
                    您已達到練氣圓滿。前方是築基瓶頸，成功機率 40%。<br>
                    <span style="color:var(--color-danger)">⚠ 若失敗，修為將跌落至練氣 9 層！</span>
                </p>
                <button class="action-button button-break" onclick="executeBreakthrough()">耗費 50 靈石 · 逆天衝擊</button>
            </div>
        </div>

        <div id="page-sect-2" class="content-page">
            <div id="map-selection" style="display:flex; gap:10px; margin-bottom:15px; overflow-x:auto; padding-bottom:10px;">
                </div>
            
            <div class="system-card">
                <div class="card-header">⚔️ 戰鬥對峙</div>
                <div style="font-size:12px; margin-bottom:5px;">宗主氣血: <span id="player-hp-text">0/0</span></div>
                <div class="progress-container"><div id="player-hp-bar" class="progress-fill fill-hp"></div></div>
                
                <div style="font-size:12px; margin: 15px 0 5px 0;">妖獸: <span id="enemy-name">載入中</span> (<span id="enemy-hp-text">0/0</span>)</div>
                <div class="progress-container"><div id="enemy-hp-bar" class="progress-fill fill-enemy"></div></div>
                
                <button class="action-button" onclick="performAttack()">發動神通 斬除妖邪</button>
            </div>
            
            <div id="combat-log"></div>
        </div>

        <div id="page-sect-3" class="content-page">
            <div class="system-card">
                <div class="card-header">🧘 聖體修為 (潛能點: <span id="display-points">0</span>)</div>
                <div class="attribute-grid">
                    <div class="attribute-item">
                        <span class="attr-label">神威 (總攻擊)</span>
                        <span class="attr-value" id="stat-atk">0</span>
                    </div>
                    <div class="attribute-item">
                        <span class="attr-label">聖體 (總血量)</span>
                        <span class="attr-value" id="stat-mhp">0</span>
                    </div>
                    <div class="attribute-item">
                        <span class="attr-label">天運 (暴擊率)</span>
                        <span class="attr-value"><span id="stat-crit">0</span>%</span>
                    </div>
                    <div class="attribute-item">
                        <span class="attr-label">靈動 (閃避率)</span>
                        <span class="attr-value"><span id="stat-dex">0</span>%</span>
                    </div>
                </div>
                
                <div id="display-talent" style="margin-top:15px; color:var(--text-gold); font-weight:bold; font-size:13px;"></div>
                
                <div style="display:flex; gap:12px; margin-top:20px;">
                    <button class="action-button" style="margin:0; flex:1" onclick="spendPoint('str')">強化攻擊</button>
                    <button class="action-button" style="margin:0; flex:1" onclick="spendPoint('vit')">強化生命</button>
                </div>
            </div>

            <div class="system-card">
                <div class="card-header">💎 當前法寶</div>
                <div id="equipment-info" style="font-size:13px; line-height:1.8;"></div>
            </div>
        </div>

        <div id="page-sect-4" class="content-page">
            <div class="system-card">
                <div class="card-header">🎒 儲物空間</div>
                <div id="inventory-list" style="display:flex; flex-wrap:wrap; gap:8px;"></div>
            </div>
            <div class="system-card">
                <div class="card-header">🔥 乾坤煉器</div>
                <p style="font-size:12px; margin-bottom:15px;">消耗 15 靈石與 5 份材料，有機率煉出高階法寶。</p>
                <button class="action-button" onclick="startCrafting()">啟動煉器爐</button>
            </div>
        </div>
    </div>

    <div class="bottom-nav">
        <div class="nav-link active" onclick="switchTab(1, this)">宗門</div>
        <div class="nav-link" onclick="switchTab(2, this)">歷練</div>
        <div class="nav-link" onclick="switchTab(3, this)">能力</div>
        <div class="nav-link" onclick="switchTab(4, this)">儲物</div>
    </div>
</div>

<script>
/**
 * --- 核心數據結構 (完全展開，絕不簡短) ---
 */
let gameState = {
    woodAmount: 0,
    stoneAmount: 0,
    realmName: "練氣期",
    currentLevel: 1,
    currentExp: 0,
    potentialPoints: 0,
    
    // 基礎屬性
    baseAttack: 10,
    baseMaxHp: 100,
    currentHp: 100,
    critProbability: 5,
    dodgeProbability: 5,
    
    // 突破後獲得
    activeTalent: null,
    
    // 背包與裝備
    inventory: {},
    equipment: {
        weapon: { name: "木劍", attackBonus: 5 },
        armor: { name: "粗布長衫", hpBonus: 0 }
    },
    
    // 當前地圖索引
    selectedMapIndex: 0,
    lastAutoSave: Date.now()
};

const WORLD_MAPS = [
    { id: 0, name: "青翠草地", minLevel: 1, monster: "溫順野兔", mHp: 80, mAtk: 12, mExp: 45, drop: "兔肉" },
    { id: 1, name: "幽暗密林", minLevel: 5, monster: "凶殘灰狼", mHp: 480, mAtk: 46, mExp: 115, drop: "狼皮" },
    { id: 2, name: "荒廢古戰場", minLevel: 10, monster: "怨念枯骨", mHp: 1500, mAtk: 130, mExp: 260, drop: "碎骨" }
];

let activeMonster = null;
let manualWorkType = null;
let manualWorkProgress = 0;
let lastTickTime = Date.now();

/**
 * --- 初始化宗門 ---
 */
function initSect() {
    loadSavedData();
    refreshMonster();
    requestAnimationFrame(mainGameLoop);
}

/**
 * --- 主循環 (不縮水，邏輯清晰) ---
 */
function mainGameLoop() {
    const currentTime = Date.now();
    const deltaTime = (currentTime - lastTickTime) / 1000;
    lastTickTime = currentTime;

    // 手動採集邏輯處理
    if (manualWorkType) {
        manualWorkProgress += deltaTime * 100; // 1秒採集一次
        const progressBar = document.getElementById(`progress-${manualWorkType}`);
        if (progressBar) progressBar.style.width = Math.min(100, manualWorkProgress) + "%";
        
        if (manualWorkProgress >= 100) {
            handleWorkCompletion();
        }
    }

    renderGameUI();
    
    // 每 5 秒自動保存
    if (currentTime - gameState.lastAutoSave > 5000) {
        performSave();
        gameState.lastAutoSave = currentTime;
    }
    
    requestAnimationFrame(mainGameLoop);
}

/**
 * --- UI 渲染中心 ---
 */
function renderGameUI() {
    // 更新資源
    document.getElementById('display-wood').innerText = Math.floor(gameState.woodAmount);
    document.getElementById('display-stone').innerText = Math.floor(gameState.stoneAmount);
    document.getElementById('display-realm').innerText = gameState.realmName;
    document.getElementById('display-level').innerText = gameState.currentLevel;
    document.getElementById('display-points').innerText = gameState.potentialPoints;

    // 經驗條
    const expNeeded = gameState.currentLevel * 200;
    document.getElementById('exp-bar-top').style.width = (gameState.currentExp / expNeeded * 100) + "%";

    // 詳細能力計算
    let totalAttack = gameState.baseAttack + gameState.equipment.weapon.attackBonus;
    let totalMaxHp = gameState.baseMaxHp + gameState.equipment.armor.hpBonus;
    
    // 天賦加成應用
    if (gameState.activeTalent === "劍修聖體") totalAttack = Math.floor(totalAttack * 1.25);
    if (gameState.activeTalent === "不滅金身") totalMaxHp = Math.floor(totalMaxHp * 1.25);
    
    document.getElementById('stat-atk').innerText = totalAttack;
    document.getElementById('stat-mhp').innerText = totalMaxHp;
    document.getElementById('stat-crit').innerText = gameState.critProbability.toFixed(1);
    document.getElementById('stat-dex').innerText = gameState.dodgeProbability.toFixed(1);
    document.getElementById('display-talent').innerText = gameState.activeTalent ? "✨ 覺醒特質：" + gameState.activeTalent : "";

    // 戰鬥狀態渲染
    document.getElementById('player-hp-text').innerText = `${Math.ceil(gameState.currentHp)} / ${totalMaxHp}`;
    document.getElementById('player-hp-bar').style.width = (gameState.currentHp / totalMaxHp * 100) + "%";

    if (activeMonster) {
        document.getElementById('enemy-name').innerText = activeMonster.name;
        document.getElementById('enemy-hp-text').innerText = `${Math.ceil(activeMonster.hp)} / ${activeMonster.maxHp}`;
        document.getElementById('enemy-hp-bar').style.width = (activeMonster.hp / activeMonster.maxHp * 100) + "%";
    }

    // 突破面板邏輯 (練氣10層滿經驗時顯示)
    const breakthroughPanel = document.getElementById('breakthrough-area');
    if (gameState.realmName === "練氣期" && gameState.currentLevel === 10 && gameState.currentExp >= expNeeded) {
        breakthroughPanel.style.display = "block";
    } else {
        breakthroughPanel.style.display = "none";
    }

    // 渲染儲物袋
    let invHtml = "";
    for (let itemKey in gameState.inventory) {
        if (gameState.inventory[itemKey] > 0) {
            invHtml += `<div class="attribute-item" style="padding:8px 12px; font-size:12px;">${itemKey} x${gameState.inventory[itemKey]}</div>`;
        }
    }
    document.getElementById('inventory-list').innerHTML = invHtml || "<small>儲物袋是空的</small>";

    // 渲染地圖
    renderMapCards();
}

/**
 * --- 核心交互邏輯 ---
 */

function triggerManualWork(type) {
    if (!manualWorkType) {
        manualWorkType = type;
        manualWorkProgress = 0;
    }
}

function handleWorkCompletion() {
    if (manualWorkType === 'wood') {
        gameState.woodAmount += 5;
        appendLog("🌲 採集到一份靈木精華。");
    } else {
        gameState.stoneAmount += 2;
        appendLog("💠 挖掘出一枚下品靈石。");
    }
    manualWorkType = null;
}

function performAttack() {
    if (!activeMonster) refreshMonster();
    
    let totalAttack = gameState.baseAttack + gameState.equipment.weapon.attackBonus;
    if (gameState.activeTalent === "劍修聖體") totalAttack = Math.floor(totalAttack * 1.25);
    
    // 境界威壓計算：怪物等級高於玩家時，每差一級減少 5% 命中與暴擊
    const levelDifference = activeMonster.levelRequirement - gameState.currentLevel;
    const suppressionPenalty = levelDifference > 0 ? levelDifference * 5 : 0;
    const finalCritRate = (gameState.critProbability + (gameState.activeTalent === "天命之人" ? 10 : 0)) - suppressionPenalty;

    // 1. 玩家回合
    if (Math.random() * 100 > suppressionPenalty) {
        let damageDealt = Math.floor(totalAttack * (0.8 + Math.random() * 0.4));
        if (Math.random() * 100 < finalCritRate) {
            damageDealt *= 2;
            appendLog(`💥 暴擊！你對 ${activeMonster.name} 造成 ${damageDealt} 點傷害！`);
        } else {
            appendLog(`⚔️ 你對 ${activeMonster.name} 造成 ${damageDealt} 點傷害。`);
        }
        activeMonster.hp -= damageDealt;
    } else {
        appendLog(`💨 境界威壓！你的攻擊被 ${activeMonster.name} 輕易化解。`);
    }

    // 2. 怪物反擊 (玩家若未擊殺怪物)
    if (activeMonster.hp > 0) {
        if (Math.random() * 100 > gameState.dodgeProbability) {
            let monsterDamage = Math.ceil(activeMonster.atk * (0.9 + Math.random() * 0.3));
            gameState.currentHp -= monsterDamage;
            appendLog(`🩸 你被反擊，受到 ${monsterDamage} 點傷害。`);
        } else {
            appendLog(`💨 你靈動一閃，避開了攻擊。`);
        }
    }

    // 3. 結局判定
    handleCombatResult();
}

function handleCombatResult() {
    const maxHp = gameState.baseMaxHp + gameState.equipment.armor.hpBonus;
    
    if (gameState.currentHp <= 0) {
        gameState.currentHp = Math.floor(maxHp * 0.5); // 撤退回一半血
        appendLog("😫 戰敗！你勉強逃回宗門療傷。");
        switchTab(1, document.querySelectorAll('.nav-link')[0]);
    } else if (activeMonster.hp <= 0) {
        appendLog(`✅ 成功斬殺 ${activeMonster.name}！獲得經驗 ${activeMonster.exp}。`);
        gameState.currentExp += activeMonster.exp;
        gameState.inventory[activeMonster.drop] = (gameState.inventory[activeMonster.drop] || 0) + 1;
        checkLevelUpgrade();
        refreshMonster();
    }
}

function executeBreakthrough() {
    if (gameState.stoneAmount < 50) return appendLog("❌ 靈石不足 50，無法啟動護法大陣！");
    gameState.stoneAmount -= 50;
    
    // 突破機率 40%
    if (Math.random() * 100 < 40) {
        gameState.realmName = "築基期";
        gameState.currentLevel = 1;
        gameState.currentExp = 0;
        gameState.potentialPoints += 20;
        
        // 隨機覺醒聖體
        const talents = ["劍修聖體", "不滅金身", "天命之人"];
        gameState.activeTalent = talents[Math.floor(Math.random() * talents.length)];
        
        appendLog(`🎊 【天地震動】逆天突破成功！您已晉升築基期，覺醒【${gameState.activeTalent}】！`);
        gameState.currentHp = gameState.baseMaxHp + gameState.equipment.armor.hpBonus;
    } else {
        gameState.currentLevel = 9;
        gameState.currentExp = 0;
        appendLog("💀 【突破失敗】天雷轟頂！您的修為受損，跌落至練氣 9 層...");
    }
}

function checkLevelUpgrade() {
    const expNeeded = gameState.currentLevel * 200;
    // 只有在練氣期小於10層，或是已經是築基期時才能透過經驗升級
    if (gameState.currentExp >= expNeeded && (gameState.realmName === "築基期" || gameState.currentLevel < 10)) {
        gameState.currentExp -= expNeeded;
        gameState.currentLevel++;
        gameState.potentialPoints += 5;
        gameState.currentHp = gameState.baseMaxHp + gameState.equipment.armor.hpBonus;
        appendLog(`🌟 突破！晉升至 ${gameState.realmName} ${gameState.currentLevel} 層。`);
    }
}

function spendPoint(type) {
    if (gameState.potentialPoints <= 0) return;
    
    if (type === 'str') {
        gameState.baseAttack += 6;
        // 暴擊率收益遞減：越接近 50% 提升越慢
        gameState.critProbability = Math.min(50, gameState.critProbability + (50 - gameState.critProbability) * 0.05);
        appendLog("🧘 淬煉神魂，攻擊與暴擊提升。");
    } else {
        gameState.baseMaxHp += 120;
        // 閃避率收益遞減：越接近 75% 提升越慢
        gameState.dodgeProbability = Math.min(75, gameState.dodgeProbability + (75 - gameState.dodgeProbability) * 0.05);
        gameState.currentHp = gameState.baseMaxHp + gameState.equipment.armor.hpBonus;
        appendLog("🧘 鍛造聖體，血量與閃避提升。");
    }
    gameState.potentialPoints--;
}

function renderMapCards() {
    let html = "";
    WORLD_MAPS.forEach((map, index) => {
        const isLocked = gameState.realmName === "練氣期" && gameState.currentLevel < map.minLevel;
        html += `
            <div class="attribute-item" style="min-width:110px; opacity:${isLocked ? 0.4 : 1}; cursor:pointer; border:${gameState.selectedMapIndex === index ? '1px solid var(--primary-color)' : '1px solid var(--border-color)'}"
                 onclick="${isLocked ? `appendLog('🔒 等級不足！需練氣 ${map.minLevel} 層方可進入。')` : `selectLocation(${index})`}">
                <b style="color:#fff">${map.name}</b><br>
                <small>${isLocked ? '尚未開啟' : map.monster}</small>
            </div>
        `;
    });
    document.getElementById('map-selection').innerHTML = html;
}

function selectLocation(index) {
    gameState.selectedMapIndex = index;
    refreshMonster();
    appendLog(`🚩 已前往地圖：${WORLD_MAPS[index].name}`);
}

function refreshMonster() {
    const data = WORLD_MAPS[gameState.selectedMapIndex];
    activeMonster = {
        name: data.monster,
        hp: data.mHp,
        maxHp: data.mHp,
        atk: data.mAtk,
        exp: data.mExp,
        drop: data.drop,
        levelRequirement: data.minLevel
    };
}

function appendLog(msg) {
    const logBox = document.getElementById('combat-log');
    const line = document.createElement('div');
    line.className = "log-line";
    line.innerText = "> " + msg;
    logBox.prepend(line);
    if (logBox.children.length > 20) logBox.lastChild.remove();
}

function switchTab(idx, element) {
    document.querySelectorAll('.content-page').forEach(p => p.classList.remove('active'));
    document.getElementById('page-sect-' + idx).classList.add('active');
    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
    element.classList.add('active');
}

function performSave() {
    localStorage.setItem('SectMaster_Final_V1.6.2', JSON.stringify(gameState));
}

function loadSavedData() {
    const data = localStorage.getItem('SectMaster_Final_V1.6.2');
    if (data) {
        gameState = { ...gameState, ...JSON.parse(data) };
        appendLog("📜 識海清明，修為已成功對接。");
    }
}

// 啟動宗門
initSect();
</script>
</body>
</html>
