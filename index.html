<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仙俠宗門 V1.6.4 - 掌門調度版</title>
    <style>
        /* 繼承 V1.6.3 所有樣式，僅新增 V1.6.4 必要視覺 */
        :root {
            --color-primary: #a29bfe; --color-primary-dark: #6c5ce7;
            --color-bg-deep: #0b0e14; --color-card-bg: rgba(28, 33, 40, 0.95);
            --color-text-main: #adbac7; --color-gold: #ffcf40;
            --color-danger: #f85149; --color-success: #3fb950;
            --color-border: #444c56;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: "PingFang TC", sans-serif; }
        body { background: #000; color: var(--color-text-main); height: 100vh; display: flex; justify-content: center; overflow: hidden; }
        #app { width: 100%; max-width: 500px; height: 100%; background: radial-gradient(circle at top, #1a1c2c 0%, #0b0e14 100%); display: flex; flex-direction: column; position: relative; border: 1px solid var(--color-border); }

        header { padding: 20px; background: rgba(28, 33, 40, 0.9); border-bottom: 2px solid var(--color-primary); z-index: 100; }
        .res-row { display: flex; gap: 10px; margin-bottom: 10px; }
        .res-item { background: rgba(0,0,0,0.5); padding: 5px 12px; border-radius: 15px; font-size: 13px; border: 1px solid var(--color-border); color: #fff; }
        .realm-tag { color: var(--color-gold); font-size: 20px; font-weight: 900; }
        .exp-bar { height: 6px; background: #222; border-radius: 3px; margin-top: 10px; overflow: hidden; border: 1px solid #333; }
        .exp-fill { height: 100%; width: 0%; background: var(--color-primary); transition: width 0.5s; }

        .stage { flex: 1; overflow-y: auto; padding: 20px; padding-bottom: 120px; }
        .page { display: none; animation: fadeIn 0.4s ease; }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .card { background: var(--color-card-bg); border-radius: 20px; padding: 20px; margin-bottom: 20px; border: 1px solid var(--color-border); position: relative; }
        .card-title { font-size: 16px; font-weight: bold; margin-bottom: 15px; color: #fff; display: flex; align-items: center; gap: 8px; }
        .card-title::before { content: ''; width: 4px; height: 16px; background: var(--color-primary); }

        /* V1.6.4 新增：弟子調度 UI */
        .dispatch-box { background: rgba(0,0,0,0.4); padding: 12px; border-radius: 12px; margin-top: 10px; border: 1px dashed var(--color-border); }
        .dispatch-row { display: flex; justify-content: space-between; align-items: center; margin: 8px 0; }
        .ctrl-btn { width: 28px; height: 28px; border-radius: 50%; border: 1px solid var(--color-primary); background: none; color: #fff; cursor: pointer; transition: 0.2s; }
        .ctrl-btn:active { background: var(--color-primary); }
        .ctrl-btn:disabled { opacity: 0.3; border-color: #666; }

        /* V1.6.4 新增：地圖鎖定狀態 */
        .map-btn { padding: 8px 12px; border-radius: 10px; border: 1px solid var(--color-border); background: #1c2128; color: #888; cursor: pointer; font-size: 12px; }
        .map-btn.active { border-color: var(--color-primary); color: var(--color-primary); box-shadow: 0 0 10px rgba(162, 155, 254, 0.3); }
        .map-btn.locked { opacity: 0.4; cursor: not-allowed; text-decoration: line-through; }

        .p-wrap { height: 10px; background: rgba(0,0,0,0.6); border-radius: 5px; overflow: hidden; margin: 10px 0; }
        .p-fill { height: 100%; width: 0%; transition: width 0.1s linear; }

        #status-bar { position: absolute; bottom: 100px; width: 100%; padding: 5px 20px; font-size: 11px; color: var(--color-primary); background: rgba(0,0,0,0.7); z-index: 50; }
        nav { position: absolute; bottom: 20px; left: 15px; right: 15px; height: 70px; background: rgba(28, 33, 40, 0.98); border-radius: 35px; display: flex; justify-content: space-around; align-items: center; border: 1px solid var(--color-border); z-index: 200; }
        .nav-btn { color: #666; cursor: pointer; text-align: center; }
        .nav-btn.active { color: var(--color-primary); }
        .nav-btn span { display: block; font-size: 20px; }

        #log-box { height: 180px; overflow-y: auto; background: rgba(0,0,0,0.4); border-radius: 15px; padding: 15px; font-size: 12px; border: 1px solid #333; line-height: 1.8; }
        .fly-text { position: fixed; pointer-events: none; animation: flyUp 1s forwards; font-weight: 900; z-index: 1000; }
        @keyframes flyUp { from { transform: translateY(0); opacity: 1; } to { transform: translateY(-60px); opacity: 0; } }

        /* 受擊震動特效 */
        .shake { animation: shake 0.2s; }
        @keyframes shake { 0%, 100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }
    </style>
</head>
<body>

<div id="app">
    <header>
        <div class="res-row">
            <div class="res-item">🪵 <span id="val-wood">0</span></div>
            <div class="res-item">💠 <span id="val-stone">0</span></div>
            <div class="res-item" id="tag-d" style="border-color:var(--color-gold)">👥 <span id="val-d-idle">0</span>/<span id="val-d-total">0</span></div>
        </div>
        <div class="realm-area">
            <div><span class="realm-tag" id="val-realm">練氣期</span> <small id="val-lv">1</small></div>
            <div style="text-align:right"><small>戰力</small> <b id="val-power" style="color:var(--color-primary)">0</b></div>
        </div>
        <div class="exp-bar"><div id="val-exp-fill" class="exp-fill"></div></div>
    </header>

    <div id="status-bar"><span id="st-map">🌿 青翠山腳</span> | <span id="st-info">靈氣平穩...</span></div>

    <main class="stage">
        <div id="p1" class="page active">
            <div class="card">
                <div class="card-title">👥 弟子調度中心</div>
                <div class="dispatch-box">
                    <div class="dispatch-row">
                        <span>🌲 靈木砍伐 (<span id="d-wood">0</span>人)</span>
                        <div>
                            <button class="ctrl-btn" onclick="assign('wood', -1)">-</button>
                            <button class="ctrl-btn" onclick="assign('wood', 1)">+</button>
                        </div>
                    </div>
                    <div class="dispatch-row">
                        <span>💠 靈石挖掘 (<span id="d-stone">0</span>人)</span>
                        <div>
                            <button class="ctrl-btn" onclick="assign('stone', -1)">-</button>
                            <button class="ctrl-btn" onclick="assign('stone', 1)">+</button>
                        </div>
                    </div>
                </div>
                <button id="btn-recruit" class="map-btn" style="width:100%; margin-top:15px; color:#fff" onclick="recruit()">招募弟子 (需 <span id="d-cost">10</span> 靈石)</button>
            </div>

            <div class="card" onclick="manualWork('wood', event)">
                <div class="card-title">🪵 手工採集靈木</div>
                <div class="p-wrap"><div id="bar-wood" class="p-fill" style="background:var(--color-success)"></div></div>
            </div>

            <div id="ui-break" class="card" style="display:none; border:2px solid var(--color-gold)">
                <button class="map-btn" style="width:100%; background:var(--color-gold); color:#000; font-weight:bold;" onclick="breakthrough()">衝擊築基雷劫</button>
            </div>
        </div>

        <div id="p2" class="page">
            <div id="map-tabs" style="display:flex; gap:10px; margin-bottom:15px; overflow-x:auto;"></div>
            <div class="card" id="mob-card">
                <div class="card-title">⚔️ <span id="m-name">怪物</span> <small id="m-lv-tag" style="margin-left:auto"></small></div>
                <div class="p-wrap"><div id="m-hp-bar" class="p-fill" style="background:var(--color-danger)"></div></div>
                <div style="font-size:11px; margin-bottom:20px;">血量: <span id="m-hp-txt">0</span></div>
                
                <div class="p-wrap"><div id="p-hp-bar" class="p-fill" style="background:var(--color-success)"></div></div>
                <div style="font-size:11px;">你的血量: <span id="p-hp-txt">0</span></div>
                
                <button class="map-btn" style="width:100%; height:45px; background:var(--color-primary); color:#fff; margin-top:10px; font-weight:bold;" onclick="attack(event)">發動攻擊</button>
            </div>
            <div id="log-box"></div>
        </div>

        <div id="p3" class="page">
            <div class="card">
                <div class="card-title">🧘 修為星盤 <small style="margin-left:auto">潛能點: <span id="val-pts">0</span></small></div>
                <div style="margin-bottom:15px;">
                    <div style="display:flex; justify-content:space-between;"><b>⚔️ 總攻擊力</b> <b id="st-atk-total" style="color:var(--color-primary)">0</b></div>
                    <div style="font-size:11px; color:#888;">基礎: <span id="st-atk-base">0</span> | 裝備: +<span id="st-atk-eq">0</span> <span id="st-atk-buff"></span></div>
                    <button class="map-btn" style="width:100%; margin-top:8px;" onclick="upgrade('atk')">提升攻擊</button>
                </div>
                <div>
                    <div style="display:flex; justify-content:space-between;"><b>❤️ 總生命值</b> <b id="st-hp-total" style="color:var(--color-success)">0</b></div>
                    <div style="font-size:11px; color:#888;">基礎: <span id="st-hp-base">0</span> | 裝備: +<span id="st-hp-eq">0</span> <span id="st-hp-buff"></span></div>
                    <button class="map-btn" style="width:100%; margin-top:8px;" onclick="upgrade('hp')">提升生命</button>
                </div>
            </div>
            <div class="card">
                <div class="card-title">🛡️ 配備：<span id="eq-w">無</span> / <span id="eq-a">無</span></div>
                <div id="val-talent" style="color:var(--color-gold); font-size:12px;"></div>
            </div>
        </div>

        <div id="p4" class="page">
            <div class="card">
                <div class="card-title">🎒 儲物袋</div>
                <div id="bag-grid" style="display:grid; grid-template-columns:repeat(3, 1fr); gap:8px;"></div>
            </div>
            <div class="card">
                <div class="card-title">🔥 乾坤煉器</div>
                <p style="font-size:11px; margin-bottom:10px;">需 15靈石 + 5素材。煉成裝備將放入儲物袋。</p>
                <button id="btn-craft" class="map-btn" style="width:100%; background:var(--color-primary); color:#fff" onclick="craft()">開始煉製</button>
            </div>
        </div>
    </main>

    <nav>
        <div class="nav-btn active" onclick="tab(1, this)"><span>⛩️</span>宗門</div>
        <div class="nav-btn" onclick="tab(2, this)"><span>⚔️</span>歷練</div>
        <div class="nav-btn" onclick="tab(3, this)"><span>🧘</span>星盤</div>
        <div class="nav-btn" onclick="tab(4, this)"><span>🎒</span>儲物</div>
    </nav>
</div>

<script>
// --- [守靈魂] 核心變數 (繼承 V1.6.3) ---
let wood = 0, stone = 0, totalD = 0, dWood = 0, dStone = 0;
let realm = "練氣期", lv = 1, exp = 0, pts = 0;
let bAtk = 10, bHp = 100, curHp = 100, talent = null;
let inv = {}, eqW = {n:"鏽鐵劍", v:5}, eqA = {n:"粗布衣", v:0};
const MAPS = [
    {n:"🌿 青翠山腳", req:1, mob:"野犬", hp:60, atk:8, exp:40, d:"犬牙"},
    {n:"🐍 幽暗密林", req:5, mob:"幻影蟒", hp:400, atk:45, exp:150, d:"蟒皮"},
    {n:"🔥 熔岩地獄", req:10, mob:"地獄火鬼", hp:1500, atk:180, exp:500, d:"火晶"}
];
let curMap = 0, activeMob = null, workP = 0, curW = null;

function init() {
    load();
    spawn();
    tick();
    log("🌌 V1.6.4 大陣啟動：弟子調度與換裝系統已就位。", "gold");
}

function tick() {
    const now = Date.now();
    if(!window.lT) window.lT = now;
    if(now - window.lT >= 5000) { // 自動產出
        if(dWood > 0) { wood += dWood * 2; fly(100, 100, `+${dWood*2}`, "#55efc4"); }
        if(dStone > 0) { stone += dStone * 1; fly(200, 100, `+${dStone}`, "#00cec9"); }
        window.lT = now;
    }
    if(curW) {
        workP += 5; document.getElementById('bar-wood').style.width = workP+"%";
        if(workP>=100) { wood += 5; workP=0; curW=null; fly(250, 400, "+5", "#fff"); }
    }
    updateUI();
    requestAnimationFrame(tick);
}

function updateUI() {
    document.getElementById('val-wood').innerText = Math.floor(wood);
    document.getElementById('val-stone').innerText = Math.floor(stone);
    document.getElementById('val-d-idle').innerText = totalD - dWood - dStone;
    document.getElementById('val-d-total').innerText = totalD;
    document.getElementById('d-wood').innerText = dWood;
    document.getElementById('d-stone').innerText = dStone;
    document.getElementById('val-realm').innerText = realm;
    document.getElementById('val-lv').innerText = `第 ${lv} 層`;
    document.getElementById('d-cost').innerText = 10 + totalD*5;

    let tAtk = bAtk + eqW.v; if(talent=="劍尊") tAtk = Math.floor(tAtk*1.3);
    let tHp = bHp + eqA.v; if(talent=="金身") tHp = Math.floor(tHp*1.4);
    document.getElementById('val-power').innerText = tAtk*2 + tHp;

    // 星盤透明化 (V1.6.4 新增)
    document.getElementById('st-atk-total').innerText = tAtk;
    document.getElementById('st-atk-base').innerText = bAtk;
    document.getElementById('st-atk-eq').innerText = eqW.v;
    document.getElementById('st-atk-buff').innerText = talent=="劍尊"?"(天賦+30%)":"";
    document.getElementById('st-hp-total').innerText = tHp;
    document.getElementById('st-hp-base').innerText = bHp;
    document.getElementById('st-hp-eq').innerText = eqA.v;
    document.getElementById('st-hp-buff').innerText = talent=="金身"?"(天賦+40%)":"";
    document.getElementById('val-pts').innerText = pts;
    document.getElementById('eq-w').innerText = eqW.n;
    document.getElementById('eq-a').innerText = eqA.n;
    document.getElementById('val-talent').innerText = talent ? `✨ 已覺醒天賦：${talent}` : "";

    // 戰鬥 UI
    document.getElementById('p-hp-txt').innerText = `${Math.ceil(curHp)}/${tHp}`;
    document.getElementById('p-hp-bar').style.width = (curHp/tHp*100)+"%";
    if(activeMob) {
        document.getElementById('m-name').innerText = activeMob.n;
        document.getElementById('m-lv-tag').innerText = `LV.${activeMob.req}`;
        document.getElementById('m-hp-txt').innerText = `${activeMob.hp}/${activeMob.mH}`;
        document.getElementById('m-hp-bar').style.width = (activeMob.hp/activeMob.mH*100)+"%";
    }

    let req = lv*200;
    document.getElementById('val-exp-fill').style.width = (exp/req*100)+"%";
    document.getElementById('ui-break').style.display = (realm=="練氣期" && lv==10 && exp>=req)?"block":"none";

    renderMapList();
    renderInventory();
}

function assign(type, val) {
    let idle = totalD - dWood - dStone;
    if(val > 0 && idle <= 0) return;
    if(type=='wood') { if(val<0 && dWood<=0) return; dWood += val; }
    else { if(val<0 && dStone<=0) return; dStone += val; }
}

function attack(e) {
    let tAtk = bAtk + eqW.v; if(talent=="劍尊") tAtk = Math.floor(tAtk*1.3);
    let dmg = Math.floor(tAtk * (0.9+Math.random()*0.2));
    activeMob.hp -= dmg; fly(e.clientX, e.clientY, `-${dmg}`, "#fff");
    log(`⚔️ 你施展法術，對 ${activeMob.n} 造成 ${dmg} 傷害`);

    // 怪物反擊與震動 (V1.6.4 新增)
    setTimeout(() => {
        if(activeMob.hp > 0) {
            let mDmg = Math.max(1, activeMob.atk - lv*2);
            curHp -= mDmg; 
            document.getElementById('mob-card').classList.add('shake');
            setTimeout(()=>document.getElementById('mob-card').classList.remove('shake'), 200);
            log(`🩸 ${activeMob.n} 反擊，你受創 ${mDmg}`, "dmg");
            if(curHp<=0) die();
        } else {
            log(`✅ 擊殺成功！獲得 ${activeMob.exp} 經驗。`, "gold");
            exp += activeMob.exp; inv[activeMob.d] = (inv[activeMob.d]||0)+1;
            checkLv(); spawn();
        }
    }, 200);
}

function die() {
    log("💀 鬥法失敗！逃回宗門療養...", "dmg");
    let tHp = bHp + eqA.v; if(talent=="金身") tHp = Math.floor(tHp*1.4);
    curHp = tHp; // V1.6.4 修正：重生滿血
    log("✨ 宗門大陣運轉，你的傷勢已痊癒！");
    spawn(); 
    tab(1, document.querySelectorAll('.nav-btn')[0]);
}

function spawn() {
    let m = MAPS[curMap];
    activeMob = { n:m.mob, mH:m.hp+lv*20, hp:m.hp+lv*20, atk:m.atk+lv*5, exp:m.exp, d:m.d, req:m.req };
    document.getElementById('st-map').innerText = m.n;
}

function renderMapList() {
    let h = "";
    MAPS.forEach((m, i) => {
        let locked = (m.req > lv && realm=="練氣期");
        h += `<button class="map-btn ${curMap==i?'active':''} ${locked?'locked':''}" onclick="goMap(${i})">
                ${locked?'🔒 ':''}${m.n} (LV.${m.req})
              </button>`;
    });
    document.getElementById('map-tabs').innerHTML = h;
}

function goMap(i) {
    if(MAPS[i].req > lv && realm=="練氣期") { log(`❌ 修為不足，需達到第 ${MAPS[i].req} 層！`, "dmg"); return; }
    curMap = i; spawn();
}

function craft() {
    if(stone < 15) return;
    let keys = Object.keys(inv).filter(k=>inv[k]>0);
    if(keys.length == 0) { log("❌ 儲物袋中沒有素材可以煉器！", "dmg"); return; }
    stone -= 15; inv[keys[0]]--;
    let isW = Math.random() > 0.5;
    let newItem;
    if(isW) {
        newItem = {type:'weapon', n:"星辰寶劍", v:30+lv*5, d:"劍尖閃爍著星光。"};
    } else {
        newItem = {type:'armor', n:"金蠶軟甲", v:250+lv*20, d:"刀槍不入的防護服。"};
    }
    // V1.6.4 修正：煉成入庫而非覆蓋
    let itemName = newItem.n + (Math.random()*100).toFixed(0);
    inv[itemName] = { ...newItem, isEquip: true };
    log(`🔥 煉成成功！[${newItem.n}] 已放入儲物袋。`, "gold");
}

function equip(name) {
    let item = inv[name];
    if(!item || !item.isEquip) return;
    if(item.type == 'weapon') {
        let old = { ...eqW, isEquip: true };
        inv[old.n] = old; // 退回舊的
        eqW = { n: item.n, v: item.v, d: item.d };
    } else {
        let old = { ...eqA, isEquip: true };
        inv[old.n] = old;
        eqA = { n: item.n, v: item.v, d: item.d };
    }
    delete inv[name]; // 穿上後移除
    log(`🛡️ 裝備成功：${item.n}`);
}

function recruit() {
    let cost = 10 + totalD*5;
    if(stone < cost) return;
    stone -= cost; totalD++;
    log("👥 成功招收一名新弟子。");
}

function upgrade(t) {
    if(pts <= 0) return;
    if(t=='atk') bAtk += 5; else bHp += 50;
    pts--;
}

function breakthrough() {
    stone -= 50;
    if(Math.random() < 0.4) {
        realm = "築基期"; lv = 1; exp = 0; pts += 20;
        talent = Math.random() > 0.5 ? "劍尊" : "金身";
        log(`🎊 成功晉升築基！覺醒天賦：${talent}`, "gold");
    } else {
        // V1.6.4 修正：失敗懲罰優化，不扣回 9 層，而是清空當前經驗並扣錢
        exp = 0; stone = Math.floor(stone * 0.5);
        log("💀 突破失敗！靈氣反噬，經驗已清空且損失一半靈石。", "dmg");
    }
}

function renderInventory() {
    let h = "";
    for(let k in inv) {
        if(typeof inv[k] === 'object') {
            h += `<div class="res-item" style="border-color:var(--color-gold); text-align:center;" onclick="equip('${k}')">
                    ${inv[k].n}<br><small>穿上</small>
                  </div>`;
        } else if(inv[k] > 0) {
            h += `<div class="res-item" style="text-align:center;">${k}<br>x${inv[k]}</div>`;
        }
    }
    document.getElementById('bag-grid').innerHTML = h;
}

function checkLv() {
    let req = lv*200;
    if(exp>=req && (lv<10 || realm=="築基期")) { exp-=req; lv++; pts+=5; log(`🌟 突破至第 ${lv} 層！`); }
}

function log(m, t) {
    let b = document.getElementById('log-box');
    let d = document.createElement('div');
    d.innerHTML = "◈ " + m;
    if(t=="gold") d.style.color="var(--color-gold)";
    if(t=="dmg") d.style.color="var(--color-danger)";
    b.prepend(d);
}

function tab(p, el) {
    document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(x=>x.classList.remove('active'));
    document.getElementById('p'+p).classList.add('active'); el.classList.add('active');
}

function manualWork(t, e) { if(curW) return; curW=t; workP=0; }
function fly(x, y, t, c) {
    let e = document.createElement('div'); e.className='fly-text';
    e.innerText=t; e.style.left=x+'px'; e.style.top=y+'px'; e.style.color=c;
    document.body.appendChild(e); setTimeout(()=>e.remove(), 1000);
}

function save() {
    let d = {wood, stone, totalD, dWood, dStone, realm, lv, exp, pts, bAtk, bHp, talent, inv, eqW, eqA};
    localStorage.setItem('xian_v164_save', JSON.stringify(d));
}
function load() {
    let s = localStorage.getItem('xian_v164_save');
    if(s) {
        let p = JSON.parse(s);
        wood=p.wood; stone=p.stone; totalD=p.totalD; dWood=p.dWood; dStone=p.dStone;
        realm=p.realm; lv=p.lv; exp=p.exp; pts=p.pts; bAtk=p.bAtk; bHp=p.bHp;
        talent=p.talent; inv=p.inv; eqW=p.eqW; eqA=p.eqA; curHp = bHp + eqA.v;
    }
}

window.onload = init;
setInterval(save, 5000);
</script>
</body>
</html>
