<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>練功修練 - 飛升 2.0 (ESM 模組化版)</title>
    
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/page_battle.css">
    <link rel="stylesheet" href="css/page_economy.css">
    <link rel="stylesheet" href="css/page_stats.css">
    <link rel="stylesheet" href="css/fx.css">
</head>
<body>
    <header class="header-info">
        <div class="player-main-stats">
            <div id="player-realm" class="realm-title">感應天地中...</div>
            <div class="bars-stack">
                <div class="bar-container hp">
                    <div id="player-hp-fill" class="fill fill-hp" style="width: 100%;"></div>
                    <div class="bar-text">
                        <span id="player-hp-val">0</span> / <span id="player-hp-max">0</span>
                    </div>
                </div>
                <div class="bar-container exp">
                    <div id="exp-fill" class="fill fill-exp" style="width: 0%;"></div>
                    <div class="bar-text">EXP</div>
                </div>
            </div>
        </div>
        <div class="currency-display">靈石: <span id="player-coin">0</span></div>
    </header>

    <main id="game-container">
        <section id="page-battle" class="game-page active">
            <div class="map-nav-header">
                <span id="current-map-name">探尋天機中...</span>
                <button onclick="UI_Battle.showMapSelect()" class="btn-travel">🗺️ 尋找歷練地</button>
            </div>
            
            <div id="combat-area">
                <div id="monster-display" class="monster-card">
                    <div id="monster-icon" class="monster-avatar">❓</div>
                    <h3 id="monster-name">搜尋妖氣中...</h3>
                    <div class="bar-container monster-hp">
                        <div id="monster-hp-fill" class="fill fill-hp" style="width: 100%;"></div>
                        <div class="bar-text" id="monster-hp-val">0 / 0</div>
                    </div>
                </div>
            </div>

            <div id="battle-actions" class="actions-container"></div>

            <div class="log-panel">
                <div class="log-header">
                    <span>📜 戰鬥日誌</span>
                    <div id="log-tabs"></div>
                </div>
                <div id="battle-log" class="log-content"></div>
            </div>
        </section>

        <section id="page-stats" class="game-page" style="display:none;">
            <div class="page-title">修為與境界</div>
            <div class="equipped-section">
                <div class="section-label">🧥 當前披掛</div>
                <div id="equipped-list" class="equip-grid">
                    <div class="equip-slot empty">載入中...</div>
                </div>
            </div>
            <div id="breakthrough-area" style="display:none; text-align:center; padding: 15px;">
                <button id="btn-breakthrough" class="btn-special">✨ 突破境界</button>
            </div>
            <h2 id="stat-realm-title" style="text-align:center; color:var(--accent); margin-bottom:20px;"></h2>
            <div id="stats-content" class="stats-grid"></div>
        </section>

        <section id="page-bag" class="game-page" style="display:none;">
            <div class="page-title">儲物袋</div>
            <div id="bag-filters" class="bag-filters"></div>
            <div id="bag-content" class="bag-grid"></div>
        </section>

        <section id="page-shop" class="game-page" style="display:none;">
            <div class="page-title">坊市交易</div>
            <div id="shop-content" class="shop-grid"></div>
        </section>
    </main>

    <nav class="bottom-nav">
        <button class="nav-btn active" onclick="Core.switchPage('battle')">⚔️ 歷練</button>
        <button class="nav-btn" onclick="Core.switchPage('stats')">🧘‍♂️ 修為</button>
        <button class="nav-btn" onclick="Core.switchPage('bag')">🎒 儲物</button>
        <button class="nav-btn" onclick="Core.switchPage('shop')">🏪 坊市</button>
    </nav>

    <div id="modal-map" class="modal" style="display:none;">
        <div class="modal-box">
            <div class="modal-header">
                <h3>州郡地圖</h3>
                <button onclick="document.getElementById('modal-map').style.display='none'">✕</button>
            </div>
            <div class="modal-body">
                <div id="region-list" class="region-tabs"></div>
                <div id="map-list" class="map-grid"></div>
            </div>
        </div>
    </div>

    <script>window.GAMEDATA = window.GAMEDATA || {};</script>
    <script src="data/data_config.js"></script>
    <script src="data/data_items.js"></script>
    <script src="data/data_monsters.js"></script>
    <script src="data/data_world.js"></script>
    <script src="data/data_skills.js"></script>
    <script>window.DATA = window.GAMEDATA;</script>

    <script type="module">
        // 導入核心中樞
        import { Core } from './core.js';
        
        // 為了讓 HTML 裡的 onclick 還能找到 Core，我們手動暴露給 window
        window.Core = Core;

        window.onload = () => {
            console.log("%c【系統】V2.0 飛升大陣啟動...", "color: #fbbf24; font-weight: bold;");
            Core.init();
        };
    </script>
</body>
</html>
