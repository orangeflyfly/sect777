<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>仙俠宗門 V0.1 - 創世之初</title>
    <style>
        :root {
            --bg-dark: #0d1117;
            --card-bg: #161b22;
            --border-color: #30363d;
            --text-main: #c9d1d9;
            --gold: #f1e05a;
            --danger: #f85149;
            --success: #3fb950;
            --info: #58a6ff;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg-dark); color: var(--text-main); display: flex; justify-content: center; height: 100vh; overflow: hidden; }

        #app {
            width: 100%; max-width: 480px; height: 100%; background: var(--bg-dark);
            border: 1px solid var(--border-color); display: flex; flex-direction: column;
        }

        /* 頂部狀態欄 */
        header { padding: 15px; background: var(--card-bg); border-bottom: 1px solid var(--border-color); }
        .player-basic { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .lv-tag { background: var(--gold); color: #000; padding: 2px 8px; border-radius: 4px; font-weight: bold; font-size: 14px; }
        
        .bar-container { height: 8px; background: #000; border-radius: 4px; overflow: hidden; margin: 5px 0; }
        .bar-fill { height: 100%; transition: width 0.3s ease; }

        /* 戰鬥區 */
        .battle-zone { flex: 1; padding: 20px; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .monster-card { 
            width: 200px; height: 200px; background: rgba(255,255,255,0.05); border: 2px solid var(--border-color);
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            cursor: pointer; transition: transform 0.1s; position: relative;
        }
        .monster-card:active { transform: scale(0.95); }
        .monster-card::after { content: '👹'; font-size: 80px; }

        .hp-label { width: 100%; max-width: 250px; text-align: center; margin-top: 15px; }

        /* 浮動傷害 */
        .dmg-num { position: absolute; font-weight: bold; font-size: 24px; pointer-events: none; animation: flyUp 0.6s ease-out forwards; }
        @keyframes flyUp { 0% { opacity: 1; transform: translateY(0); } 100% { opacity: 0; transform: translateY(-80px); } }

        /* 標籤頁與內容 */
        .tabs { display: flex; background: var(--card-bg); border-top: 1px solid var(--border-color); }
        .tab-btn { flex: 1; padding: 12px; text-align: center; cursor: pointer; border-bottom: 2px solid transparent; }
        .tab-btn.active { border-bottom-color: var(--gold); color: var(--gold); }

        .content-area { flex: 1; overflow-y: auto; padding: 15px; display: none; }
        .content-area.active { display: block; }

        /* 屬性列表 */
        .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 0; border-bottom: 1px solid #21262d; }
        .stat-ctrl { display: flex; gap: 10px; align-items: center; }
        .btn-plus { width: 30px; height: 30px; background: var(--info); border: none; color: #fff; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-plus:disabled { opacity: 0.3; }

        /* 日誌 */
        #log-box { font-size: 13px; color: #8b949e; line-height: 1.6; }
    </style>
</head>
<body>

<div id="app">
    <header>
        <div class="player-basic">
            <span id="p-name">修仙者</span>
            <span class="lv-tag">LV <span id="val-lv">1</span></span>
        </div>
        <div class="bar-container"><div id="bar-xp" class="bar-fill" style="width: 0%; background: var(--info);"></div></div>
        <div style="font-size: 12px; text-align: right;">經驗: <span id="val-xp">0</span> / <span id="val-next-xp">100</span></div>
    </header>

    <div id="page-battle" class="content-area active">
        <div class="battle-zone">
            <div id="monster-target" class="monster-card" onclick="game.manualAttack(event)"></div>
            <div class="hp-label">
                <b id="m-name">荒野野狗</b><br>
                <div class="bar-container"><div id="bar-m-hp" class="bar-fill" style="width: 100%; background: var(--danger);"></div></div>
                <small><span id="val-m-hp">50</span> / <span id="val-m-max-hp">50</span></small>
            </div>
        </div>
        <div id="log-box"></div>
    </div>

    <div id="page-stats" class="content-area">
        <div style="margin-bottom: 20px;">
            <h3>角色潛能: <span id="val-points" style="color: var(--gold);">0</span></h3>
        </div>
        <div id="stat-list">
            </div>
        <hr style="margin: 15px 0; border: 0; border-top: 1px solid var(--border-color);">
        <div id="combat-stats" style="font-size: 14px; color: #8b949e;">
            <p>攻擊力: <span id="val-atk">0</span></p>
            <p>生命值: <span id="val-max-hp">0</span></p>
            <p>攻速: <span id="val-spd">0</span> 次/秒</p>
            <p>暴擊率: <span id="val-crit">0</span>%</p>
        </div>
    </div>

    <nav class="tabs">
        <div class="tab-btn active" onclick="game.switchTab('battle', this)">戰鬥</div>
        <div class="tab-btn" onclick="game.switchTab('stats', this)">修為</div>
        <div class="tab-btn" onclick="game.switchTab('bag', this)">儲物袋</div>
    </nav>
</div>

<script>
class XianXiaCore {
    constructor() {
        this.state = JSON.parse(localStorage.getItem('XX_V01')) || {
            player: {
                lv: 1, xp: 0, nextXp: 100, points: 0,
                // 四維原始點數
                str: 5,  // 力量：影響攻擊力
                vit: 5,  // 體質：影響血量
                agi: 5,  // 敏捷：影響攻速
                int: 5   // 靈力：影響暴擊
            },
            stats: { atk: 0, maxHp: 0, hp: 0, spd: 0, crit: 0 }
        };

        this.monster = { name: "野外小妖", hp: 50, maxHp: 50, lv: 1, exp: 25 };
        this.runtime = { lastAutoAtk: 0 };

        this.init();
    }

    init() {
        this.calculateStats();
        this.state.hp = this.state.stats.maxHp;
        this.renderStats();
        this.updateUI();
        
        // 每秒檢查一次自動戰鬥 (掛機邏輯預留)
        setInterval(() => this.loop(), 100);
    }

    // --- 核心演算系統 ---
    calculateStats() {
        const p = this.state.player;
        this.state.stats = {
            atk: p.str * 3 + (p.lv * 2),
            maxHp: p.vit * 20 + (p.lv * 10),
            spd: (0.5 + (p.agi * 0.05)).toFixed(2), // 攻速：每秒幾次
            crit: Math.min(50, p.int * 0.8).toFixed(1) // 暴擊率上限 50%
        };
    }

    loop() {
        // 未來 V0.5 自動掛機邏輯將在此實現
    }

    // --- 戰鬥邏輯 ---
    manualAttack(e) {
        this.attack(true, e.clientX, e.clientY);
    }

    attack(isManual, x, y) {
        const s = this.state.stats;
        let isCrit = Math.random() * 100 < s.crit;
        let dmg = Math.floor(s.atk * (isManual ? 1.2 : 1.0)); // 手動點擊加成 20%
        if (isCrit) dmg *= 2;

        this.monster.hp -= dmg;
        this.showDmg(dmg, isCrit, x, y);

        if (this.monster.hp <= 0) this.onMonsterDie();
        this.updateUI();
    }

    onMonsterDie() {
        this.log(`擊殺了 ${this.monster.name}，獲得 ${this.monster.exp} 經驗。`);
        this.gainXp(this.monster.exp);
        
        // 怪物重生
        this.monster.maxHp = Math.floor(50 * Math.pow(1.2, this.state.player.lv - 1));
        this.monster.hp = this.monster.maxHp;
        
        // V0.3 將在此加入物品掉落邏輯
    }

    gainXp(amt) {
        const p = this.state.player;
        p.xp += amt;
        if (p.xp >= p.nextXp) {
            p.lv++;
            p.xp -= p.nextXp;
            p.nextXp = Math.floor(p.nextXp * 1.5);
            p.points += 5; // 每級 5 點潛能
            this.log(`恭喜突破！當前境界：等級 ${p.lv}`, "var(--gold)");
            this.calculateStats();
        }
    }

    // --- UI 控制 ---
    renderStats() {
        const list = document.getElementById('stat-list');
        const statNames = { str: '力量 (攻擊)', vit: '體質 (生命)', agi: '敏捷 (攻速)', int: '靈力 (暴擊)' };
        list.innerHTML = Object.entries(statNames).map(([key, name]) => `
            <div class="stat-row">
                <span>${name}</span>
                <div class="stat-ctrl">
                    <b>${this.state.player[key]}</b>
                    <button class="btn-plus" onclick="game.addStat('${key}')" ${this.state.player.points <= 0 ? 'disabled' : ''}>+</button>
                </div>
            </div>
        `).join('');
    }

    addStat(key) {
        if (this.state.player.points > 0) {
            this.state.player.points--;
            this.state.player[key]++;
            this.calculateStats();
            this.renderStats();
            this.updateUI();
            this.save();
        }
    }

    updateUI() {
        const p = this.state.player;
        const s = this.state.stats;
        
        document.getElementById('val-lv').innerText = p.lv;
        document.getElementById('val-xp').innerText = p.xp;
        document.getElementById('val-next-xp').innerText = p.nextXp;
        document.getElementById('bar-xp').style.width = (p.xp / p.nextXp * 100) + "%";
        
        document.getElementById('val-m-hp').innerText = this.monster.hp;
        document.getElementById('val-m-max-hp').innerText = this.monster.maxHp;
        document.getElementById('bar-m-hp').style.width = (this.monster.hp / this.monster.maxHp * 100) + "%";

        document.getElementById('val-points').innerText = p.points;
        document.getElementById('val-atk').innerText = s.atk;
        document.getElementById('val-max-hp').innerText = s.maxHp;
        document.getElementById('val-spd').innerText = s.spd;
        document.getElementById('val-crit').innerText = s.crit;
        
        // 更新按鈕狀態
        document.querySelectorAll('.btn-plus').forEach(b => b.disabled = p.points <= 0);
    }

    showDmg(dmg, isCrit, x, y) {
        const d = document.createElement('div');
        d.className = 'dmg-num';
        d.innerText = (isCrit ? '💥 ' : '') + dmg;
        d.style.color = isCrit ? 'var(--gold)' : '#fff';
        d.style.left = (x || 200) + 'px';
        d.style.top = (y || 300) + 'px';
        document.body.appendChild(d);
        setTimeout(() => d.remove(), 600);
    }

    switchTab(tab, el) {
        document.querySelectorAll('.content-area').forEach(a => a.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        document.getElementById('page-' + tab).classList.add('active');
        el.classList.add('active');
    }

    log(msg, color) {
        const box = document.getElementById('log-box');
        const div = document.createElement('div');
        div.style.color = color || 'inherit';
        div.innerHTML = `<span style="color:#555">[系統]</span> ${msg}`;
        box.prepend(div);
        if (box.children.length > 5) box.lastChild.remove();
    }

    save() { localStorage.setItem('XX_V01', JSON.stringify(this.state)); }
}

const game = new XianXiaCore();
</script>
</body>
</html>
